<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ListFlow</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#0e0e0f;--surface:#161618;--surface2:#1e1e21;--border:#2a2a2e;
  --accent:#7c6af7;--red:#e8565e;--green:#3ecf8e;--yellow:#e8c84a;--blue:#4fa7e8;--orange:#f0804b;
  --text:#e8e8ec;--text2:#888892;--text3:#55555e;--r:10px;
  --sab:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;display:flex;flex-direction:column;height:100dvh}

/* в”Җв”Җв”Җ HEADER в”Җв”Җв”Җ */
.hdr{display:flex;align-items:center;padding:0 14px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:10px;z-index:50}
.logo{font-size:18px;font-weight:800;color:var(--accent);letter-spacing:-.5px}.logo span{color:var(--text)}
.hpill{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3);border:1px solid var(--border);padding:2px 7px;border-radius:20px}
.hright{margin-left:auto;display:flex;gap:6px}
.ibtn{width:36px;height:36px;border-radius:var(--r);background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ibtn:active{opacity:.7;transform:scale(.93)}

/* в”Җв”Җв”Җ LAYOUT в”Җв”Җв”Җ */
.body{flex:1;display:flex;overflow:hidden;position:relative}

/* в”Җв”Җв”Җ SIDEBAR в”Җв”Җв”Җ */
.sidebar{width:285px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:40}
@media(max-width:680px){
  .sidebar{position:absolute;top:0;left:0;bottom:0;transform:translateX(-100%);box-shadow:6px 0 30px rgba(0,0,0,.6)}
  .sidebar.open{transform:translateX(0)}
  .overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:39;display:none}
  .overlay.open{display:block}
}
@media(min-width:681px){.overlay{display:none!important}.mbtn{display:none!important}}
.sb-scroll{flex:1;overflow-y:auto;padding:12px}
.sb-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);padding:4px 4px 8px}
.pg{display:flex;flex-direction:column;gap:3px;margin-bottom:16px}
.prow{display:flex;align-items:center;gap:10px;padding:10px;border-radius:var(--r);cursor:pointer;transition:background .15s;border:1px solid transparent;user-select:none}
.prow:active{opacity:.8}.prow.on{background:rgba(124,106,247,.1);border-color:rgba(124,106,247,.2)}
.picon{font-size:18px;width:22px;text-align:center}
.pinfo{flex:1;min-width:0}
.pname{font-size:13px;font-weight:600;color:var(--text2)}.prow.on .pname{color:var(--accent)}
.pdesc{font-size:11px;color:var(--text3);margin-top:1px}
.tpill{width:36px;height:20px;border-radius:10px;background:var(--border);position:relative;transition:background .2s;flex-shrink:0}
.tpill::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:white;top:3px;left:3px;transition:transform .2s}
.prow.on .tpill{background:var(--accent)}.prow.on .tpill::after{transform:translateX(16px)}
.lents{display:flex;flex-direction:column;gap:3px}
.lent{display:flex;align-items:center;gap:8px;padding:10px;border-radius:var(--r);cursor:pointer;transition:background .15s;border:1px solid transparent}
.lent:active{opacity:.8}.lent.on{background:rgba(124,106,247,.1);border-color:rgba(124,106,247,.2)}
.ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0;opacity:.4}
.lent.on .ldot{opacity:1}
.lname{flex:1;font-size:13px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lent.on .lname{color:var(--text)}
.lcnt{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3);flex-shrink:0}
.ldel{width:20px;height:20px;border-radius:5px;border:none;background:transparent;color:var(--text3);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.lent:hover .ldel,.lent:active .ldel{opacity:1}
.sb-foot{padding:12px;border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.nlbtn{width:100%;padding:11px;border-radius:var(--r);background:rgba(124,106,247,.1);border:1px dashed rgba(124,106,247,.35);color:var(--accent);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.nlbtn:active{background:rgba(124,106,247,.2)}
.guidebtn{width:100%;padding:9px;border-radius:var(--r);background:transparent;border:1px solid var(--border);color:var(--text3);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.guidebtn:active{opacity:.7}

/* в”Җв”Җв”Җ MAIN в”Җв”Җв”Җ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.tb{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.tb::-webkit-scrollbar{display:none}
.tbsep{width:1px;height:20px;background:var(--border);flex-shrink:0;margin:0 2px}
.tbbtn{padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:5px;flex-shrink:0}
.tbbtn:active{opacity:.75;transform:scale(.97)}.tbbtn.pri{background:var(--accent);border-color:var(--accent);color:white}
.srch{position:relative;flex-shrink:0}
.srch input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;padding:7px 10px 7px 30px;outline:none;width:150px;transition:all .2s}
.srch input:focus{border-color:var(--accent);width:200px}
.srch input::placeholder{color:var(--text3)}
.sicon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}

/* в”Җв”Җв”Җ CONTENT в”Җв”Җв”Җ */
.cnt{flex:1;overflow:auto;padding:16px;padding-bottom:calc(80px + var(--sab));display:flex;flex-direction:column;gap:14px}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:40px 20px;color:var(--text3)}
.empty-ico{font-size:60px;opacity:.2}
.empty h2{font-size:18px;color:var(--text2)}
.empty p{font-size:13px;line-height:1.7;max-width:280px}
.lhdr{display:flex;flex-direction:column;gap:8px}
.ltrow{display:flex;align-items:center;gap:10px}
.ltinput{flex:1;font-family:'Syne',sans-serif;font-size:20px;font-weight:700;background:transparent;border:none;color:var(--text);outline:none;border-bottom:2px solid transparent;transition:border-color .2s;min-width:0}
.ltinput:focus{border-bottom-color:var(--accent)}

/* в”Җв”Җв”Җ PROGRESS в”Җв”Җв”Җ */
.prog{display:flex;flex-direction:column;gap:4px}
.pgbg{background:var(--surface2);border-radius:99px;height:5px;overflow:hidden}
.pgfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.pglabel{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text3)}

/* в”Җв”Җв”Җ IMPORT в”Җв”Җв”Җ */
.import{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.import summary{padding:11px 14px;cursor:pointer;font-size:13px;color:var(--text2);font-weight:600;list-style:none;display:flex;align-items:center;gap:8px}
.import summary::-webkit-details-marker{display:none}
.import-body{padding:0 12px 12px;display:flex;flex-direction:column;gap:8px}
.import-body textarea{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;padding:10px;resize:vertical;min-height:90px;outline:none;transition:border-color .2s;line-height:1.7;width:100%}
.import-body textarea:focus{border-color:var(--accent)}
.import-hint{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;line-height:1.5}
.import-acts{display:flex;gap:8px;flex-wrap:wrap}

/* в”Җв”Җв”Җ ITEMS в”Җв”Җв”Җ */
pading
.iblock{display:flex;flex-direction:column;min-width:max-content;width:100%}
.irow{display:flex;align-items:flex-start;gap:5px;padding:5px 6px;border-radius:8px;transition:background .1s;min-width:max-content;width:100%}
.irow:active{background:var(--surface2)}
.itog{padding: 14px; width:20px;height:20px;flex-shrink:0;margin-top:5px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:9px;border-radius:4px;transition:all .15s;user-select:none}
.itog.nc{opacity:0;pointer-events:none}
.icb{width:20px;height:55px;flex-shrink:0;margin-top:5px;appearance:none;-webkit-appearance:none;border:2px solid var(--border);border-radius:6px;cursor:pointer;position:relative;transition:all .2s;background:transparent}
.icb:checked{background:var(--accent);border-color:var(--accent)}
.icb:checked::after{content:'';position:absolute;left:4px;top:1px;width:6px;height:10px;border:2px solid white;border-left:none;border-top:none;transform:rotate(45deg)}
.icb.par{border-color:var(--accent);background:rgba(124,106,247,.15)}
.icb.par::after{content:'';position:absolute;left:3px;top:7px;width:10px;height:2px;background:var(--accent);border-radius:1px}
/* ibody ocupa toda a largura restante, texto nunca comprime */
.ibody{flex:1;min-width:0;padding-top:3px}
.itext{font-size:16px;line-height:1.5;color:var(--text);outline:none;background:transparent;border:none;font-family:'Syne',sans-serif;cursor:text;white-space:nowrap;display:block;min-height:20px}
.itext.done{text-decoration:line-through;color:var(--text3)}
.imeta{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;align-items:center}
/* iend fica dentro do ibody, abaixo do texto вҖ” nunca na lateral */
.iend{display:flex;align-items:center;gap:4px;margin-top:4px;flex-wrap:wrap}
.iabtn{width:28px;height:28px;border-radius:8px;border:none;background:var(--surface2);color:var(--text3);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.iabtn:active{opacity:.7;transform:scale(.91)}
.kids{padding-left:20px;border-left:1px solid var(--border);margin-left:12px;min-width:max-content}
.kids.col{display:none}

/* в”Җв”Җв”Җ BADGES в”Җв”Җв”Җ */
.tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:20px;border:1px solid;cursor:pointer;line-height:1.4;white-space:nowrap}
.tred{color:#e8565e;border-color:rgba(232,86,94,.4);background:rgba(232,86,94,.1)}
.toran{color:#f0804b;border-color:rgba(240,128,75,.4);background:rgba(240,128,75,.1)}
.tyel{color:#e8c84a;border-color:rgba(232,200,74,.4);background:rgba(232,200,74,.1)}
.tgrn{color:#3ecf8e;border-color:rgba(62,207,142,.4);background:rgba(62,207,142,.1)}
.tblu{color:#4fa7e8;border-color:rgba(79,167,232,.4);background:rgba(79,167,232,.1)}
.tpur{color:#a57af0;border-color:rgba(165,122,240,.4);background:rgba(165,122,240,.1)}
.tpnk{color:#e87ac8;border-color:rgba(232,122,200,.4);background:rgba(232,122,200,.1)}
.due{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:20px;white-space:nowrap;cursor:pointer}
.dnorm{color:var(--text3);background:var(--surface2);border:1px solid var(--border)}
.dsoon{color:#e8c84a;background:rgba(232,200,74,.1);border:1px solid rgba(232,200,74,.3)}
.dover{color:var(--red);background:rgba(232,86,94,.1);border:1px solid rgba(232,86,94,.3)}
.pribadge{font-size:13px;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;flex-shrink:0;margin-top:5px;background:var(--surface2)}
.inote{font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace;line-height:1.5;margin-top:4px;border-left:2px solid var(--border);padding-left:8px;outline:none;word-break:break-word;min-height:16px}
.estbadge{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--blue);background:rgba(79,167,232,.1);border:1px solid rgba(79,167,232,.3);padding:2px 7px;border-radius:20px;white-space:nowrap}
/* plugin: recurrence */
.recbadge{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--green);background:rgba(62,207,142,.1);border:1px solid rgba(62,207,142,.3);padding:2px 7px;border-radius:20px;white-space:nowrap;cursor:pointer}
/* plugin: listcolor */
.lcbadge{display:inline-block;width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* plugin: link */
.linkbadge{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--blue);padding:2px 7px;border-radius:20px;background:rgba(79,167,232,.1);border:1px solid rgba(79,167,232,.3);white-space:nowrap;text-decoration:none;cursor:pointer;display:inline-flex;align-items:center;gap:3px}

/* в”Җв”Җв”Җ EXPORT PANEL (plugin: export) в”Җв”Җв”Җ */
.export-panel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:12px;display:flex;flex-direction:column;gap:8px}
.export-pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);overflow-x:auto;white-space:pre;max-height:160px;overflow-y:auto}

/* в”Җв”Җв”Җ KANBAN (plugin: kanban) в”Җв”Җв”Җ */
.kanban-wrap{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;min-height:200px}
.kanban-col{min-width:200px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);display:flex;flex-direction:column;flex-shrink:0}
.kanban-hdr{padding:10px 12px;font-size:12px;font-weight:700;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.kanban-body{padding:8px;display:flex;flex-direction:column;gap:6px;flex:1}
.kanban-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;line-height:1.4;cursor:pointer;transition:all .15s}
.kanban-card:active{opacity:.75}
.kanban-card.done-card{text-decoration:line-through;color:var(--text3)}

/* в”Җв”Җв”Җ FAB в”Җв”Җв”Җ */
.fab{position:fixed;right:18px;bottom:calc(18px + var(--sab));width:54px;height:54px;border-radius:50%;background:var(--accent);border:none;color:white;font-size:28px;cursor:pointer;box-shadow:0 4px 22px rgba(124,106,247,.55);display:flex;align-items:center;justify-content:center;z-index:30;transition:all .2s}
.fab:active{transform:scale(.91)}
@media(min-width:681px){.fab{display:none}}

/* в”Җв”Җв”Җ MODAL / BOTTOM SHEET в”Җв”Җв”Җ */
.mback{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .25s}
.mback.open{opacity:1;pointer-events:all}
.msheet{background:var(--surface);border-radius:18px 18px 0 0;padding:20px 20px calc(20px + var(--sab));width:100%;max-width:520px;max-height:88vh;display:flex;flex-direction:column;gap:14px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto}
.mback.open .msheet{transform:translateY(0)}
.mhandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto -4px}
.mtitle{font-size:16px;font-weight:700}
.macts{display:flex;gap:8px}
.fg{display:flex;flex-direction:column;gap:6px}
.fl{font-size:12px;color:var(--text3);font-weight:600;letter-spacing:.5px}
input[type=text],input[type=date],input[type=url],input[type=number],select,.fta{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Syne',sans-serif;font-size:15px;padding:11px 12px;outline:none;width:100%;transition:border-color .2s}
input:focus,select:focus,.fta:focus{border-color:var(--accent)}
.fta{resize:vertical;min-height:80px;font-size:13px;font-family:'JetBrains Mono',monospace;line-height:1.7}
.cpick{display:flex;gap:10px;flex-wrap:wrap;padding:4px 0}
.copt{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s}
.copt.sel{border-color:white;transform:scale(1.18)}
.co-red{background:#e8565e}.co-oran{background:#f0804b}.co-yel{background:#e8c84a}
.co-grn{background:#3ecf8e}.co-blu{background:#4fa7e8}.co-pur{background:#a57af0}.co-pnk{background:#e87ac8}
/* list color swatches */
.lcswatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s}
.lcswatch.sel{border-color:white;transform:scale(1.15)}
.btn{padding:11px 16px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Syne',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn:active{opacity:.75}.btn.pri{background:var(--accent);border-color:var(--accent);color:white;flex:1}.btn.full{width:100%}.btn.dng{border-color:rgba(232,86,94,.4);color:var(--red)}
.cpiece{position:fixed;width:8px;height:8px;z-index:999;animation:cfal 1.2s ease-in forwards;pointer-events:none}
@keyframes cfal{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.search-hidden{display:none!important}
.smatch{color:var(--green)!important}

/* в”Җв”Җв”Җ GUIDE MODAL в”Җв”Җв”Җ */
.guide-block{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:8px}
.guide-block h4{font-size:13px;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:6px}
.guide-block p,.guide-block li{font-size:12px;color:var(--text2);line-height:1.7;font-family:'JetBrains Mono',monospace}
.guide-block ul{padding-left:16px;display:flex;flex-direction:column;gap:2px}
code{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent)}

/* в”Җв”Җв”Җ VIEW TOGGLE в”Җв”Җв”Җ */
.view-tabs{display:flex;gap:6px}
.vtab{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:'Syne',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.vtab.on{background:var(--accent);border-color:var(--accent);color:white}
.vtab:active{opacity:.75}
</style>
</head>
<body>

<div class="hdr">
  <button class="ibtn mbtn" onclick="toggleSB()">вҳ°</button>
  <div class="logo">List<span>Flow</span></div>
  <span class="hpill" id="hpill">0 listas</span>
  <div class="hright">
    <button class="ibtn" onclick="exportJ()" title="Exportar JSON">в¬Ү</button>
    <button class="ibtn" onclick="importJ()" title="Importar JSON">в¬Ҷ</button>
  </div>
</div>

<div class="body">
  <div class="overlay" id="ov" onclick="closeSB()"></div>
  <aside class="sidebar" id="sb">
    <div class="sb-scroll">
      <div class="sb-label" style="margin-top:4px">Plugins</div>
      <div class="pg" id="pg"></div>
      <div class="sb-label">Minhas listas</div>
      <div class="lents" id="lents"></div>
    </div>
    <div class="sb-foot">
      <button class="nlbtn" onclick="newList()">пјӢ Nova lista</button>
      <button class="guidebtn" onclick="openGuide()">рҹ“– Como criar um plugin</button>
    </div>
  </aside>

  <div class="main">

// в”Җв”Җ 10. RECORRГҠNCIA в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
reg('recurrence', {
  name:'Itens Recorrentes', icon:'рҹ”Ғ', desc:'Reseta itens diГЎria/semanalamente', def:false,
  abtn(item){ return `<button class="iabtn" onclick="setRec('${item.id}')">рҹ”Ғ</button>`; },
  meta(item){
    if(!item.recurrence) return '';
    const labels={daily:'Todo dia',weekly:'Toda semana',monthly:'Todo mГӘs'};
    return `<span class="recbadge" onclick="setRec('${item.id}')">рҹ”Ғ ${labels[item.recurrence]||item.recurrence}</span>`;
  },
  // Quando a lista Г© aberta, verifica se itens precisam ser resetados
  hdr(list){
    checkRecurrence(list);
    return '';
  }
});

function checkRecurrence(list){
  const now = new Date();
  const today = now.toISOString().slice(0,10);
  const allItems = [];
  const col = a => a.forEach(i=>{ allItems.push(i); col(i.children||[]); });
  col(list.items);
  let changed = false;
  for(const item of allItems){
    if(!item.recurrence || !item.checked) continue;
    const last = item._recLast;
    if(!last){ item._recLast = today; continue; }
    let shouldReset = false;
    if(item.recurrence==='daily' && last < today) shouldReset=true;
    if(item.recurrence==='weekly'){
      const d1=new Date(last), d2=new Date(today);
      shouldReset = (d2-d1)/(1000*60*60*24) >= 7;
    }
    if(item.recurrence==='monthly'){
      const d1=new Date(last), d2=new Date(today);
      shouldReset = d2.getMonth()!==d1.getMonth() || d2.getFullYear()!==d1.getFullYear();
    }
    if(shouldReset){ item.checked=false; item._recLast=today; changed=true; }
  }
  if(changed) save();
}

function setRec(id){
  const l=getL(); if(!l) return;
  const item=find(l.items,id);
  openM('Item Recorrente',`
    <div class="fg"><div class="fl">FrequГӘncia de reset</div>
      <select id="mrc">
        <option value="" ${!item?.recurrence?'selected':''}>Sem recorrГӘncia</option>
        <option value="daily" ${item?.recurrence==='daily'?'selected':''}>Todo dia</option>
        <option value="weekly" ${item?.recurrence==='weekly'?'selected':''}>Toda semana</option>
        <option value="monthly" ${item?.recurrence==='monthly'?'selected':''}>Todo mГӘs</option>
      </select>
    </div>
    <div style="font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace;line-height:1.6">
      O item serГЎ automaticamente desmarcado conforme a frequГӘncia escolhida quando vocГӘ abrir o app.
    </div>
  `, ()=>{
    const v=document.getElementById('mrc')?.value;
    if(item){ item.recurrence=v||null; item._recLast=new Date().toISOString().slice(0,10); save(); renderCnt(); }
  });
}

// в”Җв”Җ 11. EXPORT MARKDOWN / CSV в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
reg('exportmd', {
  name:'Export Markdown / CSV', icon:'рҹ“Ө', desc:'Exporta lista em Markdown ou CSV', def:false,
  tb(){ return `<button class="tbbtn" onclick="openExportPanel()">рҹ“Ө Exportar</button>`; }
});

function listToMarkdown(items, depth=0){
  let out='';
  for(const item of items){
    const pad='  '.repeat(depth);
    const cb=item.checked?'[x]':'[ ]';
    out+=`${pad}- ${cb} ${item.text}\n`;
    if(item.children?.length) out+=listToMarkdown(item.children, depth+1);
  }
  return out;
}

function listToCSV(items, depth=0){
  let rows=[];
  for(const item of items){
    rows.push([`"${'  '.repeat(depth)+item.text.replace(/"/g,'""')}"`, item.checked?'sim':'nГЈo',
      item.priority||'none', item.due||'', item.estimate||'', `"${(item.tags||[]).map(t=>t.label).join(', ')}"`].join(','));
    if(item.children?.length) rows=rows.concat(listToCSV(item.children, depth+1));
  }
  return rows;
}

function openExportPanel(){
  const l=getL(); if(!l) return;
  const md=`# ${l.name}\n\n`+listToMarkdown(l.items);
  const csvRows=['Texto,ConcluГӯdo,Prioridade,Prazo,Estimativa,Tags',...listToCSV(l.items)];
  const csv=csvRows.join('\n');

  openM('Exportar Lista',`
    <div class="view-tabs" style="margin-bottom:4px">
      <button class="vtab on" id="vtmd" onclick="swExport('md')">Markdown</button>
      <button class="vtab" id="vtcsv" onclick="swExport('csv')">CSV</button>
    </div>
    <pre class="export-pre" id="expre">${esc(md)}</pre>
    <div class="macts">
      <button class="btn" onclick="copyExport()">рҹ“Ӣ Copiar</button>
      <button class="btn pri" onclick="dlExport()">в¬Ү Download</button>
    </div>
  `, null);
  window._expData = {md, csv, mode:'md'};
}

window.swExport = mode => {
  window._expData.mode = mode;
  document.getElementById('expre').textContent = mode==='md' ? window._expData.md : window._expData.csv;
  document.getElementById('vtmd').classList.toggle('on', mode==='md');
  document.getElementById('vtcsv').classList.toggle('on', mode==='csv');
};
window.copyExport = () => {
  const d=window._expData;
  navigator.clipboard.writeText(d.mode==='md'?d.md:d.csv).then(()=>alert('Copiado!'));
};
window.dlExport = () => {
  const d=window._expData;
  const content=d.mode==='md'?d.md:d.csv;
  const ext=d.mode==='md'?'md':'csv';
  const l=getL();
  const b=new Blob([content],{type:'text/plain'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b);
  a.download=`${(l?.name||'lista').replace(/\s+/g,'_')}.${ext}`; a.click();
};

//  GUIA: COMO CRIAR UM PLUGIN

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  HELPERS DO CORE
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
const mkItem = t => ({id:genId(),text:t,checked:false,collapsed:false,children:[],tags:[],due:null,priority:'none',note:'',estimate:'',recurrence:null,link:null});
function find(items,id){ for(const i of items){ if(i.id===id) return i; if(i.children){ const f=find(i.children,id); if(f) return f; } } return null; }
function remove(items,id){ for(let i=0;i<items.length;i++){ if(items[i].id===id){items.splice(i,1);return true;} if(items[i].children&&remove(items[i].children,id)) return true; } return false; }
function getpar(items,id,par=null){ for(const i of items){ if(i.id===id) return par; if(i.children){ const f=getpar(i.children,id,i); if(f!==undefined) return f; } } }
function cp(items){ let d=0,t=0; const w=a=>{for(const i of(a||[])){t++;if(i.checked)d++;w(i.children)}}; w(items); return{d,t}; }

function parseT(text){
  const lines=text.split('\n').filter(l=>l.trim()), root=[], stack=[{ch:root,ind:-1}];
  for(const line of lines){
    const raw=line.replace(/^[\s\t]*[-*+]?\s*(\[[xX ]\])?\s*/,'');
    const checked=/\[[xX]\]/.test(line);
    const ind=line.search(/\S/);
    const item=mkItem(raw.trim()); item.checked=checked;
    while(stack.length>1&&stack[stack.length-1].ind>=ind) stack.pop();
    stack[stack.length-1].ch.push(item);
    stack.push({ch:item.children,ind});
  }
  return root;
}

// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
//  RENDER
// в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
function renderAll(){ renderSB(); renderTB(); renderCnt(); }

function renderSB(){
  document.getElementById('pg').innerHTML = Object.values(PL).map(p=>`
    <div class="prow ${pon(p.id)?'on':''}" onclick="togP('${p.id}')">
      <span class="picon">${p.icon}</span>
      <div class="pinfo"><div class="pname">${p.name}</div><div class="pdesc">${p.desc}</div></div>
      <div class="tpill"></div>
    </div>`).join('');

  document.getElementById('lents').innerHTML = S.lists.map(l=>{
    const {d,t}=cp(l.items); const on=l.id===S.active;
    const c=l.color||'#3ecf8e';
    return `<div class="lent ${on?'on':''}" onclick="selL('${l.id}');closeSB()">
      <div class="ldot" style="background:${c}"></div>
      <div class="lname">${esc(l.name)}</div>
      <div class="lcnt">${d}/${t}</div>
      <button class="ldel" onclick="event.stopPropagation();delL('${l.id}')">вң•</button>
    </div>`;
  }).join('');

  document.getElementById('hpill').textContent = `${S.lists.length} lista${S.lists.length!==1?'s':''}`;
}

function renderTB(){
  const parts=[`<button class="tbbtn pri" onclick="addItem()">пјӢ Item</button>`];
  Object.values(PL).forEach(p=>{
    if(pon(p.id)&&p.tb){ const h=p.tb(); if(h){ parts.push('<div class="tbsep"></div>'); parts.push(h); } }
  });
  document.getElementById('tb').innerHTML=parts.join('');
}

function renderCnt(){
  const list=getL();
  const es=document.getElementById('es'), lv=document.getElementById('lv'), fab=document.getElementById('fab');
  if(!list){ es.style.display='flex'; lv.style.display='none'; fab.style.display='none'; return; }
  es.style.display='none'; lv.style.display='flex'; fab.style.display='flex';
  lv.innerHTML='';

  // Header
  const hdr=document.createElement('div'); hdr.className='lhdr';
  let hdrHtml=`<div class="ltrow"><input class="ltinput" value="${esc(list.name)}" onchange="renL('${list.id}',this.value)" onblur="renL('${list.id}',this.value)"></div>`;
  Object.values(PL).forEach(p=>{ if(pon(p.id)&&p.hdr){ const h=p.hdr(list); if(h) hdrHtml+=h; } });
  hdr.innerHTML=hdrHtml;
  lv.appendChild(hdr);

  // Kanban view
  if(pon('kanban') && S._view==='kanban'){
    const kb=document.createElement('div');
    kb.innerHTML=renderKanban(list);
    lv.appendChild(kb);
    return;
  }

  // Import area
  const imp=document.createElement('details'); imp.className='import';
  imp.innerHTML=`<summary>рҹ“Ӣ Importar por texto</summary>
    <div class="import-body">
      <textarea id="ita" placeholder="Um item por linha. Indente para sub-itens:
- Tarefa principal
  - Sub-tarefa
    - Sub-sub-tarefa
[x] Item jГЎ marcado"></textarea>
      <div class="import-acts">
        <button class="btn pri" style="flex:1" onclick="doImport()">Importar</button>
        <button class="btn" onclick="document.getElementById('ita').value=''">Limpar</button>
      </div>
      <div class="import-hint">Prefixos: -, *, + вҖў [x] = marcado вҖў EspaГ§os = aninhamento</div>
    </div>`;
  lv.appendChild(imp);

  // Tree
  const tree=document.createElement('div'); tree.id='it';
  rTree(list.items,tree);
  lv.appendChild(tree);
  // SeГ§ГЈo de orГ§amento (plugins com renderSection)
  Object.values(PL).forEach(p=>{
    if(pon(p.id)&&p.renderSection){ const h=p.renderSection(list); if(h){ const d=document.createElement('div'); d.innerHTML=h; lv.appendChild(d); } }
  });
}

function rTree(items,cont){
  for(const item of items){
    const blk=document.createElement('div'); blk.className='iblock';
    const row=document.createElement('div'); row.className='irow'; row.dataset.id=item.id;
    const hk=!!item.children?.length;

    let cbcls='';
    if(!item.checked&&hk){ const{d,t}=cp(item.children); if(d>0&&d<t) cbcls='par'; }

    let pfx=''; Object.values(PL).forEach(p=>{ if(pon(p.id)&&p.pfx) pfx+=p.pfx(item)||''; });
    let abtns=`<button class="iabtn" title="Sub-item" onclick="addSub('${item.id}')">вҠ•</button>`;
    Object.values(PL).forEach(p=>{ if(pon(p.id)&&p.abtn) abtns+=p.abtn(item)||''; });
    abtns+=`<button class="iabtn" onclick="delItem('${item.id}')" style="color:var(--red);opacity:.7">вң•</button>`;
    let meta=''; Object.values(PL).forEach(p=>{ if(pon(p.id)&&p.meta) meta+=p.meta(item)||''; });
    let extra=''; Object.values(PL).forEach(p=>{ if(pon(p.id)&&p.extra) extra+=p.extra(item)||''; });

    row.innerHTML=`${pfx}
      <span class="itog ${hk?'':'nc'}" onclick="togCol('${item.id}')">${item.collapsed?'в–¶':'в–ј'}</span>
      <input type="checkbox" class="icb ${cbcls}" ${item.checked?'checked':''} onchange="togChk('${item.id}',this.checked)">
      <div class="ibody">
        <div class="itext ${item.checked?'done':''}" contenteditable="true" spellcheck="false"
          onblur="renItem('${item.id}',this.innerText)"
          onkeydown="ikey(event,'${item.id}')">${esc(item.text)}</div>
        ${meta?`<div class="imeta">${meta}</div>`:''}
        ${extra}
        <div class="iend">${abtns}</div>
      </div>`;

    blk.appendChild(row);
    if(hk){
      const ch=document.createElement('div'); ch.className=`kids ${item.collapsed?'col':''}`;
      rTree(item.children,ch); blk.appendChild(ch);
    }
    cont.appendChild(blk);
  }
}

function togChk(id,v){
  const l=getL(); if(!l) return;
  const item=find(l.items,id); if(!item) return;
  item.checked=v;
  const sa=(arr,val)=>arr.forEach(i=>{i.checked=val;if(i.children)sa(i.children,val)});
  sa(item.children||[],v);
  save();
  if(pon('celebrate')&&v){ const{d,t}=cp(l.items); if(d===t&&t>0) confetti(); }
  renderCnt();
}
function togCol(id){ const l=getL(); if(!l) return; const item=find(l.items,id); if(!item) return; item.collapsed=!item.collapsed; save(); renderCnt(); }
function renItem(id,text){ const l=getL(); if(!l) return; const item=find(l.items,id); if(item){item.text=text.trim()||item.text;save();} }

function ikey(e,id){
  if(e.key==='Enter'){
    e.preventDefault(); const l=getL(); if(!l) return;
    const par=getpar(l.items,id); const arr=par?par.children:l.items;
    const idx=arr.findIndex(i=>i.id===id); const item=mkItem('');
    arr.splice(idx+1,0,item); save(); renderCnt(); setTimeout(()=>focI(item.id),60);
  }
  if(e.key==='Tab'){
    e.preventDefault(); const l=getL(); if(!l) return;
    const par=getpar(l.items,id); const arr=par?par.children:l.items;
    const idx=arr.findIndex(i=>i.id===id);
    if(!e.shiftKey&&idx>0){ const[item]=arr.splice(idx,1); arr[idx-1].children.push(item); arr[idx-1].collapsed=false; save(); renderCnt(); setTimeout(()=>focI(item.id),60); }
    else if(e.shiftKey&&par){ const[item]=arr.splice(idx,1); const gp=getpar(l.items,par.id); const pa=gp?gp.children:l.items; const pi=pa.findIndex(i=>i.id===par.id); pa.splice(pi+1,0,item); save(); renderCnt(); setTimeout(()=>focI(item.id),60); }
  }
}

reg('orcamento', {
  name:'OrГ§amento', icon:'рҹ’°', desc:'Soma valores e horas dos itens marcados', def:false,
  tb(){
    return `<button class="tbbtn" onclick="openOrcConfig()">рҹ’° MГЈo de obra</button>`;
  },
  renderSection(list){
    if(!pon('orcamento')) return '';
    return calcOrcamento(list);
  }
});

function parseValorItem(texto){
  // Captura nГәmero antes de palavras de dinheiro ou tempo
  // Ex: "10 reais", "1 hora", "30 minutos", "5 conto", "3 pilas"
  const money = /(\d+(?:[.,]\d+)?)\s*(?:reais?|real|contos?|pilas?|r\$)/gi;
  const hours  = /(\d+(?:[.,]\d+)?)\s*h(?:oras?|r)?(?:\b)/gi;
  const mins   = /(\d+(?:[.,]\d+)?)\s*min(?:utos?)?(?:\b)/gi;

  let totalMoney = 0;
  let totalMinutes = 0;

  let m;
  while((m = money.exec(texto)) !== null)
    totalMoney += parseFloat(m[1].replace(',','.'));
  while((m = hours.exec(texto)) !== null)
    totalMinutes += parseFloat(m[1].replace(',','.')) * 60;
  while((m = mins.exec(texto)) !== null)
    totalMinutes += parseFloat(m[1].replace(',','.'));

  return { totalMoney, totalMinutes };
}

function calcOrcamento(list){
  // Pega todos os itens MARCADOS recursivamente
  const checked = [];
  const walk = arr => arr.forEach(i => {
    if(i.checked) checked.push(i);
    if(i.children) walk(i.children);
  });
  walk(list.items);

  if(!checked.length) return `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px">
      <div style="font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace">
        рҹ’° Marque itens com valores para calcular o orГ§amento.
      </div>
    </div>`;

  const precoHora = parseFloat(S._orcPrecoHora || 100);

  let totalDinheiro = 0;
  let totalMinutos  = 0;
  const linhas = [];

  for(const item of checked){
    const { totalMoney, totalMinutes } = parseValorItem(item.text);
    if(totalMoney > 0 || totalMinutes > 0){
      const valorTempo = (totalMinutes / 60) * precoHora;
      const subtotal   = totalMoney + valorTempo;
      totalDinheiro   += totalMoney;
      totalMinutos    += totalMinutes;

      let descTempo = '';
      if(totalMinutes > 0){
        const h = Math.floor(totalMinutes/60);
        const min = Math.round(totalMinutes % 60);
        descTempo = h > 0 && min > 0 ? `${h}h ${min}min` : h > 0 ? `${h}h` : `${min}min`;
      }

      linhas.push(`
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
          <div style="font-size:12px;color:var(--text2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(item.text)}</div>
          <div style="font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text);flex-shrink:0;text-align:right">
            ${totalMoney>0 ? `<span style="color:var(--green)">R$ ${totalMoney.toFixed(2).replace('.',',')}</span>` : ''}
            ${descTempo ? `<span style="color:var(--blue);margin-left:6px">вҸұ ${descTempo}</span>` : ''}
            ${valorTempo>0 ? `<span style="color:var(--orange);margin-left:6px">+R$ ${valorTempo.toFixed(2).replace('.',',')}</span>` : ''}
          </div>
        </div>`);
    }
  }

  const valorTotalTempo = (totalMinutos / 60) * precoHora;
  const grandTotal      = totalDinheiro + valorTotalTempo;

  const hTotal   = Math.floor(totalMinutos/60);
  const minTotal = Math.round(totalMinutos % 60);
  const tempoStr = hTotal > 0 && minTotal > 0 ? `${hTotal}h ${minTotal}min` : hTotal > 0 ? `${hTotal}h` : minTotal > 0 ? `${minTotal}min` : '';

  if(!linhas.length) return `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px">
      <div style="font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace">
        рҹ’° Nenhum item marcado contГ©m valores ou horas reconhecГӯveis.
      </div>
    </div>`;

  return `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:4px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3)">рҹ’° OrГ§amento</div>
        <div style="font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3)">
          mГЈo de obra: R$ ${precoHora.toFixed(2).replace('.',',')}/h
        </div>
      </div>
      ${linhas.join('')}
      <div style="display:flex;justify-content:space-between;align-items:center;padding-top:10px;margin-top:4px">
        <div style="display:flex;flex-direction:column;gap:2px">
          ${tempoStr ? `<div style="font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--blue)">вҸұ ${tempoStr} Г— R$ ${precoHora.toFixed(2).replace('.',',')}/h = R$ ${valorTotalTempo.toFixed(2).replace('.',',')}</div>` : ''}
          ${totalDinheiro > 0 ? `<div style="font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--green)">рҹ’ө Materiais: R$ ${totalDinheiro.toFixed(2).replace('.',',')}</div>` : ''}
        </div>
        <div style="font-size:18px;font-weight:800;color:var(--accent)">R$ ${grandTotal.toFixed(2).replace('.',',')}</div>
      </div>
    </div>`;
}

    </div>
