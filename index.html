<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#7c6af7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ListFlow">
  <link rel="manifest" href="manifest.json">
  <title>ListFlow</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧰</text></svg>">
  <link rel="apple-touch-icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧰</text></svg>">
  <style>
    :root {
      --bg: #0e0e0f;
      --surface: #161618;
      --surface2: #1e1e21;
      --border: #2a2a2e;
      --accent: #7c6af7;
      --red: #e8565e;
      --green: #3ecf8e;
      --yellow: #e8c84a;
      --blue: #4fa7e8;
      --orange: #f0804b;
      --text: #e8e8ec;
      --text2: #888892;
      --text3: #55555e;
      --r: 10px;
      --sab: env(safe-area-inset-bottom, 0px);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent
    }

    html,
    body {
      height: 100%;
      overflow: hidden
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100dvh
    }

    /* ─── HEADER ─── */
    .hdr {
      display: flex;
      align-items: center;
      padding: 0 14px;
      height: 72px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 10px;
      z-index: 50
    }

    .logo {
      font-size: 18px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -.5px
    }

    .logo span {
      color: var(--text)
    }

    .hpill {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text3);
      border: 1px solid var(--border);
      padding: 2px 7px;
      border-radius: 20px
    }

    .hright {
      margin-left: auto;
      display: flex;
      gap: 6px
    }

    .ibtn {
      width: 36px;
      height: 46px;
      border-radius: var(--r);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      font-size: 17px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s
    }

    .ibtn:active {
      opacity: .7;
      transform: scale(.93)
    }

    /* ─── LAYOUT ─── */
    .body {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative
    }

    /* ─── SIDEBAR ─── */
    .sb-scroll {
      overflow-y: auto;
      padding: 1px 12px 2px 12px;
      height: 255px;
      transition: height .35s cubic-bezier(.4, 0, .2, 1);
      flex-shrink: 0;
    }

    .sb-scroll.expandido {
      height: 343px
    }

    .sb-scroll.recolhido {
      height: 115px
    }

    .sb-search {
      padding: 10px 12px 0;
      flex-shrink: 0;
    }

    .sb-search input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
      transition: border-color .2s;
    }

    .sb-search input:focus {
      border-color: var(--accent)
    }

    .sb-search input::placeholder {
      color: var(--text3)
    }

    /* ─── MAIN ─── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0
    }

    .tb {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      overflow-x: auto;
      scrollbar-width: none
    }

    .tb::-webkit-scrollbar {
      display: none
    }

    .tbsep {
      width: 1px;
      height: 33px;
      background: var(--border);
      flex-shrink: 0;
      margin: 0 2px;
    }

    .tbbtn {
      padding: 8px 7px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text2);
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
      display: flex;
      align-items: center;
      gap: 5px;
      flex-shrink: 0;
    }

    .tbbtn:active {
      opacity: .75;
      transform: scale(.97)
    }

    .tbbtn.pri {
      background: var(--accent);
      border-color: var(--accent);
      color: white
    }

    .srch {
      position: relative;
      flex-shrink: 0
    }

    .srch input {
      height: 33px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 0px 10px 0px 30px;
      outline: none;
      width: 150px;
      transition: all .2s;
    }

    .srch input:focus {
      border-color: var(--accent);
      width: 200px
    }

    .srch input::placeholder {
      color: var(--text3)
    }

    .sicon {
      position: absolute;
      right: 9px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      font-size: 13px;
      pointer-events: none
    }

    /* Esconde o botão em telas pequenas (menores que 768px) */
    @media (max-width: 767px) {
      .tbbtn.pri {
        display: none;
      }
    }

    /* ─── CONTENT ─── */
    .cnt {
      flex: 1;
      overflow: auto;
      padding: 16px;
      padding-bottom: calc(80px + var(--sab));
      display: flex;
      flex-direction: column;
      gap: 14px
    }

    .empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
      padding: 40px 20px;
      color: var(--text3)
    }

    .empty-ico {
      font-size: 60px;
      opacity: .2
    }

    .empty h2 {
      font-size: 18px;
      color: var(--text2)
    }

    .empty p {
      font-size: 13px;
      line-height: 1.7;
      max-width: 280px
    }

    .lhdr {
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .ltrow {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .ltinput {
      flex: 1;
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      background: transparent;
      border: none;
      color: var(--text);
      outline: none;
      border-bottom: 2px solid transparent;
      transition: border-color .2s;
      min-width: 0
    }

    .ltinput:focus {
      border-bottom-color: var(--accent)
    }

    /* ─── PROGRESS ─── */
    .prog {
      display: flex;
      flex-direction: column;
      gap: 4px
    }

    .pgbg {
      background: var(--surface2);
      border-radius: 99px;
      height: 5px;
      overflow: hidden
    }

    .pgfill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--green));
      border-radius: 99px;
      transition: width .4s cubic-bezier(.4, 0, .2, 1)
    }

    .pglabel {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text3)
    }

    /* ─── IMPORT ─── */
    .import {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden
    }

    .import summary {
      padding: 11px 14px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text2);
      font-weight: 600;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .import summary::-webkit-details-marker {
      display: none
    }

    .import-body {
      padding: 0 12px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .import-body textarea {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 10px;
      resize: vertical;
      min-height: 90px;
      outline: none;
      transition: border-color .2s;
      line-height: 1.7;
      width: 100%
    }

    .import-body textarea:focus {
      border-color: var(--accent)
    }

    .import-hint {
      font-size: 11px;
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace;
      line-height: 1.5
    }

    .import-acts {
      display: flex;
      gap: 8px;
      flex-wrap: wrap
    }

    /* ─── ITEMS ─── */
    pading .iblock {
      display: flex;
      flex-direction: column;
      min-width: max-content;
      width: 100%
    }

    .irow {
      display: flex;
      align-items: flex-start;
      gap: 5px;
      padding: 5px 6px;
      border-radius: 8px;
      transition: background .1s;
      min-width: max-content;
      width: 100%
    }

    .irow:active {
      background: var(--surface2)
    }

    .itog {
      padding: 14px 16px 14px 6px;
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      margin-top: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text3);
      font-size: 24px;
      border-radius: 4px;
      transition: all .15s;
      user-select: none;
    }

    .itog.nc {
      opacity: 0;
      pointer-events: none
    }

    .icb {
      width: 30px;
      height: 28px;
      flex-shrink: 0;
      margin-top: 5px;
      appearance: none;
      -webkit-appearance: none;
      border: 2px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      position: relative;
      transition: all .2s;
      background: transparent
    }

    .icb:checked {
      background: var(--accent);
      border-color: var(--accent)
    }

    .icb:checked::after {
      content: '';
      position: absolute;
      left: 7px;
      top: 4px;
      width: 6px;
      height: 10px;
      border: 2px solid white;
      border-left: none;
      border-top: none;
      transform: rotate(45deg)
    }

    .icb.par {
      border-color: var(--accent);
      /* background:rgba(124,106,247,.15) */
    }

    .icb.par::after {
      content: '';
      position: absolute;
      left: 7px;
      /* top:11px;
width:10px;
height:2px;
background:var(--accent); */
      border-radius: 1px
    }

    /* ibody ocupa toda a largura restante, texto nunca comprime */
    .ibody {
      flex: 1;
      min-width: 0;
      padding-top: 3px
    }

    .itext {
      font-size: 16px;
      line-height: 1.5;
      color: var(--text);
      outline: none;
      background: transparent;
      border: none;
      font-family: 'JetBrains Mono', monospace;
      cursor: text;
      white-space: pre-wrap;
      word-break: break-word;
      display: block;
      min-height: 20px
    }

    .itext.done {
      /* text-decoration: line-through; */
      color: var(--text3)
    }

    .imeta {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 5px;
      align-items: center
    }

    /* iend fica dentro do ibody, abaixo do texto — nunca na lateral */
    .iend {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 4px;
      flex-wrap: wrap
    }

    .iabtn {
      width: 43px;
      height: 22px;
      border-radius: 8px;
      border: none;
      background: var(--surface2);
      color: var(--text3);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .15s;
      flex-shrink: 0;
    }

    .iabtn:active {
      opacity: .7;
      transform: scale(.91)
    }

    .kids {
      padding-left: 20px;
      border-left: 1px solid var(--border);
      margin-left: 12px;
      min-width: max-content
    }

    .kids.col {
      display: none
    }

    /* ─── BADGES ─── */
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      padding: 2px 7px;
      border-radius: 20px;
      border: 1px solid;
      cursor: pointer;
      line-height: 1.4;
      white-space: nowrap
    }

    .tred {
      color: #e8565e;
      border-color: rgba(232, 86, 94, .4);
      background: rgba(232, 86, 94, .1)
    }

    .toran {
      color: #f0804b;
      border-color: rgba(240, 128, 75, .4);
      background: rgba(240, 128, 75, .1)
    }

    .tyel {
      color: #e8c84a;
      border-color: rgba(232, 200, 74, .4);
      background: rgba(232, 200, 74, .1)
    }

    .tgrn {
      color: #3ecf8e;
      border-color: rgba(62, 207, 142, .4);
      background: rgba(62, 207, 142, .1)
    }

    .tblu {
      color: #4fa7e8;
      border-color: rgba(79, 167, 232, .4);
      background: rgba(79, 167, 232, .1)
    }

    .tpur {
      color: #a57af0;
      border-color: rgba(165, 122, 240, .4);
      background: rgba(165, 122, 240, .1)
    }

    .tpnk {
      color: #e87ac8;
      border-color: rgba(232, 122, 200, .4);
      background: rgba(232, 122, 200, .1)
    }

    .due {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      padding: 2px 7px;
      border-radius: 20px;
      white-space: nowrap;
      cursor: pointer
    }

    .dnorm {
      color: var(--text3);
      background: var(--surface2);
      border: 1px solid var(--border)
    }

    .dsoon {
      color: #e8c84a;
      background: rgba(232, 200, 74, .1);
      border: 1px solid rgba(232, 200, 74, .3)
    }

    .dover {
      color: var(--red);
      background: rgba(232, 86, 94, .1);
      border: 1px solid rgba(232, 86, 94, .3)
    }

    .pribadge {
      font-size: 13px;
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      margin-top: 5px;
      background: var(--surface2)
    }

    .inote {
      font-size: 12px;
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace;
      line-height: 1.5;
      margin-top: 4px;
      border-left: 2px solid var(--border);
      padding-left: 8px;
      outline: none;
      word-break: break-word;
      min-height: 16px
    }

    .estbadge {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--blue);
      background: rgba(79, 167, 232, .1);
      border: 1px solid rgba(79, 167, 232, .3);
      padding: 2px 7px;
      border-radius: 20px;
      white-space: nowrap
    }

    /* plugin: recurrence */
    .recbadge {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--green);
      background: rgba(62, 207, 142, .1);
      border: 1px solid rgba(62, 207, 142, .3);
      padding: 2px 7px;
      border-radius: 20px;
      white-space: nowrap;
      cursor: pointer
    }

    /* plugin: listcolor */
    .lcbadge {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0
    }

    /* plugin: link */
    .linkbadge {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--blue);
      padding: 2px 7px;
      border-radius: 20px;
      background: rgba(79, 167, 232, .1);
      border: 1px solid rgba(79, 167, 232, .3);
      white-space: nowrap;
      text-decoration: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 3px
    }

    /* ─── EXPORT PANEL (plugin: export) ─── */
    .export-panel {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .export-pre {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text2);
      overflow-x: auto;
      white-space: pre;
      max-height: 160px;
      overflow-y: auto
    }

    /* ─── KANBAN (plugin: kanban) ─── */
    .kanban-wrap {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 8px;
      min-height: 200px
    }

    .kanban-col {
      min-width: 200px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      display: flex;
      flex-direction: column;
      flex-shrink: 0
    }

    .kanban-hdr {
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 700;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px
    }

    .kanban-body {
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1
    }

    .kanban-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.4;
      cursor: pointer;
      transition: all .15s
    }

    .kanban-card:active {
      opacity: .75
    }

    .kanban-card.done-card {
      text-decoration: line-through;
      color: var(--text3)
    }

    /* ─── FAB ─── */
    .fab {
      position: fixed;
      left: 18px;
      bottom: calc(148px + var(--sab));
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: white;
      font-size: 28px;
      cursor: pointer;
      box-shadow: 0 4px 22px rgba(124, 106, 247, .55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 30;
      transition: all .2s
    }

    .fab:active {
      transform: scale(.91)
    }

    @media(min-width:681px) {
      .fab {
        display: none
      }
    }

    /* ─── MODAL / BOTTOM SHEET ─── */
    .mback {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .65);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s
    }

    .mback.open {
      opacity: 1;
      pointer-events: all
    }

    .msheet {
      background: var(--surface);
      border-radius: 18px 18px 0 0;
      padding: 20px 20px calc(20px + var(--sab));
      width: 100%;
      max-width: 520px;
      max-height: 88vh;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transform: translateY(100%);
      transition: transform .3s cubic-bezier(.4, 0, .2, 1);
      overflow-y: auto
    }

    .mback.open .msheet {
      transform: translateY(0)
    }

    .mhandle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto -4px
    }

    .mtitle {
      text-align: center;
      font-size: 16px;
      font-weight: 700;
    }

    .macts {
      margin-top: 18px;
      display: flex;
      gap: 8px;
      flex-direction: row-reverse;
    }

    .fg {
      display: flex;
      flex-direction: column;
      gap: 6px
    }

    .fl {
      font-size: 12px;
      color: var(--text3);
      font-weight: 600;
      letter-spacing: .5px
    }

    input[type=text],
    input[type=date],
    input[type=url],
    input[type=number],
    select,
    .fta {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      padding: 5px 6px 5px 34px;
      outline: none;
      width: 100%;
      transition: border-color .2s
    }

    input:focus,
    select:focus,
    .fta:focus {
      border-color: var(--accent)
    }

    .fta {
      resize: vertical;
      min-height: 80px;
      font-size: 13px;
      font-family: 'JetBrains Mono', monospace;
      line-height: 1.7
    }

    .cpick {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding: 4px 0
    }

    .copt {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: all .15s
    }

    .copt.sel {
      border-color: white;
      transform: scale(1.18)
    }

    .co-red {
      background: #e8565e
    }

    .co-oran {
      background: #f0804b
    }

    .co-yel {
      background: #e8c84a
    }

    .co-grn {
      background: #3ecf8e
    }

    .co-blu {
      background: #4fa7e8
    }

    .co-pur {
      background: #a57af0
    }

    .co-pnk {
      background: #e87ac8
    }

    /* list color swatches */
    .lcswatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: all .15s
    }

    .lcswatch.sel {
      border-color: white;
      transform: scale(1.15)
    }

    .btn {
      margin-top: 11px;
      padding: 11px 16px;
      border-radius: var(--r);
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px
    }

    .btn:active {
      opacity: .75
    }

    .btn.pri {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      flex: 1
    }

    .btn.full {
      width: 100%
    }

    .btn.dng {
      margin-top: 1px;
      border-color: rgba(232, 86, 94, .4);
      color: var(--red)
    }

    .cpiece {
      position: fixed;
      width: 8px;
      height: 8px;
      z-index: 999;
      animation: cfal 1.2s ease-in forwards;
      pointer-events: none
    }

    @keyframes cfal {
      0% {
        transform: translateY(0) rotate(0);
        opacity: 1
      }

      100% {
        transform: translateY(100vh) rotate(720deg);
        opacity: 0
      }
    }

    ::-webkit-scrollbar {
      width: 4px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px
    }

    .search-hidden {
      display: none !important
    }

    .smatch {
      color: var(--green) !important
    }

    /* ─── GUIDE MODAL ─── */
    .guide-block {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px
    }

    .guide-block h4 {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 6px
    }

    .guide-block p,
    .guide-block li {
      font-size: 12px;
      color: var(--text2);
      line-height: 1.7;
      font-family: 'JetBrains Mono', monospace
    }

    .guide-block ul {
      padding-left: 16px;
      display: flex;
      flex-direction: column;
      gap: 2px
    }

    code {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--accent)
    }

    /* ─── VIEW TOGGLE ─── */
    .view-tabs {
      display: flex;
      gap: 6px
    }

    .vtab {
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text3);
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s
    }

    .vtab.on {
      background: var(--accent);
      border-color: var(--accent);
      color: white
    }

    .vtab:active {
      opacity: .75
    }

    .pg::-webkit-scrollbar {
      width: 3px
    }

    .pg::-webkit-scrollbar-track {
      background: transparent
    }

    .pg::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px
    }

    .lents::-webkit-scrollbar {
      width: 3px
    }

    .lents::-webkit-scrollbar-track {
      background: transparent
    }

    .lents::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px
    }

    /* x nas barras de pesquisa */
    .srch {
      position: relative;
      flex-shrink: 0
    }

    .srch-clear {
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text3);
      font-size: 14px;
      cursor: pointer;
      padding: 2px;
      line-height: 1;
      display: none;
    }

    .srch-clear.visible {
      display: flex;
      align-items: center;
      justify-content: center
    }

    .sb-search {
      position: relative;
      padding: 10px 12px 0
    }

    /* ─── SIDEBAR ─── */
    .sidebar {
      width: 270px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden;
      transition: transform .3s cubic-bezier(.4, 0, .2, 1);
      z-index: 40;
    }

    @media(max-width:680px) {
      .sidebar {
        position: absolute;
        top: 0;
        left: 0;
        bottom: 0;
        transform: translateX(-100%);
        box-shadow: 6px 0 30px rgba(0, 0, 0, .6)
      }

      .sidebar.open {
        transform: translateX(0)
      }

      .overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, .55);
        z-index: 39;
        display: none
      }

      .overlay.open {
        display: block
      }
    }

    @media(min-width:681px) {
      .overlay {
        display: none !important
      }

      .mbtn {
        display: none !important
      }
    }

    /* Cabeçalho fixo da sidebar */
    .sb-header {
      padding: 12px 12px 0;
      flex-shrink: 0;
    }

    /* Busca */
    .sb-search-wrap {
      position: relative;
      padding: 10px 12px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    .sb-search-wrap input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      padding: 8px 32px 8px 12px;
      outline: none;
      transition: border-color .2s;
    }

    .sb-search-wrap input:focus {
      border-color: var(--accent)
    }

    .sb-search-wrap input::placeholder {
      color: var(--text3)
    }

    .sb-clear {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text3);
      font-size: 14px;
      cursor: pointer;
      padding: 2px;
      line-height: 1;
      display: none;
    }

    .sb-clear.visible {
      display: flex;
      align-items: center;
      justify-content: center
    }

    /* Seções com scroll independente */
    .sb-section {
      display: flex;
      flex-direction: column;
      min-height: 0;
      transition: flex .35s cubic-bezier(.4, 0, .2, 1);
    }

    .sb-section.expandido {
      flex: 3
    }

    .sb-section.recolhido {
      flex: 0.6
    }

    .sb-section:not(.expandido):not(.recolhido) {
      flex: 1
    }

    .sb-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px 6px;
      flex-shrink: 0;
      cursor: pointer;
      user-select: none;
    }

    .sb-section-header:active {
      opacity: .7
    }

    .sb-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text3);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sb-label-count {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text3);
      border: 1px solid var(--border);
      padding: 1px 6px;
      border-radius: 20px;
      font-weight: 400;
      text-transform: none;
      letter-spacing: 0;
    }

    .sb-section-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0 8px 8px;
      min-height: 0;
    }

    .sb-section-body::-webkit-scrollbar {
      width: 3px
    }

    .sb-section-body::-webkit-scrollbar-track {
      background: transparent
    }

    .sb-section-body::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px
    }

    /* Divisor entre seções */
    .sb-divider {
      height: 1px;
      background: var(--border);
      flex-shrink: 0;
      margin: 0;
    }

    /* Plugin rows */
    .pg {
      display: flex;
      flex-direction: column;
      gap: 2px
    }

    .prow {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 6px;
      border-radius: var(--r);
      cursor: pointer;
      transition: background .15s;
      border: 1px solid transparent;
      user-select: none;
    }

    .prow:active {
      opacity: .8
    }

    .prow.on {
      background: rgba(124, 106, 247, .1);
      border-color: rgba(124, 106, 247, .2)
    }

    .prow.sb-hidden {
      display: none
    }

    .picon {
      font-size: 16px;
      width: 20px;
      text-align: center;
      flex-shrink: 0
    }

    .pinfo {
      flex: 1;
      min-width: 0
    }

    .pname {
      font-size: 12px;
      font-weight: 600;
      color: var(--text2)
    }

    .prow.on .pname {
      color: var(--accent)
    }

    .pdesc {
      font-size: 10px;
      color: var(--text3);
      margin-top: 1px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .tpill {
      width: 32px;
      height: 18px;
      border-radius: 9px;
      background: var(--border);
      position: relative;
      transition: background .2s;
      flex-shrink: 0;
    }

    .tpill::after {
      content: '';
      position: absolute;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: white;
      top: 3px;
      left: 3px;
      transition: transform .2s;
    }

    .prow.on .tpill {
      background: var(--accent)
    }

    .prow.on .tpill::after {
      transform: translateX(14px)
    }

    /* Lista entries */
    .lents {
      display: flex;
      flex-direction: column;
      gap: 2px
    }

    .lent {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 6px;
      border-radius: var(--r);
      cursor: pointer;
      transition: background .15s;
      border: 1px solid transparent;
    }

    .lent:active {
      opacity: .8
    }

    .lent.on {
      background: rgba(124, 106, 247, .1);
      border-color: rgba(124, 106, 247, .2)
    }

    .lent.sb-hidden {
      display: none
    }

    .ldot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      opacity: .4
    }

    .lent.on .ldot {
      opacity: 1
    }

    .lname {
      flex: 1;
      font-size: 13px;
      color: var(--text2);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap
    }

    .lent.on .lname {
      color: var(--text)
    }

    .lcnt {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text3);
      flex-shrink: 0
    }

    .ldel {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      border: none;
      background: transparent;
      color: var(--text3);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity .15s;
    }

    .lent:hover .ldel,
    .lent:active .ldel {
      opacity: 1
    }

    /* Rodapé */
    .sb-foot {
      padding: 10px 12px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .nlbtn {
      width: 100%;
      padding: 10px;
      border-radius: var(--r);
      background: rgba(124, 106, 247, .1);
      border: 1px dashed rgba(124, 106, 247, .35);
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .nlbtn:active {
      background: rgba(124, 106, 247, .2)
    }

    .guidebtn {
      width: 100%;
      padding: 8px;
      border-radius: var(--r);
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text3);
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .guidebtn:active {
      opacity: .7
    }
  </style>
</head>

<body>

  <div class="body">
    <div class="overlay" id="ov" onclick="closeSB()"></div>
    <aside class="sidebar" id="sb">

      <!-- Seção Plugins -->
      <div class="sb-section" id="sbSectionPlugins" onmouseenter="_sbExpandir('plugins')"
        ontouchstart="_sbExpandir('plugins')">
        <div class="sb-section-header" onclick="_sbExpandir('plugins')">
          <div class="sb-label">
            🔌 Plugins
            <span class="sb-label-count" id="sbPluginCount"></span>
          </div>
          <span style="font-size:10px;color:var(--text3)" id="sbPluginArrow">▼</span>
        </div>
        <div class="sb-section-body">
          <div class="pg" id="pg"></div>
        </div>
      </div>

      <div class="sb-divider"></div>

      <!-- Seção Listas -->
      <div class="sb-section" id="sbSectionListas" onmouseenter="_sbExpandir('listas')"
        ontouchstart="_sbExpandir('listas')">
        <div class="sb-section-header" onclick="_sbExpandir('listas')">
          <div class="sb-label">
            📋 Listas
            <span class="sb-label-count" id="hpill">0</span>
          </div>
          <span style="font-size:10px;color:var(--text3)" id="sbListasArrow">▼</span>
        </div>
        <div class="sb-section-body">
          <div class="lents" id="lents"></div>
        </div>
      </div>

      <!-- Busca unificada no topo -->
      <div class="sb-search-wrap">
        <input type="text" id="sbSearch" placeholder="🔍 Buscar plugin ou lista..."
          oninput="filterSB(this.value);toggleSbClear(this)">
        <button class="sb-clear" id="sbClear" onclick="clearSBSearch()" title="Limpar">✕</button>
      </div>

      <!-- Rodapé -->
      <div class="sb-foot">
        <button class="nlbtn" onclick="newList()">＋ Nova lista</button>
        <button class="guidebtn" onclick="openGuide()">📖 Como criar um plugin</button>
      </div>

    </aside>

    <div class="main">

      <div class="cnt" id="cnt">
        <div class="empty" id="es">
          <div class="empty-ico">☑</div>
          <h2>Sem lista ativa</h2>
          <p>Crie uma lista pelo menu lateral ou pelo botão abaixo.</p>
          <button class="btn pri" onclick="newList()" style="margin-top:8px;flex:0;padding:12px 28px">＋ Criar
            lista</button>
        </div>
        <div id="lv" style="display:none;flex-direction:column;gap:14px"></div>
      </div>
    </div>
  </div>

  <button class="fab" id="fab" onclick="addItem()" style="display:none">＋</button>
  <div class="tb" id="tb"></div>
  <div class="mback" id="mb" onclick="onBD(event)">
    <div class="msheet" id="ms">
      <div class="mhandle"></div>
      <div id="mc"></div>
    </div>
  </div>
  <div class="hdr">
    <button class="ibtn mbtn" onclick="toggleSB()">☰</button>
    <div class="logo">List<span>Flow</span></div>

    <div class="hright">
      <button class="ibtn" onclick="exportJ()" title="Exportar JSON">⬆</button>
      <button class="ibtn" onclick="importJ()" title="Importar JSON">⬇</button>
    </div>
  </div>
  <script>
    // ══════════════════════════════════════════════════════
    //  CORE STATE
    // ══════════════════════════════════════════════════════
    let S = { lists: [], active: null, plugins: {} };
    const save = () => localStorage.setItem('lf4', JSON.stringify(S));
    function load() { try { const r = localStorage.getItem('lf4'); if (r) S = JSON.parse(r); } catch (e) { } }
    const genId = () => Math.random().toString(36).slice(2, 10);
    const esc = s => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    const getL = () => S.lists.find(l => l.id === S.active) || null;

    // ══════════════════════════════════════════════════════
    //  PLUGIN SYSTEM
    //
    //  Para criar um plugin, use:
    //    reg('meu-plugin', { ...definição... })
    //
    //  Campos disponíveis:
    //    name      → nome exibido na sidebar
    //    icon      → emoji do plugin
    //    desc      → descrição curta
    //    def       → true = ativo por padrão
    //    onToggle(active) → chamado ao ligar/desligar
    //    tb()      → retorna HTML para a toolbar
    //    hdr(list) → retorna HTML no topo da lista (abaixo do título)
    //    pfx(item) → retorna HTML antes do checkbox (ex: ícone de prioridade)
    //    meta(item)→ retorna HTML de badges abaixo do texto do item
    //    abtn(item)→ retorna HTML de botão de ação no final da linha
    //    extra(item)→ retorna HTML extra abaixo do meta (ex: notas)
    //    renderSection(list) → retorna HTML de seção extra (abaixo dos itens)
    // ══════════════════════════════════════════════════════
    const PL = {};
    const reg = (id, def) => PL[id] = { id, ...def };
    const pon = id => !!S.plugins[id];
    const togP = id => {
      // ══════════════════════════════════════════════════════
      //  HOOK SYSTEM — plugins se auto-instalam
      //  Cada plugin pode declarar:
      //    onInit()        → roda uma vez no boot (injetar CSS, etc)
      //    onRenderCnt()   → roda no início do renderCnt (pode retornar true para substituir toda a view)
      //    onRenderTop(lv, list) → roda antes da árvore, recebe o container lv e a lista
      //    onRenderBottom(lv, list) → roda depois da árvore
      // ══════════════════════════════════════════════════════
      function runHook(hook, ...args) {
        for (const p of Object.values(PL)) {
          if (pon(p.id) && p[hook]) {
            const result = p[hook](...args);
            if (result === true) return true; // plugin tomou conta da view
          }
        }
        return false;
      }
      S.plugins[id] = !S.plugins[id];
      if (PL[id]?.onToggle) PL[id].onToggle(S.plugins[id]);
      save(); renderAll();
    };

    // ══════════════════════════════════════════════════════
    //  PLUGINS EXISTENTES
    // ══════════════════════════════════════════════════════

    // ── 1. PROGRESSO ──────────────────────────────────────
    reg('progress', {
      name: 'Barra de Progresso', icon: '📊', desc: 'Mostra % de conclusão da lista', def: true,
      hdr(list) {
        const { d, t } = cp(list.items); const p = t ? Math.round(d / t * 100) : 0;
        return `<div class="prog"><div class="pgbg"><div class="pgfill" style="width:${p}%"></div></div>
      <div class="pglabel">${d} de ${t} concluídos — ${p}%</div></div>`;
      }
    });

    // ── 2. TAGS ───────────────────────────────────────────
    reg('tags', {
      name: 'Tags coloridas', icon: '🏷️', desc: 'Etiquetas coloridas nos itens', def: false,
      tb() { return `<button class="tbbtn" onclick="openTagM()">🏷️ Tag</button>`; },
      meta(item) {
        if (!item.tags?.length) return '';
        const cm = { red: 'tred', orange: 'toran', yellow: 'tyel', green: 'tgrn', blue: 'tblu', purple: 'tpur', pink: 'tpnk' };
        return item.tags.map(t => `<span class="tag ${cm[t.color] || 'tblu'}" onclick="rmTag('${item.id}','${esc(t.label)}')">${esc(t.label)} ✕</span>`).join('');
      }
    });

    // ── 3. PRAZO ──────────────────────────────────────────
    reg('duedate', {
      name: 'Prazo', icon: '📅', desc: 'Data limite nos itens', def: false,
      abtn(item) { return `<button class="iabtn" onclick="setDue('${item.id}')">📅</button>`; },
      meta(item) {
        if (!item.due) return '';
        const d = new Date(item.due + 'T12:00:00'), t = new Date(); t.setHours(0, 0, 0, 0);
        const df = Math.round((d - t) / 86400000);
        const cls = df < 0 ? 'dover' : df <= 2 ? 'dsoon' : 'dnorm';
        const lb = df < 0 ? `Atrasado ${Math.abs(df)}d` : df === 0 ? 'Hoje' : df === 1 ? 'Amanhã' : d.toLocaleDateString('pt-BR');
        return `<span class="due ${cls}" onclick="setDue('${item.id}')">📅 ${lb}</span>`;
      }
    });

    // ── 4. PRIORIDADE ─────────────────────────────────────
    reg('priority', {
      name: 'Prioridade', icon: '🔥', desc: 'Alta / Média / Baixa por item', def: false,
      pfx(item) {
        const m = { high: '🔴', mid: '🟡', low: '🟢', none: '·' };
        return `<span class="pribadge" title="Prioridade: ${item.priority || 'none'}" onclick="cycP('${item.id}')">${m[item.priority || 'none']}</span>`;
      }
    });

    // ── 5. BUSCA ──────────────────────────────────────────
    reg('search', {
      name: 'Busca', icon: '🔍', desc: 'Filtra itens em tempo real', def: true,
      tb() { return `<div class="srch"><span class="sicon">🔍</span><input placeholder="Buscar..." oninput="doSearch(this.value);toggleSrchClear(this)" id="si"><button class="srch-clear" id="srchClear" onclick="clearSearch()" title="Limpar">✕</button></div>`; }
    });

    reg('notes', {

    // ══════════════════════════════════════════════════════
    //  NOVOS PLUGINS

    // ══════════════════════════════════════════════════════
    //  GUIA: COMO CRIAR UM PLUGIN
    // ══════════════════════════════════════════════════════
    function openGuide() {
      openM('📖 Como criar um plugin', `
    <div style="display:flex;flex-direction:column;gap:12px">

      <div class="guide-block">
        <h4>⚡ Estrutura básica</h4>
        <p>Adicione este bloco antes da linha <code>// ── BOOT ──</code> no HTML:</p>
        <pre style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);overflow-x:auto;margin-top:4px">reg('meu-plugin', {
  name: 'Meu Plugin',
  icon: '⭐',
  desc: 'O que ele faz',
  def:  false,  // true = ativo por padrão
});</pre>
      </div>

      <div class="guide-block">
        <h4>🎛️ Campos disponíveis</h4>
        <ul>
          <li><code>tb()</code> → botão na toolbar</li>
          <li><code>hdr(list)</code> → HTML no topo da lista</li>
          <li><code>pfx(item)</code> → ícone antes do checkbox</li>
          <li><code>meta(item)</code> → badges abaixo do texto</li>
          <li><code>abtn(item)</code> → botão de ação no item</li>
          <li><code>extra(item)</code> → área extra abaixo do meta</li>
          <li><code>onToggle(on)</code> → ao ativar/desativar</li>
        </ul>
      </div>

      <div class="guide-block">
        <h4>💾 Salvar dados no item</h4>
        <p>Use <code>item.meuCampo</code> livremente. O sistema salva tudo automaticamente.</p>
        <p style="margin-top:4px">Exemplo: <code>item.rating = 5</code> e depois leia com <code>item.rating</code>.</p>
      </div>

      <div class="guide-block">
        <h4>🗃️ Dados globais</h4>
        <p>Salve dados no objeto <code>S</code> (state global).</p>
        <p style="margin-top:4px">Exemplo: <code>S.meuDado = 'valor'</code></p>
        <p>Depois chame <code>save()</code> para persistir.</p>
      </div>

      <div class="guide-block">
        <h4>🔔 Ações e eventos</h4>
        <p>Crie funções globais com <code>function minhaAcao(){...}</code> e chame nos botões com <code>onclick="minhaAcao()"</code>.</p>
        <p style="margin-top:4px">Para abrir o modal use: <code>openM('Título', htmlBody, callbackAoConfirmar)</code>.</p>
        <p style="margin-top:4px">Para re-renderizar: <code>renderCnt()</code> ou <code>renderAll()</code>.</p>
      </div>

      <div class="guide-block">
        <h4>📋 Exemplo completo — plugin "Estrelas"</h4>
        <pre style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);overflow-x:auto;line-height:1.7">reg('stars', {
  name: 'Avaliação ⭐',
  icon: '⭐',
  desc: 'Dê estrelas aos itens',
  def: false,

  // Botão que aparece em cada item
  abtn(item) {
    return \`&lt;button class="iabtn"
      onclick="setStars('\${item.id}')">⭐&lt;/button>\`;
  },

  // Badge exibido abaixo do texto
  meta(item) {
    if(!item.stars) return '';
    return '⭐'.repeat(item.stars);
  }
});

function setStars(id) {
  const l = getL();
  const item = find(l.items, id);
  openM('Avaliar item', \`
    &lt;div class="fg">
      &lt;div class="fl">Estrelas (1-5)&lt;/div>
      &lt;input type="number" id="mst"
        min="1" max="5"
        value="\${item?.stars||3}">
    &lt;/div>
  \`, () => {
    const v = +document.getElementById('mst').value;
    if(item) { item.stars = v; save(); renderCnt(); }
  });
}</pre>
      </div>

    </div>
  `, null);
    }

    // ══════════════════════════════════════════════════════
    //  HELPERS DO CORE
    // ══════════════════════════════════════════════════════
    const mkItem = t => ({ id: genId(), text: t, checked: false, collapsed: false, children: [], tags: [], due: null, priority: 'none', note: '', estimate: '', recurrence: null, link: null });
    function find(items, id) { for (const i of items) { if (i.id === id) return i; if (i.children) { const f = find(i.children, id); if (f) return f; } } return null; }
    function remove(items, id) { for (let i = 0; i < items.length; i++) { if (items[i].id === id) { items.splice(i, 1); return true; } if (items[i].children && remove(items[i].children, id)) return true; } return false; }
    function getpar(items, id, par = null) { for (const i of items) { if (i.id === id) return par; if (i.children) { const f = getpar(i.children, id, i); if (f !== undefined) return f; } } }
    function cp(items) { let d = 0, t = 0; const w = a => { for (const i of (a || [])) { t++; if (i.checked) d++; w(i.children) } }; w(items); return { d, t }; }

    function parseT(text) {
      const lines = text.split('\n').filter(l => l.trim()), root = [], stack = [{ ch: root, ind: -1 }];
      for (const line of lines) {
        const raw = line.replace(/^[\s\t]*[-*+]?\s*(\[[xX ]\])?\s*/, '');
        const checked = /\[[xX]\]/.test(line);
        const ind = line.search(/\S/);
        const item = mkItem(raw.trim()); item.checked = checked;
        while (stack.length > 1 && stack[stack.length - 1].ind >= ind) stack.pop();
        stack[stack.length - 1].ch.push(item);
        stack.push({ ch: item.children, ind });
      }
      return root;
    }

    // ══════════════════════════════════════════════════════
    //  RENDER
    // ══════════════════════════════════════════════════════
    function renderAll() { renderSB(); renderTB(); renderCnt(); }

    function renderSB() {
      document.getElementById('pg').innerHTML = Object.values(PL).map(p => `
    <div class="prow ${pon(p.id) ? 'on' : ''}" onclick="togP('${p.id}')">
      <span class="picon">${p.icon}</span>
      <div class="pinfo"><div class="pname">${p.name}</div><div class="pdesc">${p.desc}</div></div>
      <div class="tpill"></div>
    </div>`).join('');

      document.getElementById('lents').innerHTML = S.lists.map(l => {
        const { d, t } = cp(l.items); const on = l.id === S.active;
        const c = l.color || '#3ecf8e';
        return `<div class="lent ${on ? 'on' : ''}" onclick="selL('${l.id}');closeSB()">
      <div class="ldot" style="background:${c}"></div>
      <div class="lname">${esc(l.name)}</div>
      <div class="lcnt">${d}/${t}</div>
      <button class="ldel" onclick="event.stopPropagation();confirmarDel('lista','${l.id}')">✕</button>
      </div>`;
      }).join('');

      document.getElementById('hpill').textContent = `${S.lists.length} lista${S.lists.length !== 1 ? 's' : ''}`;
    }
    function filterSB(q) {
      const qu = (q || '').toLowerCase().trim();

      // Filtra plugins
      let visP = 0;
      document.querySelectorAll('#pg .prow').forEach(row => {
        const nome = row.querySelector('.pname')?.textContent?.toLowerCase() || '';
        const desc = row.querySelector('.pdesc')?.textContent?.toLowerCase() || '';
        const hide = qu && !nome.includes(qu) && !desc.includes(qu);
        row.classList.toggle('sb-hidden', hide);
        if (!hide) visP++;
      });
      const pc = document.getElementById('sbPluginCount');
      if (pc) pc.textContent = qu ? `${visP} encontrados` : '';

      // Filtra listas
      document.querySelectorAll('#lents .lent').forEach(row => {
        const nome = row.querySelector('.lname')?.textContent?.toLowerCase() || '';
        row.classList.toggle('sb-hidden', qu && !nome.includes(qu));
      });
    }
    function renderTB() {
      const parts = [
        `<button class="tbbtn pri" onclick="addItem()">＋ Item</button>`,
        `<div class="tbsep"></div>`,
        `<button class="tbbtn" onclick="collapseAll()">⏫</button>`, // ⤵
        `<button class="tbbtn" onclick="resetAll()">🔁</button>`// ↺
      ];
      Object.values(PL).forEach(p => {
        if (pon(p.id) && p.tb) { const h = p.tb(); if (h) { parts.push('<div class="tbsep"></div>'); parts.push(h); } }
      });
      document.getElementById('tb').innerHTML = parts.join('');
    }
    function collapseAll() {
      const l = getL(); if (!l) return;
      const walk = arr => arr.forEach(i => { i.collapsed = true; if (i.children?.length) walk(i.children); });
      walk(l.items); save(); renderCnt();
    }

    function resetAll() {
      const l = getL(); if (!l) return;
      const walk = arr => arr.forEach(i => { i.checked = false; if (i.children?.length) walk(i.children); });
      walk(l.items); save(); renderCnt();
    }
    function renderCnt() {
      const list = getL();
      const es = document.getElementById('es'), lv = document.getElementById('lv'), fab = document.getElementById('fab');
      if (!list) { es.style.display = 'flex'; lv.style.display = 'none'; fab.style.display = 'none'; return; }
      es.style.display = 'none'; lv.style.display = 'flex';

      // Hook onRenderCnt — plugin pode substituir toda a view (quiz, foco, etc)
      lv.innerHTML = '';
      fab.style.display = 'flex';
      for (const p of Object.values(PL)) {
        if (pon(p.id) && p.onRenderCnt) {
          const took = p.onRenderCnt(lv, list);
          if (took) { fab.style.display = 'none'; return; }
        }
      }

      // View normal
      const hdr = document.createElement('div'); hdr.className = 'lhdr';
      let hdrHtml = `<div class="ltrow"><input class="ltinput" value="${esc(list.name)}" onchange="renL('${list.id}',this.value)" onblur="renL('${list.id}',this.value)"></div>`;
      Object.values(PL).forEach(p => { if (pon(p.id) && p.hdr) { const h = p.hdr(list); if (h) hdrHtml += h; } });
      hdr.innerHTML = hdrHtml;
      lv.appendChild(hdr);

      // Hook onRenderTop — antes da árvore (ex: kanban substitui)
      let tookTop = false;
      for (const p of Object.values(PL)) {
        if (pon(p.id) && p.onRenderTop) {
          const took = p.onRenderTop(lv, list);
          if (took) { tookTop = true; break; }
        }
      }

      if (!tookTop) {
        // Import
        const imp = document.createElement('details'); imp.className = 'import';
        imp.innerHTML = `<summary>📋 Importar por texto</summary>
      <div class="import-body">
        <textarea id="ita" placeholder="Um item por linha. Indente para sub-itens:
- Tarefa principal
  - Sub-tarefa
[x] Item já marcado"></textarea>
        <div class="import-acts">
          <button class="btn pri" style="flex:1" onclick="doImport()">Importar</button>
          <button class="btn" onclick="document.getElementById('ita').value=''">Limpar</button>
        </div>
        <div class="import-hint">Prefixos: -, *, + • [x] = marcado • Espaços = aninhamento</div>
      </div>`;
        lv.appendChild(imp);

        // Árvore de itens
        const tree = document.createElement('div'); tree.id = 'it';
        rTree(list.items, tree);
        lv.appendChild(tree);

      }

      // Hook onRenderBottom — depois da árvore (ex: orçamento)
      Object.values(PL).forEach(p => {
        if (pon(p.id) && p.onRenderBottom) p.onRenderBottom(lv, list);
      });

      // Restaura busca ativa após re-render preservando scroll
      const _si = document.getElementById('si');
      if (_si && _si.value.trim()) {
        const _cnt = document.getElementById('cnt');
        const _scrollPos = _cnt?.scrollTop || 0;
        doSearch(_si.value, true); // true = modo silencioso, não recolhe filhos expandidos
        setTimeout(() => { if (_cnt) _cnt.scrollTop = _scrollPos; }, 30);
      }
    }

    function rTree(items, cont) {
      for (const item of items) {
        const blk = document.createElement('div'); blk.className = 'iblock';
        const row = document.createElement('div'); row.className = 'irow'; row.dataset.id = item.id;
        const hk = !!item.children?.length;

        let cbcls = '';
        if (hk) {
          const { d, t } = cp(item.children);
          if (d > 0 && d < t) cbcls = 'par';
        }

        let pfx = ''; Object.values(PL).forEach(p => { if (pon(p.id) && p.pfx) pfx += p.pfx(item) || ''; });
        let abtns = `<button class="iabtn" title="Sub-item" onclick="addSub('${item.id}')">⊕</button>`;
        abtns += pon('mover') ? `<button class="iabtn" title="Mover / Indentar" onclick="abrirMenuMover('${item.id}',this)">⇅</button>` : '';
        Object.values(PL).forEach(p => { if (pon(p.id) && p.abtn) abtns += p.abtn(item) || ''; });
        abtns += `<button class="iabtn" onclick="confirmarDel('item','${item.id}')" style="color:var(--red);opacity:.7">✕</button>`;
        let meta = ''; Object.values(PL).forEach(p => { if (pon(p.id) && p.meta) meta += p.meta(item) || ''; });
        let extra = ''; Object.values(PL).forEach(p => { if (pon(p.id) && p.extra) extra += p.extra(item) || ''; });

        row.innerHTML = `${pfx}
      <span class="itog ${hk ? '' : 'nc'}" onclick="togCol('${item.id}')">${item.collapsed ? '▶' : '▼'}</span>
      <input type="checkbox" class="icb ${cbcls}" ${item.checked ? 'checked' : ''} onchange="togChk('${item.id}',this.checked)">
      <div class="ibody">
        ${(pon('audio') && item.text && item.text.includes('⟨🎙'))
            ? `<div class="itext-rich ${item.checked ? 'done' : ''}">${renderRichText(item)}</div>`
            : `<div class="itext ${item.checked ? 'done' : ''}" contenteditable="true" spellcheck="false"
            onblur="renItem('${item.id}',this.innerText)"
            onkeydown="ikey(event,'${item.id}')">${esc(item.text).replace(/\n/g, '<br>')}</div>`
          }
        ${meta ? `<div class="imeta">${meta}</div>` : ''}
        ${extra}
        <div class="iend">${abtns}</div>
      </div>`;

        blk.appendChild(row);
        if (hk) {
          const ch = document.createElement('div'); ch.className = `kids ${item.collapsed ? 'col' : ''}`;
          ch.id = `ch-${item.id}`;
          rTree(item.children, ch); blk.appendChild(ch);
        }
        cont.appendChild(blk);
      }
    }

    // ══════════════════════════════════════════════════════
    //  SIDEBAR / MOBILE
    // ══════════════════════════════════════════════════════
    function toggleSB() { document.getElementById('sb').classList.toggle('open'); document.getElementById('ov').classList.toggle('open'); }
    function closeSB() { document.getElementById('sb').classList.remove('open'); document.getElementById('ov').classList.remove('open'); }

    // ══════════════════════════════════════════════════════
    //  AÇÕES DE LISTA
    // ══════════════════════════════════════════════════════
    function newList() {
      openM('Nova Lista', `<div class="fg"><div class="fl">Nome</div><input type="text" id="mn" placeholder="Ex: Compras, Trabalho..."></div>`, () => {
        const name = document.getElementById('mn').value.trim() || 'Nova Lista';
        const l = { id: genId(), name, items: [], color: '#3ecf8e' };
        S.lists.push(l); S.active = l.id; save(); renderAll();
      });
    }
    function selL(id) { S.active = id; S._view = 'list'; save(); renderCnt(); renderSB(); }
    function delL(id) { S.lists = S.lists.filter(l => l.id !== id); if (S.active === id) S.active = S.lists[0]?.id || null; save(); renderAll(); }
    function renL(id, name) { const l = S.lists.find(l => l.id === id); if (l && name.trim()) { l.name = name.trim(); save(); renderSB(); } }

    // ══════════════════════════════════════════════════════
    //  AÇÕES DE ITEM
    // ══════════════════════════════════════════════════════
    function addItem() { const l = getL(); if (!l) return; const item = mkItem(''); l.items.push(item); save(); renderCnt(); setTimeout(() => focI(item.id), 60); }
    function addSub(pid) { const l = getL(); if (!l) return; const par = find(l.items, pid); if (!par) return; const item = mkItem(''); par.children.push(item); par.collapsed = false; save(); renderCnt(); setTimeout(() => focI(item.id), 60); }
    function focI(id) { const el = document.querySelector(`[data-id="${id}"] .itext`); if (!el) return; el.focus(); const r = document.createRange(); r.selectNodeContents(el); window.getSelection().removeAllRanges(); window.getSelection().addRange(r); }
    function delItem(id) { const l = getL(); if (!l) return; remove(l.items, id); save(); renderCnt(); }

    function togChk(id, v) {
      const l = getL(); if (!l) return;
      const item = find(l.items, id); if (!item) return;
      item.checked = v;

      // Hook treino
      if (pon('treino') && v) {
        const pai = getpar(l.items, id);
        const ehFolha = !item.children || item.children.length === 0;
        // Só dispara descanso se tem pai E não tem filhos
        if (pai !== null && ehFolha) treinoIniciarDescanso(item);
      }

      save();
      if (pon('celebrate') && v) { const { d, t } = cp(l.items); if (d === t && t > 0) confetti(); }
      renderCnt();
      renderSB();
    }

    function togCol(id) { const l = getL(); if (!l) return; const item = find(l.items, id); if (!item) return; item.collapsed = !item.collapsed; save(); renderCnt(); }
    function renItem(id, text) { const l = getL(); if (!l) return; const item = find(l.items, id); if (item) { item.text = text.trim() || item.text; save(); } }

    function ikey(e, id) {
      if (e.key === 'Enter') {
        if (e.shiftKey) {
          // Shift+Enter = cria novo item (comportamento antigo)
          e.preventDefault();
          const l = getL(); if (!l) return;
          const par = getpar(l.items, id); const arr = par ? par.children : l.items;
          const idx = arr.findIndex(i => i.id === id); const item = mkItem('');
          arr.splice(idx + 1, 0, item); save(); renderCnt(); setTimeout(() => focI(item.id), 60);
        }
        // Enter normal = quebra linha dentro do item (comportamento padrão do contenteditable)
        // Não faz nada — deixa o browser inserir \n naturalmente
      }
      if (e.key === 'Tab') {
        e.preventDefault(); const l = getL(); if (!l) return;
        const par = getpar(l.items, id); const arr = par ? par.children : l.items;
        const idx = arr.findIndex(i => i.id === id);
        if (!e.shiftKey && idx > 0) { const [item] = arr.splice(idx, 1); arr[idx - 1].children.push(item); arr[idx - 1].collapsed = false; save(); renderCnt(); setTimeout(() => focI(item.id), 60); }
        else if (e.shiftKey && par) { const [item] = arr.splice(idx, 1); const gp = getpar(l.items, par.id); const pa = gp ? gp.children : l.items; const pi = pa.findIndex(i => i.id === par.id); pa.splice(pi + 1, 0, item); save(); renderCnt(); setTimeout(() => focI(item.id), 60); }
      }
    }
    function doImport() { const ta = document.getElementById('ita'); if (!ta?.value.trim()) return; const l = getL(); if (!l) return; l.items.push(...parseT(ta.value)); ta.value = ''; save(); renderCnt(); }

    // ══════════════════════════════════════════════════════
    //  AÇÕES DOS PLUGINS EXISTENTES
    // ══════════════════════════════════════════════════════
    function openTagM() {
      const l = getL(); if (!l) return;
      const all = []; const col = a => a.forEach(i => { all.push(i); col(i.children || []); }); col(l.items);
      if (!all.length) { alert('Adicione itens primeiro!'); return; }
      let sc = 'blue';
      openM('Adicionar Tag', `
    <div class="fg"><div class="fl">Item</div>
      <select id="mis">${all.map(i => `<option value="${i.id}">${esc(i.text) || '(sem texto)'}</option>`).join('')}</select>
    </div>
    <div class="fg"><div class="fl">Nome da tag</div><input type="text" id="mtn" placeholder="Ex: urgente, ideia..."></div>
    <div class="fg"><div class="fl">Cor</div>
      <div class="cpick">
        ${[['red', 'co-red'], ['orange', 'co-oran'], ['yellow', 'co-yel'], ['green', 'co-grn'], ['blue', 'co-blu'], ['purple', 'co-pur'], ['pink', 'co-pnk']]
          .map(([c, cl]) => `<div class="copt ${cl} ${c === 'blue' ? 'sel' : ''}" data-c="${c}" onclick="pickC(this,'${c}')"></div>`).join('')}
      </div>
    </div>`,
        () => {
          const iid = document.getElementById('mis').value;
          const label = document.getElementById('mtn').value.trim(); if (!label) return;
          const item = find(l.items, iid); if (!item) return;
          if (!item.tags) item.tags = [];
          item.tags.push({ label, color: sc }); save(); renderCnt();
        });

    function doSearch(q, preservarFilhos = false) {
      const qu = (q || '').toLowerCase().trim();
      const l = getL();

      // Limpa highlight anterior
      document.querySelectorAll('.itext[data-orig]').forEach(el => {
        el.innerHTML = el.getAttribute('data-orig');
        el.removeAttribute('data-orig');
      });

      // Sem busca: restaura estado original
      if (!qu) {
        document.querySelectorAll('.irow').forEach(r => r.classList.remove('search-hidden'));
        if (l) {
          document.querySelectorAll('.kids').forEach(kids => {
            const id = (kids.id || '').replace('ch-', '');
            const item = id ? find(l.items, id) : null;
            if (item) kids.classList.toggle('col', !!item.collapsed);
            else kids.classList.add('col');
          });
        }
        return;
      }

      // Busca nos DADOS recursivamente
      const matchIds = new Set();
      const parentIds = new Set();

      function deep(items, pais) {
        for (let i = 0; i < (items || []).length; i++) {
          const item = items[i];
          if ((item.text || '').toLowerCase().indexOf(qu) !== -1) {
            matchIds.add(item.id);
            pais.forEach(pid => parentIds.add(pid));
          }
          if (item.children?.length) deep(item.children, pais.concat([item.id]));
        }
      }
      if (l) deep(l.items, []);

      // Expande apenas kids de itens com match ou pais de match
      // Respeita collapsed manual do usuário para os demais
      if (l) {
        document.querySelectorAll('.kids').forEach(kids => {
          const paiId = (kids.id || '').replace('ch-', '');
          if (!paiId) return;
          const item = find(l.items, paiId);
          // Só expande se é pai de match ou tem match — respeita collapsed nos outros
          if (item && item.collapsed) kids.classList.add('col');
          else kids.classList.remove('col');
        });
      }

      // Aplica visibilidade e highlight
      document.querySelectorAll('.irow').forEach(row => {
        const id = row.dataset.id;
        const itext = row.querySelector('.itext');

        if (matchIds.has(id)) {
          // Item com match: sempre visível + destaque
          row.classList.remove('search-hidden');
          if (itext) {
            const texto = itext.innerText || '';
            itext.setAttribute('data-orig', itext.innerHTML);
            const re = new RegExp('(' + qu.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
            itext.innerHTML = esc(texto).replace(re,
              '<mark style="background:#e8c84a;color:#111;border-radius:3px;padding:0 3px;font-weight:700">$1</mark>');
          }
        } else if (parentIds.has(id)) {
          // Pai de match: visível sem destaque
          row.classList.remove('search-hidden');
        } else {
          // Sem relação com match
          if (!preservarFilhos) {
            // Modo normal: esconde
            row.classList.add('search-hidden');
          } else {
            // Modo preservar: só esconde se não for filho de um match visível
            const kidsDoMatch = [...matchIds].some(mid => {
              const el = document.getElementById('ch-' + mid);
              return el && el.contains(row);
            });
            if (!kidsDoMatch) row.classList.add('search-hidden');
            else row.classList.remove('search-hidden');
          }
        }
      });

      // Recolhe kids sem relação com match
      // Aplica visibilidade dos kids respeitando collapsed salvo
      document.querySelectorAll('.kids').forEach(kids => {
        const paiId = (kids.id || '').replace('ch-', '');
        if (!paiId) return;
        const item = l ? find(l.items, paiId) : null;

        if (matchIds.has(paiId) || parentIds.has(paiId)) {
          // É match ou pai de match — expande SOMENTE se não foi recolhido manualmente
          if (item && item.collapsed) {
            kids.classList.add('col'); // usuário recolheu, respeita
          } else {
            kids.classList.remove('col'); // expande para mostrar o match
          }
        } else {
          // Sem relação com match — recolhe
          kids.classList.add('col');
        }
      });
    }

    // ── Mover posição ──
    function moverItem(id, dir, comBloco) {
      const l = getL(); if (!l) return;

      function getCtx(items, id) {
        for (let i = 0; i < items.length; i++) {
          if (items[i].id === id) return { arr: items, idx: i };
          if (items[i].children?.length) {
            const f = getCtx(items[i].children, id);
            if (f) return f;
          }
        }
        return null;
      }

      const ctx = getCtx(l.items, id); if (!ctx) return;
      const { arr, idx } = ctx;

      if (!comBloco) {
        const alvo = idx + dir;
        if (alvo < 0 || alvo >= arr.length) return;
        [arr[idx], arr[alvo]] = [arr[alvo], arr[idx]];

      } else {
        if (dir === -1) {
          if (idx === 0) return;
          const antes = arr.splice(0, idx - 1);
          const vizinho = arr.splice(0, 1)[0];
          const bloco = arr.splice(0);
          arr.push(...antes, ...bloco, vizinho);
        } else {
          if (idx >= arr.length - 1) return;
          const antes = arr.splice(0, idx);
          const bloco = arr.splice(0, arr.length - 1);
          const vizinho = arr.splice(0, 1)[0];
          arr.push(...antes, vizinho, ...bloco);
        }
      }

      save(); renderCnt();
    }

    // ── Indentar ──
    function indent(id, comBloco, dirDireita = true) {
      const l = getL(); if (!l) return;

      function getCtx(items, id, pai = null) {
        for (let i = 0; i < items.length; i++) {
          if (items[i].id === id) return { arr: items, idx: i, pai };
          if (items[i].children?.length) {
            const f = getCtx(items[i].children, id, items[i]);
            if (f) return f;
          }
        }
        return null;
      }

      const ctx = getCtx(l.items, id); if (!ctx) return;
      const { arr, idx, pai } = ctx;

      const bloco = comBloco ? arr.splice(idx) : arr.splice(idx, 1);

      if (dirDireita) {
        const anterior = arr[arr.length - 1];
        if (!anterior) { arr.splice(idx, 0, ...bloco); return; }
        if (!anterior.children) anterior.children = [];
        anterior.children.push(...bloco);
        anterior.collapsed = false;

      } else {
        if (!pai) { arr.splice(idx, 0, ...bloco); return; }
        const ctxPai = getCtx(l.items, pai.id);
        if (!ctxPai) { arr.splice(idx, 0, ...bloco); return; }
        const { arr: arrAvo, idx: idxPai } = ctxPai;
        const irmaosRestantes = arr.splice(idx);
        arrAvo.splice(idxPai + 1, 0, ...bloco);
        if (irmaosRestantes.length) {
          arrAvo.splice(idxPai + 1 + bloco.length, 0, ...irmaosRestantes);
        }
      }

      save(); renderCnt();
    }
    // ── 10. RECORRÊNCIA ───────────────────────────────────
    reg('recurrence', {

      abtn(item) { return `<button class="iabtn" onclick="setRec('${item.id}')">🔁</button>`; },
      meta(item) {
