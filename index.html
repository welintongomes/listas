<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ListFlow</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#0e0e0f;--surface:#161618;--surface2:#1e1e21;--border:#2a2a2e;
  --accent:#7c6af7;--red:#e8565e;--green:#3ecf8e;--yellow:#e8c84a;--blue:#4fa7e8;--orange:#f0804b;
  --text:#e8e8ec;--text2:#888892;--text3:#55555e;--r:10px;
  --sab:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;display:flex;flex-direction:column;height:100dvh}

/* ─── HEADER ─── */
.hdr{display:flex;align-items:center;padding:0 14px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;gap:10px;z-index:50}
.logo{font-size:18px;font-weight:800;color:var(--accent);letter-spacing:-.5px}.logo span{color:var(--text)}
.hpill{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3);border:1px solid var(--border);padding:2px 7px;border-radius:20px}
.hright{margin-left:auto;display:flex;gap:6px}
.ibtn{width:36px;height:36px;border-radius:var(--r);background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ibtn:active{opacity:.7;transform:scale(.93)}

/* ─── LAYOUT ─── */
.body{flex:1;display:flex;overflow:hidden;position:relative}

/* ─── SIDEBAR ─── */
.sidebar{width:285px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:transform .3s cubic-bezier(.4,0,.2,1);z-index:40}
@media(max-width:680px){
  .sidebar{position:absolute;top:0;left:0;bottom:0;transform:translateX(-100%);box-shadow:6px 0 30px rgba(0,0,0,.6)}
  .sidebar.open{transform:translateX(0)}
  .overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:39;display:none}
  .overlay.open{display:block}
}
@media(min-width:681px){.overlay{display:none!important}.mbtn{display:none!important}}
.sb-scroll{flex:1;overflow-y:auto;padding:12px}
.sb-label{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);padding:4px 4px 8px}
.pg{display:flex;flex-direction:column;gap:3px;margin-bottom:16px}
.prow{display:flex;align-items:center;gap:10px;padding:10px;border-radius:var(--r);cursor:pointer;transition:background .15s;border:1px solid transparent;user-select:none}
.prow:active{opacity:.8}.prow.on{background:rgba(124,106,247,.1);border-color:rgba(124,106,247,.2)}
.picon{font-size:18px;width:22px;text-align:center}
.pinfo{flex:1;min-width:0}
.pname{font-size:13px;font-weight:600;color:var(--text2)}.prow.on .pname{color:var(--accent)}
.pdesc{font-size:11px;color:var(--text3);margin-top:1px}
.tpill{width:36px;height:20px;border-radius:10px;background:var(--border);position:relative;transition:background .2s;flex-shrink:0}
.tpill::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:white;top:3px;left:3px;transition:transform .2s}
.prow.on .tpill{background:var(--accent)}.prow.on .tpill::after{transform:translateX(16px)}
.lents{display:flex;flex-direction:column;gap:3px}
.lent{display:flex;align-items:center;gap:8px;padding:10px;border-radius:var(--r);cursor:pointer;transition:background .15s;border:1px solid transparent}
.lent:active{opacity:.8}.lent.on{background:rgba(124,106,247,.1);border-color:rgba(124,106,247,.2)}
.ldot{width:7px;height:7px;border-radius:50%;flex-shrink:0;opacity:.4}
.lent.on .ldot{opacity:1}
.lname{flex:1;font-size:13px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lent.on .lname{color:var(--text)}
.lcnt{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3);flex-shrink:0}
.ldel{width:20px;height:20px;border-radius:5px;border:none;background:transparent;color:var(--text3);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s}
.lent:hover .ldel,.lent:active .ldel{opacity:1}
.sb-foot{padding:12px;border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;gap:8px}
.nlbtn{width:100%;padding:11px;border-radius:var(--r);background:rgba(124,106,247,.1);border:1px dashed rgba(124,106,247,.35);color:var(--accent);font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.nlbtn:active{background:rgba(124,106,247,.2)}
.guidebtn{width:100%;padding:9px;border-radius:var(--r);background:transparent;border:1px solid var(--border);color:var(--text3);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px}
.guidebtn:active{opacity:.7}

/* ─── MAIN ─── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.tb{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.tb::-webkit-scrollbar{display:none}
.tbsep{width:1px;height:20px;background:var(--border);flex-shrink:0;margin:0 2px}
.tbbtn{padding:7px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:'Syne',sans-serif;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:5px;flex-shrink:0}
.tbbtn:active{opacity:.75;transform:scale(.97)}.tbbtn.pri{background:var(--accent);border-color:var(--accent);color:white}
.srch{position:relative;flex-shrink:0}
.srch input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;padding:7px 10px 7px 30px;outline:none;width:150px;transition:all .2s}
.srch input:focus{border-color:var(--accent);width:200px}
.srch input::placeholder{color:var(--text3)}
.sicon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
/* Esconde o botão em telas pequenas (menores que 768px) */
@media (max-width: 767px) {.tbbtn.pri {display: none;}}

/* ─── CONTENT ─── */
.cnt{flex:1;overflow:auto;padding:16px;padding-bottom:calc(80px + var(--sab));display:flex;flex-direction:column;gap:14px}
.empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:40px 20px;color:var(--text3)}
.empty-ico{font-size:60px;opacity:.2}
.empty h2{font-size:18px;color:var(--text2)}
.empty p{font-size:13px;line-height:1.7;max-width:280px}
.lhdr{display:flex;flex-direction:column;gap:8px}
.ltrow{display:flex;align-items:center;gap:10px}
.ltinput{flex:1;font-family:'Syne',sans-serif;font-size:20px;font-weight:700;background:transparent;border:none;color:var(--text);outline:none;border-bottom:2px solid transparent;transition:border-color .2s;min-width:0}
.ltinput:focus{border-bottom-color:var(--accent)}

/* ─── PROGRESS ─── */
.prog{display:flex;flex-direction:column;gap:4px}
.pgbg{background:var(--surface2);border-radius:99px;height:5px;overflow:hidden}
.pgfill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.pglabel{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text3)}

/* ─── IMPORT ─── */
.import{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.import summary{padding:11px 14px;cursor:pointer;font-size:13px;color:var(--text2);font-weight:600;list-style:none;display:flex;align-items:center;gap:8px}
.import summary::-webkit-details-marker{display:none}
.import-body{padding:0 12px 12px;display:flex;flex-direction:column;gap:8px}
.import-body textarea{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;padding:10px;resize:vertical;min-height:90px;outline:none;transition:border-color .2s;line-height:1.7;width:100%}
.import-body textarea:focus{border-color:var(--accent)}
.import-hint{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;line-height:1.5}
.import-acts{display:flex;gap:8px;flex-wrap:wrap}

/* ─── ITEMS ─── */
pading
.iblock{display:flex;flex-direction:column;min-width:max-content;width:100%}
.irow{display:flex;align-items:flex-start;gap:5px;padding:5px 6px;border-radius:8px;transition:background .1s;min-width:max-content;width:100%}
.irow:active{background:var(--surface2)}
.itog {padding: 14px 16px 14px 6px;width: 20px;height: 20px;flex-shrink: 0;margin-top: 5px;display: flex;align-items: center;justify-content: center;cursor: pointer;color: var(--text3);font-size: 24px;border-radius: 4px;transition: all .15s;user-select: none;}
.itog.nc{opacity:0;pointer-events:none}
.icb{width:30px;height:28px;flex-shrink:0;margin-top:5px;appearance:none;-webkit-appearance:none;border:2px solid var(--border);border-radius:6px;cursor:pointer;position:relative;transition:all .2s;background:transparent}
.icb:checked{background: #1e1c32;border-color:var(--accent)}
.icb:checked::after{content:'';position:absolute;left:7px;top:4px;width:6px;height:10px;border:2px solid white;border-left:none;border-top:none;transform:rotate(45deg)}
.icb.par{border-color:var(--accent);background:rgba(124,106,247,.15)}
.icb.par::after{content:'';position:absolute;left:7px;
/* top:11px;
width:10px;
height:2px;
background:var(--accent); */
border-radius:1px}
/* ibody ocupa toda a largura restante, texto nunca comprime */
.ibody{flex:1;min-width:0;padding-top:3px}
.itext{font-size:16px;line-height:1.5;color:var(--text);outline:none;background:transparent;border:none;font-family:'Syne',sans-serif;cursor:text;white-space:nowrap;display:block;min-height:20px}
.itext.done{text-decoration:line-through;color:var(--text3)}
.imeta{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;align-items:center}
/* iend fica dentro do ibody, abaixo do texto — nunca na lateral */
.iend{display:flex;align-items:center;gap:4px;margin-top:4px;flex-wrap:wrap}
.iabtn{width:28px;height:28px;border-radius:8px;border:none;background:var(--surface2);color:var(--text3);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0}
.iabtn:active{opacity:.7;transform:scale(.91)}
.kids{padding-left:20px;border-left:1px solid var(--border);margin-left:12px;min-width:max-content}
.kids.col{display:none}

/* ─── BADGES ─── */
.tag{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:20px;border:1px solid;cursor:pointer;line-height:1.4;white-space:nowrap}
.tred{color:#e8565e;border-color:rgba(232,86,94,.4);background:rgba(232,86,94,.1)}
.toran{color:#f0804b;border-color:rgba(240,128,75,.4);background:rgba(240,128,75,.1)}
.tyel{color:#e8c84a;border-color:rgba(232,200,74,.4);background:rgba(232,200,74,.1)}
.tgrn{color:#3ecf8e;border-color:rgba(62,207,142,.4);background:rgba(62,207,142,.1)}
.tblu{color:#4fa7e8;border-color:rgba(79,167,232,.4);background:rgba(79,167,232,.1)}
.tpur{color:#a57af0;border-color:rgba(165,122,240,.4);background:rgba(165,122,240,.1)}
.tpnk{color:#e87ac8;border-color:rgba(232,122,200,.4);background:rgba(232,122,200,.1)}
.due{font-size:10px;font-family:'JetBrains Mono',monospace;padding:2px 7px;border-radius:20px;white-space:nowrap;cursor:pointer}
.dnorm{color:var(--text3);background:var(--surface2);border:1px solid var(--border)}
.dsoon{color:#e8c84a;background:rgba(232,200,74,.1);border:1px solid rgba(232,200,74,.3)}
.dover{color:var(--red);background:rgba(232,86,94,.1);border:1px solid rgba(232,86,94,.3)}
.pribadge{font-size:13px;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;border-radius:6px;cursor:pointer;flex-shrink:0;margin-top:5px;background:var(--surface2)}
.inote{font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace;line-height:1.5;margin-top:4px;border-left:2px solid var(--border);padding-left:8px;outline:none;word-break:break-word;min-height:16px}
.estbadge{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--blue);background:rgba(79,167,232,.1);border:1px solid rgba(79,167,232,.3);padding:2px 7px;border-radius:20px;white-space:nowrap}
/* plugin: recurrence */
.recbadge{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--green);background:rgba(62,207,142,.1);border:1px solid rgba(62,207,142,.3);padding:2px 7px;border-radius:20px;white-space:nowrap;cursor:pointer}
/* plugin: listcolor */
.lcbadge{display:inline-block;width:10px;height:10px;border-radius:50%;flex-shrink:0}
/* plugin: link */
.linkbadge{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--blue);padding:2px 7px;border-radius:20px;background:rgba(79,167,232,.1);border:1px solid rgba(79,167,232,.3);white-space:nowrap;text-decoration:none;cursor:pointer;display:inline-flex;align-items:center;gap:3px}

/* ─── EXPORT PANEL (plugin: export) ─── */
.export-panel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:12px;display:flex;flex-direction:column;gap:8px}
.export-pre{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);overflow-x:auto;white-space:pre;max-height:160px;overflow-y:auto}

/* ─── KANBAN (plugin: kanban) ─── */
.kanban-wrap{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px;min-height:200px}
.kanban-col{min-width:200px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);display:flex;flex-direction:column;flex-shrink:0}
.kanban-hdr{padding:10px 12px;font-size:12px;font-weight:700;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.kanban-body{padding:8px;display:flex;flex-direction:column;gap:6px;flex:1}
.kanban-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;line-height:1.4;cursor:pointer;transition:all .15s}
.kanban-card:active{opacity:.75}
.kanban-card.done-card{text-decoration:line-through;color:var(--text3)}

/* ─── FAB ─── */
.fab{position:fixed;left:18px;bottom:calc(18px + var(--sab));width:54px;height:54px;border-radius:50%;background:var(--accent);border:none;color:white;font-size:28px;cursor:pointer;box-shadow:0 4px 22px rgba(124,106,247,.55);display:flex;align-items:center;justify-content:center;z-index:30;transition:all .2s}
.fab:active{transform:scale(.91)}
@media(min-width:681px){.fab{display:none}}

/* ─── MODAL / BOTTOM SHEET ─── */
.mback{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .25s}
.mback.open{opacity:1;pointer-events:all}
.msheet{background:var(--surface);border-radius:18px 18px 0 0;padding:20px 20px calc(20px + var(--sab));width:100%;max-width:520px;max-height:88vh;display:flex;flex-direction:column;gap:14px;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto}
.mback.open .msheet{transform:translateY(0)}
.mhandle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto -4px}
.mtitle{font-size:16px;font-weight:700}
.macts{margin-top: 18px;display:flex;gap:8px}
.fg{display:flex;flex-direction:column;gap:6px}
.fl{font-size:12px;color:var(--text3);font-weight:600;letter-spacing:.5px}
input[type=text],input[type=date],input[type=url],input[type=number],select,.fta{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'Syne',sans-serif;font-size:15px;padding:11px 12px;outline:none;width:100%;transition:border-color .2s}
input:focus,select:focus,.fta:focus{border-color:var(--accent)}
.fta{resize:vertical;min-height:80px;font-size:13px;font-family:'JetBrains Mono',monospace;line-height:1.7}
.cpick{display:flex;gap:10px;flex-wrap:wrap;padding:4px 0}
.copt{width:34px;height:34px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s}
.copt.sel{border-color:white;transform:scale(1.18)}
.co-red{background:#e8565e}.co-oran{background:#f0804b}.co-yel{background:#e8c84a}
.co-grn{background:#3ecf8e}.co-blu{background:#4fa7e8}.co-pur{background:#a57af0}.co-pnk{background:#e87ac8}
/* list color swatches */
.lcswatch{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:all .15s}
.lcswatch.sel{border-color:white;transform:scale(1.15)}
.btn{margin-top: 11px;padding:11px 16px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Syne',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn:active{opacity:.75}.btn.pri{background:var(--accent);border-color:var(--accent);color:white;flex:1}.btn.full{width:100%}.btn.dng{margin-top: 1px; border-color:rgba(232,86,94,.4);color:var(--red)}
.cpiece{position:fixed;width:8px;height:8px;z-index:999;animation:cfal 1.2s ease-in forwards;pointer-events:none}
@keyframes cfal{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.search-hidden{display:none!important}
.smatch{color:var(--green)!important}

/* ─── GUIDE MODAL ─── */
.guide-block{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:8px}
.guide-block h4{font-size:13px;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:6px}
.guide-block p,.guide-block li{font-size:12px;color:var(--text2);line-height:1.7;font-family:'JetBrains Mono',monospace}
.guide-block ul{padding-left:16px;display:flex;flex-direction:column;gap:2px}
code{background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent)}

/* ─── VIEW TOGGLE ─── */
.view-tabs{display:flex;gap:6px}
.vtab{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text3);font-family:'Syne',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s}
.vtab.on{background:var(--accent);border-color:var(--accent);color:white}
.vtab:active{opacity:.75}
</style>
</head>
<body>

<div class="hdr">
  <button class="ibtn mbtn" onclick="toggleSB()">☰</button>
  <div class="logo">List<span>Flow</span></div>
  
  <div class="hright">
    <button class="ibtn" onclick="exportJ()" title="Exportar JSON">⬇</button>
    <button class="ibtn" onclick="importJ()" title="Importar JSON">⬆</button>
  </div>
</div>

<div class="body">
  <div class="overlay" id="ov" onclick="closeSB()"></div>
  <aside class="sidebar" id="sb">
    <div class="sb-scroll">
      <div class="sb-label" style="margin-top:4px">Plugins</div>
      <div class="pg" id="pg"></div>
      <div class="sb-label">Minhas listas <span class="hpill" id="hpill">0 listas</span></div>
      <div class="lents" id="lents"></div>
    </div>
    <div class="sb-foot">
      <button class="nlbtn" onclick="newList()">＋ Nova lista</button>
      <button class="guidebtn" onclick="openGuide()">📖 Como criar um plugin</button>
    </div>
  </aside>

  <div class="main">
    <div class="tb" id="tb"></div>
    <div class="cnt" id="cnt">
      <div class="empty" id="es">
        <div class="empty-ico">☑</div>
        <h2>Sem lista ativa</h2>
        <p>Crie uma lista pelo menu lateral ou pelo botão abaixo.</p>
        <button class="btn pri" onclick="newList()" style="margin-top:8px;flex:0;padding:12px 28px">＋ Criar lista</button>
      </div>
      <div id="lv" style="display:none;flex-direction:column;gap:14px"></div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  CORE STATE
// ══════════════════════════════════════════════════════
let S = { lists:[], active:null, plugins:{} };
const save = () => localStorage.setItem('lf4', JSON.stringify(S));
function load(){ try{ const r=localStorage.getItem('lf4'); if(r) S=JSON.parse(r); }catch(e){} }
const genId = () => Math.random().toString(36).slice(2,10);
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const getL = () => S.lists.find(l=>l.id===S.active)||null;

// ══════════════════════════════════════════════════════
//  PLUGIN SYSTEM
//
//  Para criar um plugin, use:
//    reg('meu-plugin', { ...definição... })
//
//  Campos disponíveis:
//    name      → nome exibido na sidebar
//    icon      → emoji do plugin
//    desc      → descrição curta
//    def       → true = ativo por padrão
//    onToggle(active) → chamado ao ligar/desligar
//    tb()      → retorna HTML para a toolbar
//    hdr(list) → retorna HTML no topo da lista (abaixo do título)
//    pfx(item) → retorna HTML antes do checkbox (ex: ícone de prioridade)
//    meta(item)→ retorna HTML de badges abaixo do texto do item
//    abtn(item)→ retorna HTML de botão de ação no final da linha
//    extra(item)→ retorna HTML extra abaixo do meta (ex: notas)
//    renderSection(list) → retorna HTML de seção extra (abaixo dos itens)
// ══════════════════════════════════════════════════════
const PL = {};
const reg = (id,def) => PL[id] = { id, ...def };
const pon = id => !!S.plugins[id];
const togP = id => {
  // ══════════════════════════════════════════════════════
//  HOOK SYSTEM — plugins se auto-instalam
//  Cada plugin pode declarar:
//    onInit()        → roda uma vez no boot (injetar CSS, etc)
//    onRenderCnt()   → roda no início do renderCnt (pode retornar true para substituir toda a view)
//    onRenderTop(lv, list) → roda antes da árvore, recebe o container lv e a lista
//    onRenderBottom(lv, list) → roda depois da árvore
// ══════════════════════════════════════════════════════
function runHook(hook, ...args){
  for(const p of Object.values(PL)){
    if(pon(p.id) && p[hook]){
      const result = p[hook](...args);
      if(result === true) return true; // plugin tomou conta da view
    }
  }
  return false;
}
  S.plugins[id] = !S.plugins[id];
  if(PL[id]?.onToggle) PL[id].onToggle(S.plugins[id]);
  save(); renderAll();
};

    return `<div class="prog"><div class="pgbg"><div class="pgfill" style="width:${p}%"></div></div>

  meta(item){
    if(!item.tags?.length) return '';
    const cm={red:'tred',orange:'toran',yellow:'tyel',green:'tgrn',blue:'tblu',purple:'tpur',pink:'tpnk'};
    return item.tags.map(t=>`<span class="tag ${cm[t.color]||'tblu'}" onclick="rmTag('${item.id}','${esc(t.label)}')">${esc(t.label)} ✕</span>`).join('');

    const df=Math.round((d-t)/86400000);

    const lb=df<0?`Atrasado ${Math.abs(df)}d`:df===0?'Hoje':df===1?'Amanhã':d.toLocaleDateString('pt-BR');
    return `<span class="due ${cls}" onclick="setDue('${item.id}')">📅 ${lb}</span>`;
  }
});

reg('notes', {

reg('theme', {

    const v=(k,d,l)=>document.documentElement.style.setProperty(k,on?l:d);
    v('--bg','#0e0e0f','#f2f2f5'); v('--surface','#161618','#ffffff');
    v('--surface2','#1e1e21','#e8e8ed'); v('--border','#2a2a2e','#d2d2da');

//  NOVOS PLUGINS

// ── 10. RECORRÊNCIA ───────────────────────────────────
reg('recurrence', {
  name:'Itens Recorrentes', icon:'🔁', desc:'Reseta itens diária/semanalamente', def:false,
  abtn(item){ return `<button class="iabtn" onclick="setRec('${item.id}')">🔁</button>`; },
  meta(item){
    if(!item.recurrence) return '';
    const labels={daily:'Todo dia',weekly:'Toda semana',monthly:'Todo mês'};
    return `<span class="recbadge" onclick="setRec('${item.id}')">🔁 ${labels[item.recurrence]||item.recurrence}</span>`;
  },
  // Quando a lista é aberta, verifica se itens precisam ser resetados
  hdr(list){
    checkRecurrence(list);
    return '';
  }
});

function checkRecurrence(list){
  const now = new Date();
  const today = now.toISOString().slice(0,10);
  const allItems = [];
  const col = a => a.forEach(i=>{ allItems.push(i); col(i.children||[]); });
  col(list.items);
  let changed = false;
  for(const item of allItems){
    if(!item.recurrence || !item.checked) continue;
    const last = item._recLast;
    if(!last){ item._recLast = today; continue; }
    let shouldReset = false;
    if(item.recurrence==='daily' && last < today) shouldReset=true;
    if(item.recurrence==='weekly'){
      const d1=new Date(last), d2=new Date(today);
      shouldReset = (d2-d1)/(1000*60*60*24) >= 7;
    }
    if(item.recurrence==='monthly'){
      const d1=new Date(last), d2=new Date(today);
      shouldReset = d2.getMonth()!==d1.getMonth() || d2.getFullYear()!==d1.getFullYear();
    }
    if(shouldReset){ item.checked=false; item._recLast=today; changed=true; }
  }
  if(changed) save();
}

function setRec(id){
  const l=getL(); if(!l) return;
  const item=find(l.items,id);
  openM('Item Recorrente',`
    <div class="fg"><div class="fl">Frequência de reset</div>
      <select id="mrc">
        <option value="" ${!item?.recurrence?'selected':''}>Sem recorrência</option>
        <option value="daily" ${item?.recurrence==='daily'?'selected':''}>Todo dia</option>
        <option value="weekly" ${item?.recurrence==='weekly'?'selected':''}>Toda semana</option>
        <option value="monthly" ${item?.recurrence==='monthly'?'selected':''}>Todo mês</option>
      </select>
    </div>
    <div style="font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace;line-height:1.6">
      O item será automaticamente desmarcado conforme a frequência escolhida quando você abrir o app.
    </div>
  `, ()=>{
    const v=document.getElementById('mrc')?.value;
    if(item){ item.recurrence=v||null; item._recLast=new Date().toISOString().slice(0,10); save(); renderCnt(); }
  });
}

// ── 11. EXPORT MARKDOWN / CSV ─────────────────────────
reg('exportmd', {
  name:'Export Markdown / CSV', icon:'📤', desc:'Exporta lista em Markdown ou CSV', def:false,
  tb(){ return `<button class="tbbtn" onclick="openExportPanel()">📤 Exportar</button>`; }
});

function listToMarkdown(items, depth=0){
  let out='';
  for(const item of items){
    const pad='  '.repeat(depth);
    const cb=item.checked?'[x]':'[ ]';
    out+=`${pad}- ${cb} ${item.text}\n`;
    if(item.children?.length) out+=listToMarkdown(item.children, depth+1);
  }
  return out;
}

function listToCSV(items, depth=0){
  let rows=[];
  for(const item of items){
    rows.push([`"${'  '.repeat(depth)+item.text.replace(/"/g,'""')}"`, item.checked?'sim':'não',
      item.priority||'none', item.due||'', item.estimate||'', `"${(item.tags||[]).map(t=>t.label).join(', ')}"`].join(','));
    if(item.children?.length) rows=rows.concat(listToCSV(item.children, depth+1));
  }
  return rows;
}

function openExportPanel(){
  const l=getL(); if(!l) return;
  const md=`# ${l.name}\n\n`+listToMarkdown(l.items);
  const csvRows=['Texto,Concluído,Prioridade,Prazo,Estimativa,Tags',...listToCSV(l.items)];
  const csv=csvRows.join('\n');

  openM('Exportar Lista',`
    <div class="view-tabs" style="margin-bottom:4px">
      <button class="vtab on" id="vtmd" onclick="swExport('md')">Markdown</button>
      <button class="vtab" id="vtcsv" onclick="swExport('csv')">CSV</button>
    </div>
    <pre class="export-pre" id="expre">${esc(md)}</pre>
    <div class="macts">
      <button class="btn" onclick="copyExport()">📋 Copiar</button>
      <button class="btn pri" onclick="dlExport()">⬇ Download</button>
    </div>
  `, null);
  window._expData = {md, csv, mode:'md'};
}

window.swExport = mode => {
  window._expData.mode = mode;
  document.getElementById('expre').textContent = mode==='md' ? window._expData.md : window._expData.csv;
  document.getElementById('vtmd').classList.toggle('on', mode==='md');
  document.getElementById('vtcsv').classList.toggle('on', mode==='csv');
};
window.copyExport = () => {
  const d=window._expData;
  navigator.clipboard.writeText(d.mode==='md'?d.md:d.csv).then(()=>alert('Copiado!'));
};
window.dlExport = () => {
  const d=window._expData;
  const content=d.mode==='md'?d.md:d.csv;
  const ext=d.mode==='md'?'md':'csv';
  const l=getL();
  const b=new Blob([content],{type:'text/plain'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(b);
  a.download=`${(l?.name||'lista').replace(/\s+/g,'_')}.${ext}`; a.click();
};

// ── 14. VISTA KANBAN ──────────────────────────────────
reg('kanban', {
  name:'Vista Kanban', icon:'📋', desc:'Visualiza itens em colunas de status', def:false,
  tb(){ return `<div class="view-tabs"><button class="vtab ${S._view==='list'?'on':''}" onclick="setView('list')">☰ Lista</button><button class="vtab ${S._view==='kanban'?'on':''}" onclick="setView('kanban')">📋 Kanban</button></div>`; },
  onRenderTop(lv, list){

    const kb=document.createElement('div'); kb.innerHTML=renderKanban(list); lv.appendChild(kb);
    return true; // substituiu a árvore
  }

function setView(v){ S._view=v; renderCnt(); }

function renderKanban(list){
  const all=[];
  const col=a=>a.forEach(i=>{ all.push(i); col(i.children||[]); });
  col(list.items);

  const todo  = all.filter(i=>!i.checked && i.priority!=='high');
  const urgent= all.filter(i=>!i.checked && i.priority==='high');
  const done  = all.filter(i=>i.checked);

  const card = i => `<div class="kanban-card ${i.checked?'done-card':''}" onclick="togChk('${i.id}',${!i.checked})">
    ${esc(i.text)}
    ${i.due?`<div style="font-size:10px;color:var(--text3);margin-top:4px;font-family:'JetBrains Mono',monospace">📅 ${i.due}</div>`:''}
  </div>`;

  return `<div class="kanban-wrap">
    <div class="kanban-col">
      <div class="kanban-hdr">🔴 Urgente <span style="margin-left:auto;font-size:11px;color:var(--text3)">${urgent.length}</span></div>
      <div class="kanban-body">${urgent.map(card).join('')||'<div style="font-size:12px;color:var(--text3);padding:4px">Vazio</div>'}</div>
    </div>
    <div class="kanban-col">
      <div class="kanban-hdr">📝 A fazer <span style="margin-left:auto;font-size:11px;color:var(--text3)">${todo.length}</span></div>
      <div class="kanban-body">${todo.map(card).join('')||'<div style="font-size:12px;color:var(--text3);padding:4px">Vazio</div>'}</div>
    </div>
    <div class="kanban-col">
      <div class="kanban-hdr">✅ Concluído <span style="margin-left:auto;font-size:11px;color:var(--text3)">${done.length}</span></div>
      <div class="kanban-body">${done.map(card).join('')||'<div style="font-size:12px;color:var(--text3);padding:4px">Vazio</div>'}</div>
    </div>
  </div>`;
}

const mkItem = t => ({id:genId(),text:t,checked:false,collapsed:false,children:[],tags:[],due:null,priority:'none',note:'',estimate:'',recurrence:null,link:null});
function find(items,id){ for(const i of items){ if(i.id===id) return i; if(i.children){ const f=find(i.children,id); if(f) return f; } } return null; }
function remove(items,id){ for(let i=0;i<items.length;i++){ if(items[i].id===id){items.splice(i,1);return true;} if(items[i].children&&remove(items[i].children,id)) return true; } return false; }
function getpar(items,id,par=null){ for(const i of items){ if(i.id===id) return par; if(i.children){ const f=getpar(i.children,id,i); if(f!==undefined) return f; } } }
function cp(items){ let d=0,t=0; const w=a=>{for(const i of(a||[])){t++;if(i.checked)d++;w(i.children)}}; w(items); return{d,t}; }

function parseT(text){
  const lines=text.split('\n').filter(l=>l.trim()), root=[], stack=[{ch:root,ind:-1}];
  for(const line of lines){
    const raw=line.replace(/^[\s\t]*[-*+]?\s*(\[[xX ]\])?\s*/,'');
    const checked=/\[[xX]\]/.test(line);
    const ind=line.search(/\S/);
    const item=mkItem(raw.trim()); item.checked=checked;
    while(stack.length>1&&stack[stack.length-1].ind>=ind) stack.pop();
    stack[stack.length-1].ch.push(item);
    stack.push({ch:item.children,ind});
  }
  return root;
}

function renderSB(){

      <div class="tpill"></div>

  document.getElementById('lents').innerHTML = S.lists.map(l=>{
    const {d,t}=cp(l.items); const on=l.id===S.active;

function renderTB(){
  const parts=[
  `<button class="tbbtn pri" onclick="addItem()">＋ Item</button>`,
  `<div class="tbsep"></div>`,
  `<button class="tbbtn" onclick="collapseAll()">⏫</button>`, // ⤵
  `<button class="tbbtn" onclick="resetAll()">🔁</button>`// ↺
];
  Object.values(PL).forEach(p=>{
    if(pon(p.id)&&p.tb){ const h=p.tb(); if(h){ parts.push('<div class="tbsep"></div>'); parts.push(h); } }
  });
  document.getElementById('tb').innerHTML=parts.join('');
}
function collapseAll(){
  const l=getL(); if(!l) return;
  const walk = arr => arr.forEach(i=>{ i.collapsed=true; if(i.children?.length) walk(i.children); });
  walk(l.items); save(); renderCnt();
}

function resetAll(){
  const l=getL(); if(!l) return;
  const walk = arr => arr.forEach(i=>{ i.checked=false; if(i.children?.length) walk(i.children); });
  walk(l.items); save(); renderCnt();
}
function renderCnt(){
  const list=getL();
  const es=document.getElementById('es'), lv=document.getElementById('lv'), fab=document.getElementById('fab');
  if(!list){ es.style.display='flex'; lv.style.display='none'; fab.style.display='none'; return; }
  es.style.display='none'; lv.style.display='flex';

  // Hook onRenderCnt — plugin pode substituir toda a view (quiz, foco, etc)
  lv.innerHTML='';
  fab.style.display='flex';
  for(const p of Object.values(PL)){
    if(pon(p.id) && p.onRenderCnt){
      const took = p.onRenderCnt(lv, list);
      if(took){ fab.style.display='none'; return; }
    }
  }

  // View normal
  const hdr=document.createElement('div'); hdr.className='lhdr';
  let hdrHtml=`<div class="ltrow"><input class="ltinput" value="${esc(list.name)}" onchange="renL('${list.id}',this.value)" onblur="renL('${list.id}',this.value)"></div>`;
  Object.values(PL).forEach(p=>{ if(pon(p.id)&&p.hdr){ const h=p.hdr(list); if(h) hdrHtml+=h; } });
  hdr.innerHTML=hdrHtml;
  lv.appendChild(hdr);

  // Hook onRenderTop — antes da árvore (ex: kanban substitui)
  let tookTop = false;
  for(const p of Object.values(PL)){
    if(pon(p.id) && p.onRenderTop){
      const took = p.onRenderTop(lv, list);
      if(took){ tookTop=true; break; }
    }
  }

  if(!tookTop){
    // Import
    const imp=document.createElement('details'); imp.className='import';
    imp.innerHTML=`<summary>📋 Importar por texto</summary>
      <div class="import-body">
        <textarea id="ita" placeholder="Um item por linha. Indente para sub-itens:
- Tarefa principal
  - Sub-tarefa
[x] Item já marcado"></textarea>
        <div class="import-acts">
          <button class="btn pri" style="flex:1" onclick="doImport()">Importar</button>
          <button class="btn" onclick="document.getElementById('ita').value=''">Limpar</button>
        </div>
        <div class="import-hint">Prefixos: -, *, + • [x] = marcado • Espaços = aninhamento</div>
      </div>`;
    lv.appendChild(imp);

    // Árvore de itens
    const tree=document.createElement('div'); tree.id='it';
    rTree(list.items,tree);
    lv.appendChild(tree);
  }

  // Hook onRenderBottom — depois da árvore (ex: orçamento)
  Object.values(PL).forEach(p=>{
    if(pon(p.id) && p.onRenderBottom) p.onRenderBottom(lv, list);
  });
}

function rTree(items,cont){
  for(const item of items){
    const blk=document.createElement('div'); blk.className='iblock';
    const row=document.createElement('div'); row.className='irow'; row.dataset.id=item.id;
    const hk=!!item.children?.length;

   let cbcls='';
    if(hk){
      const{d,t}=cp(item.children);
      if(d>0 && d<t) cbcls='par';
    }

    let pfx=''; Object.values(PL).forEach(p=>{ if(pon(p.id)&&p.pfx) pfx+=p.pfx(item)||''; });
    let abtns=`<button class="iabtn" title="Sub-item" onclick="addSub('${item.id}')">⊕</button>`;
    Object.values(PL).forEach(p=>{ if(pon(p.id)&&p.abtn) abtns+=p.abtn(item)||''; });
    abtns+=`<button class="iabtn" onclick="delItem('${item.id}')" style="color:var(--red);opacity:.7">✕</button>`;
    let meta=''; Object.values(PL).forEach(p=>{ if(pon(p.id)&&p.meta) meta+=p.meta(item)||''; });
    let extra=''; Object.values(PL).forEach(p=>{ if(pon(p.id)&&p.extra) extra+=p.extra(item)||''; });

    row.innerHTML=`${pfx}
      <span class="itog ${hk?'':'nc'}" onclick="togCol('${item.id}')">${item.collapsed?'▶':'▼'}</span>
      <input type="checkbox" class="icb ${cbcls}" ${item.checked?'checked':''} onchange="togChk('${item.id}',this.checked)">
      <div class="ibody">
        ${(pon('audio') && item.text && item.text.includes('⟨🎙'))
        ? `<div class="itext-rich ${item.checked?'done':''}">${renderRichText(item)}</div>`
        : `<div class="itext ${item.checked?'done':''}" contenteditable="true" spellcheck="false"
              onblur="renItem('${item.id}',this.innerText)"
              onkeydown="ikey(event,'${item.id}')">${esc(item.text)}</div>`
      }
        ${meta?`<div class="imeta">${meta}</div>`:''}
        ${extra}
        <div class="iend">${abtns}</div>
      </div>`;

    blk.appendChild(row);
    if(hk){
      const ch=document.createElement('div'); ch.className=`kids ${item.collapsed?'col':''}`;
      rTree(item.children,ch); blk.appendChild(ch);
    }
    cont.appendChild(blk);
  }
}

function addSub(pid){ const l=getL(); if(!l) return; const par=find(l.items,pid); if(!par) return; const item=mkItem(''); par.children.push(item); par.collapsed=false; save(); renderCnt(); setTimeout(()=>focI(item.id),60); }

function togChk(id,v){
  const l=getL(); if(!l) return;
  const item=find(l.items,id); if(!item) return;
  item.checked=v;
  save();
  if(pon('celebrate')&&v){ const{d,t}=cp(l.items); if(d===t&&t>0) confetti(); }
  renderCnt();
  renderSB();
}
function togCol(id){ const l=getL(); if(!l) return; const item=find(l.items,id); if(!item) return; item.collapsed=!item.collapsed; save(); renderCnt(); }
function renItem(id,text){ const l=getL(); if(!l) return; const item=find(l.items,id); if(item){item.text=text.trim()||item.text;save();} }

function ikey(e,id){
  if(e.key==='Enter'){
    e.preventDefault(); const l=getL(); if(!l) return;
    const par=getpar(l.items,id); const arr=par?par.children:l.items;
    const idx=arr.findIndex(i=>i.id===id); const item=mkItem('');
    arr.splice(idx+1,0,item); save(); renderCnt(); setTimeout(()=>focI(item.id),60);
  }
  if(e.key==='Tab'){
    e.preventDefault(); const l=getL(); if(!l) return;
    const par=getpar(l.items,id); const arr=par?par.children:l.items;
    const idx=arr.findIndex(i=>i.id===id);
    if(!e.shiftKey&&idx>0){ const[item]=arr.splice(idx,1); arr[idx-1].children.push(item); arr[idx-1].collapsed=false; save(); renderCnt(); setTimeout(()=>focI(item.id),60); }
    else if(e.shiftKey&&par){ const[item]=arr.splice(idx,1); const gp=getpar(l.items,par.id); const pa=gp?gp.children:l.items; const pi=pa.findIndex(i=>i.id===par.id); pa.splice(pi+1,0,item); save(); renderCnt(); setTimeout(()=>focI(item.id),60); }
  }
}

// ── Estado do quiz ──
// S._quizAtivo     : bool
// S._quizPerguntas : [{pai, filhos[], correta}] — lista embaralhada
// S._quizIdx       : índice atual
// S._quizPontos    : acertos
// S._quizTotal     : total respondido
// S._quizRespondeu : bool — já escolheu nesta pergunta?

function iniciarQuiz(){
  const list = getL(); if(!list) return;

  // Coleta só itens PAI que têm pelo menos 2 filhos
  const candidatos = list.items.filter(i => i.children && i.children.length >= 2);
  if(candidatos.length === 0){
    alert('Para o quiz, crie itens com pelo menos 2 filhos.\nOs pais serão as perguntas e os filhos as respostas.');
    return;
  }

  // Monta perguntas: cada filho do pai é uma opção, o primeiro filho é a "correta"
  // (ou seja: o usuário define a correta sendo o PRIMEIRO filho)
  const perguntas = candidatos.map(pai => {
    const filhos = [...pai.children];
    const correta = filhos[0].text; // primeiro filho = resposta certa
    const opcoes = shuffle([...filhos.map(f => f.text)]);
    return { pergunta: pai.text, opcoes, correta };
  });

  S._quizAtivo     = true;
  S._quizPerguntas = shuffle(perguntas);
  S._quizIdx       = 0;
  S._quizPontos    = 0;
  S._quizTotal     = 0;
  S._quizRespondeu = false;
  save(); renderAll();
}

function encerrarQuiz(){
  S._quizAtivo = false;
  save(); renderAll();
}

function shuffle(arr){
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function responderQuiz(opcao){
  if(S._quizRespondeu) return; // já respondeu, aguarda próxima
  S._quizRespondeu = true;
  S._quizTotal++;
  const q = S._quizPerguntas[S._quizIdx];
  if(opcao === q.correta) S._quizPontos++;
  save(); renderCnt();
}

function proximaQuiz(){
  S._quizIdx++;
  S._quizRespondeu = false;
  if(S._quizIdx >= S._quizPerguntas.length){
    // Terminou todas as perguntas
    S._quizIdx = 0;
    S._quizPerguntas = shuffle(S._quizPerguntas); // embaralha de novo pro próximo ciclo
  }
  save(); renderCnt();
}

function renderQuiz(){
  const perguntas = S._quizPerguntas;
  const idx       = S._quizIdx;
  const q         = perguntas[idx];
  const pontos    = S._quizPontos;
  const total     = S._quizTotal;
  const respondeu = S._quizRespondeu;
  const pct       = total > 0 ? Math.round(pontos / total * 100) : 0;
  const restantes = perguntas.length;

  // Cores das opções após responder
  const corOpcao = opcao => {
    if(!respondeu) return `background:var(--surface2);border-color:var(--border);color:var(--text)`;
    if(opcao === q.correta) return `background:rgba(62,207,142,.15);border-color:var(--green);color:var(--green)`;
    return `background:rgba(232,86,94,.08);border-color:rgba(232,86,94,.3);color:var(--text3)`;
  };

  const iconeOpcao = opcao => {
    if(!respondeu) return '';
    if(opcao === q.correta) return '✅ ';
    return '❌ ';
  };

  return `
    <div style="display:flex;flex-direction:column;gap:14px">

      <!-- Placar -->
      <div style="display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px">
        <div style="flex:1;display:flex;flex-direction:column;gap:4px">

    reg('orcamento', {

  tb(){ return `<button class="tbbtn" onclick="openOrcConfig()">💰 Mão de obra</button>`; },
  onRenderBottom(lv, list){
    const h=calcOrcamento(list); if(!h) return;
    const d=document.createElement('div'); d.innerHTML=h; lv.appendChild(d);

function parseValorItem(texto){
  // Captura número antes de palavras de dinheiro ou tempo
  // Ex: "10 reais", "1 hora", "30 minutos", "5 conto", "3 pilas"
  const money = /(\d+(?:[.,]\d+)?)\s*(?:reais?|real|contos?|pilas?|r\$)/gi;
  const hours  = /(\d+(?:[.,]\d+)?)\s*h(?:oras?|r)?(?:\b)/gi;
  const mins   = /(\d+(?:[.,]\d+)?)\s*min(?:utos?)?(?:\b)/gi;

  let totalMoney = 0;
  let totalMinutes = 0;

  let m;
  while((m = money.exec(texto)) !== null)
    totalMoney += parseFloat(m[1].replace(',','.'));
  while((m = hours.exec(texto)) !== null)
    totalMinutes += parseFloat(m[1].replace(',','.')) * 60;
  while((m = mins.exec(texto)) !== null)
    totalMinutes += parseFloat(m[1].replace(',','.'));

  return { totalMoney, totalMinutes };
}

function calcOrcamento(list){
  // Pega todos os itens MARCADOS recursivamente
  const checked = [];
  const walk = arr => arr.forEach(i => {
    if(i.checked) checked.push(i);
    if(i.children) walk(i.children);
  });
  walk(list.items);

  if(!checked.length) return `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px">
      <div style="font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace">
        💰 Marque itens com valores para calcular o orçamento.
      </div>
    </div>`;

  const precoHora = parseFloat(S._orcPrecoHora || 100);

  let totalDinheiro = 0;
  let totalMinutos  = 0;
  const linhas = [];

  for(const item of checked){
    const { totalMoney, totalMinutes } = parseValorItem(item.text);
    if(totalMoney > 0 || totalMinutes > 0){
      const valorTempo = (totalMinutes / 60) * precoHora;
      const subtotal   = totalMoney + valorTempo;
      totalDinheiro   += totalMoney;
      totalMinutos    += totalMinutes;

      let descTempo = '';
      if(totalMinutes > 0){
        const h = Math.floor(totalMinutes/60);
        const min = Math.round(totalMinutes % 60);
        descTempo = h > 0 && min > 0 ? `${h}h ${min}min` : h > 0 ? `${h}h` : `${min}min`;
      }

      linhas.push(`
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
          <div style="font-size:12px;color:var(--text2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(item.text)}</div>
          <div style="font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text);flex-shrink:0;text-align:right">
            ${totalMoney>0 ? `<span style="color:var(--green)">R$ ${totalMoney.toFixed(2).replace('.',',')}</span>` : ''}
            ${descTempo ? `<span style="color:var(--blue);margin-left:6px">⏱ ${descTempo}</span>` : ''}
            ${valorTempo>0 ? `<span style="color:var(--orange);margin-left:6px">+R$ ${valorTempo.toFixed(2).replace('.',',')}</span>` : ''}
          </div>
        </div>`);
    }
  }

  const valorTotalTempo = (totalMinutos / 60) * precoHora;
  const grandTotal      = totalDinheiro + valorTotalTempo;

  const hTotal   = Math.floor(totalMinutos/60);
  const minTotal = Math.round(totalMinutos % 60);
  const tempoStr = hTotal > 0 && minTotal > 0 ? `${hTotal}h ${minTotal}min` : hTotal > 0 ? `${hTotal}h` : minTotal > 0 ? `${minTotal}min` : '';

  if(!linhas.length) return `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px">
      <div style="font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace">
        💰 Nenhum item marcado contém valores ou horas reconhecíveis.
      </div>
    </div>`;

  return `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:4px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3)">💰 Orçamento</div>
        <div style="font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3)">
          mão de obra: R$ ${precoHora.toFixed(2).replace('.',',')}/h
        </div>
      </div>
      ${linhas.join('')}
      <div style="display:flex;justify-content:space-between;align-items:center;padding-top:10px;margin-top:4px">
        <div style="display:flex;flex-direction:column;gap:2px">
          ${tempoStr ? `<div style="font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--blue)">⏱ ${tempoStr} × R$ ${precoHora.toFixed(2).replace('.',',')}/h = R$ ${valorTotalTempo.toFixed(2).replace('.',',')}</div>` : ''}
          ${totalDinheiro > 0 ? `<div style="font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--green)">💵 Materiais: R$ ${totalDinheiro.toFixed(2).replace('.',',')}</div>` : ''}
        </div>
        <div style="font-size:18px;font-weight:800;color:var(--accent)">R$ ${grandTotal.toFixed(2).replace('.',',')}</div>
      </div>
    </div>`;
}

      <div class="fl">Preço por hora (R$)</div>
      <input type="number" id="moh" min="0" step="0.01"

reg('focus', {

function iniciarFocus(){
  S._focusAtivo  = true;
  S._focusPath   = []; // caminho de ids expandidos: [avô, pai, filho...]
  save(); renderAll();
}

function encerrarFocus(){
  S._focusAtivo = false;
  S._focusPath  = [];
  save(); renderAll();
}

function focusEntrar(id){
  // Entra num item: adiciona ao caminho
  const list = getL(); if(!list) return;
  const item = find(list.items, id); if(!item) return;

  // Verifica se o id já está no caminho (voltar para um nível anterior)
  const idx = S._focusPath.indexOf(id);
  if(idx !== -1){
    // Trunca o caminho até este ponto
    S._focusPath = S._focusPath.slice(0, idx + 1);
  } else {
    S._focusPath.push(id);
  }
  save(); renderCnt();
}

function focusVoltar(){
  S._focusPath.pop();
  save(); renderCnt();
}

// Marca/desmarca SOMENTE o item clicado, sem propagar para filhos
function togChkFocus(id, v){
  const list = getL(); if(!list) return;
  const item = find(list.items, id); if(!item) return;
  item.checked = v; // só este item, sem tocar nos filhos
  save(); renderCnt();
}

function renderFocus(list){
  const path = S._focusPath || [];

  // Descobre os itens a mostrar em cada nível do caminho
  // Nível 0: filhos diretos da lista (raiz)
  // Nível N: filhos do item path[N-1]

  let nivelAtual;
  let itemAtivo = null;

  if(path.length === 0){
    nivelAtual = list.items;
  } else {
    itemAtivo = find(list.items, path[path.length - 1]);
    nivelAtual = itemAtivo?.children || [];
  }

  // Monta o breadcrumb (trilha de navegação)
  const breadcrumb = path.map((id, i) => {
    const item = find(list.items, id);
    return `<span onclick="focusEntrar('${id}')"
      style="cursor:pointer;color:${i === path.length-1 ? 'var(--accent)' : 'var(--text3)'};
             font-size:12px;font-family:'JetBrains Mono',monospace;
             text-decoration:${i === path.length-1 ? 'none' : 'underline'}"
      >${esc(item?.text||'?')}</span>`;
  });

  const trilha = `
    <div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;padding:8px 12px;
                background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);
                font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace">
      <span onclick="encerrarFocus();iniciarFocus()"
        style="cursor:pointer;color:var(--text3);text-decoration:underline">🎯 raiz</span>
      ${breadcrumb.map(b => `<span style="color:var(--border)">›</span>${b}`).join('')}
    </div>`;

  // Botão voltar
  const btnVoltar = path.length > 0 ? `
    <button onclick="focusVoltar()" class="btn" style="width:100%;margin-bottom:4px">
      ← Voltar
    </button>` : '';

  // Contexto: mostra o item pai atual em destaque
  const ctxPai = itemAtivo ? `
    <div style="background:var(--surface2);border:1px solid var(--accent);border-radius:var(--r);
                padding:14px 16px;display:flex;align-items:center;gap:10px">
      <input type="checkbox" class="icb ${itemAtivo.checked?'checked':''}"
        ${itemAtivo.checked?'checked':''}
        onchange="togChkFocus('${itemAtivo.id}',this.checked)"
        style="flex-shrink:0">
    <div style="flex:1;font-size:16px;font-weight:700;color:var(--text);line-height:2.2">
        ${(pon('audio') && itemAtivo.text && itemAtivo.text.includes('⟨🎙'))
          ? renderRichText(itemAtivo)
          : esc(itemAtivo.text)}
      </div>
        ${itemAtivo.children?.length ? `<span style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace">${itemAtivo.children.length} filho${itemAtivo.children.length>1?'s':''}</span>` : ''}
    </div>` : '';

  // Lista os itens do nível atual
const listaItens = nivelAtual.length === 0 ? `
    <div style="text-align:center;padding:24px;color:var(--text3);font-size:13px;font-family:'JetBrains Mono',monospace">
      Sem filhos neste item.
    </div>` :
    nivelAtual.map(item => {
      const temFilhos = item.children?.length > 0;
      const {d, t} = temFilhos ? cp(item.children) : {d:0, t:0};

      // Badges de orçamento
      let orcHtml = '';
      if(pon('orcamento')){
        const {totalMoney, totalMinutes} = parseValorItem(item.text);
        const precoHora = parseFloat(S._orcPrecoHora || 100);
        const valorTempo = (totalMinutes/60)*precoHora;
        const subtotal = totalMoney + valorTempo;
        if(subtotal > 0){
          const h=Math.floor(totalMinutes/60), min=Math.round(totalMinutes%60);
          const tempoStr=h>0&&min>0?`${h}h ${min}min`:h>0?`${h}h`:min>0?`${min}min`:'';
          orcHtml=`<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:5px">
            ${totalMoney>0?`<span style="font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--green);background:rgba(62,207,142,.1);border:1px solid rgba(62,207,142,.3);padding:1px 7px;border-radius:20px">R$ ${totalMoney.toFixed(2).replace('.',',')}</span>`:''}
            ${tempoStr?`<span style="font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--blue);background:rgba(79,167,232,.1);border:1px solid rgba(79,167,232,.3);padding:1px 7px;border-radius:20px">⏱ ${tempoStr} = R$ ${valorTempo.toFixed(2).replace('.',',')}</span>`:''}
            <span style="font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--accent);font-weight:700">= R$ ${subtotal.toFixed(2).replace('.',',')}</span>
          </div>`;
        }
      }

      return `
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;transition:border-color .15s">
          <div style="display:flex;align-items:center;gap:8px">
            <input type="checkbox" class="icb"
              ${item.checked?'checked':''}
              onchange="togChkFocus('${item.id}',this.checked)"
              style="flex-shrink:0;width:30px;height:28px">
            <div style="flex:1;font-size:14px;
                        color:${item.checked?'var(--text3)':'var(--text)'};
                        text-decoration:${item.checked?'line-through':'none'};
                        line-height:1.5;cursor:${temFilhos?'pointer':'default'}"
                 ${temFilhos?`onclick="focusEntrar('${item.id}')"`:''}
            >${(pon('audio') && item.text && item.text.includes('⟨🎙')) ? renderRichText(item) : esc(item.text)}</div>
            ${temFilhos?`<div onclick="focusEntrar('${item.id}')" style="display:flex;align-items:center;gap:4px;flex-shrink:0;cursor:pointer;padding:4px">
              <span style="font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3)">${d}/${t}</span>
              <span style="color:var(--accent);font-size:14px;font-weight:700">›</span>
            </div>`:''}
          </div>
          ${orcHtml}
        </div>`;
    }).join('');

// Total orçamento dos itens marcados no nível atual
  // Total orçamento — soma TODOS os itens marcados da lista inteira, não só do nível atual
  let orcTotalHtml = '';
  if(pon('orcamento')){
    const precoHora = parseFloat(S._orcPrecoHora || 100);
    let total = 0;
    let marcados = 0;

    // Coleta todos os itens marcados recursivamente na lista toda
    const walk = arr => arr.forEach(item => {
      if(item.checked){
        const {totalMoney, totalMinutes} = parseValorItem(item.text);
        const subtotal = totalMoney + (totalMinutes/60)*precoHora;
        if(subtotal > 0){ total += subtotal; marcados++; }
      }
      if(item.children) walk(item.children);
    });
    walk(list.items);

    if(total > 0){
      orcTotalHtml=`<div style="display:flex;align-items:center;justify-content:space-between;
        background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px">
        <span style="font-size:12px;color:var(--text2);font-family:'JetBrains Mono',monospace">

        </span>
        <span style="font-size:16px;font-weight:800;color:var(--accent)">
          R$ ${total.toFixed(2).replace('.',',')}
        </span>
      </div>`;
    }
  }

  return `
    <div style="display:flex;flex-direction:column;gap:10px">
      ${trilha}
      ${btnVoltar}
      ${ctxPai}
      ${ctxPai && nivelAtual.length > 0 ? `<div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);padding:4px 2px">Filhos</div>` : ''}
      <div style="display:flex;flex-direction:column;gap:6px">${listaItens}</div>
      ${orcTotalHtml}
      ${nivelAtual.length > 0 && nivelAtual.some(i=>i.children?.length>0) ? `<div style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-align:center;padding:4px">Toque no texto para entrar nos filhos ›</div>` : ''}
    </div>`;

// ── Estado global de gravação ──
let _audRec = null, _audChunks = [], _audItemId = null, _audMarkId = null;

// ── Players ativos (audio elements em memória) ──
const _audPlayers = {}; // markId → HTMLAudioElement

// ── Insere marcador no cursor dentro do itext ──
function audioInsert(itemId){
  const list = getL(); if(!list) return;
  const item = find(list.items, itemId); if(!item) return;

  const markId = genId();
  const marker = `⟨🎙${markId}⟩`;

  // Tenta inserir no cursor do contenteditable
  const el = document.querySelector(`[data-id="${itemId}"] .itext`);
  if(el && el.isContentEditable){
    el.focus();
    const sel = window.getSelection();
    if(sel && sel.rangeCount){
      const range = sel.getRangeAt(0);
      range.deleteContents();
      const node = document.createTextNode(marker);
      range.insertNode(node);
      range.setStartAfter(node);
      range.collapse(true);
      sel.removeAllRanges(); sel.addRange(range);
      item.text = el.innerText;
    } else {
      item.text = (item.text||'') + marker;
    }
  } else {
    item.text = (item.text||'') + marker;
  }

  if(!item.audios) item.audios = {};
  item.audios[markId] = { src: null };
  save(); renderCnt();

  // Auto-inicia gravação
  setTimeout(() => audioStartRec(itemId, markId), 100);
}

// ── Renderiza o texto com chips de áudio inline ──
function renderRichText(item){
  if(!item.text) return '';
  const audios = item.audios || {};

  // Divide nos marcadores ⟨🎙id⟩
  const parts = item.text.split(/(⟨🎙[a-z0-9]+⟩)/g);

  return parts.map(part => {
    const m = part.match(/^⟨🎙([a-z0-9]+)⟩$/);
    if(!m) return esc(part);

    const markId = m[1];
    const aud    = audios[markId];

    if(aud && aud.src){
      // Player customizado
      return `<span class="aud-chip" id="chip-${markId}">
        <button class="aud-play" id="play-${markId}"
          onclick="audioPlayPause('${markId}','${item.id}')">▶</button>
        <span class="aud-bar-wrap" onclick="audioSeek(event,'${markId}')">
          <div class="aud-bar-fill" id="bar-${markId}"></div>
        </span>
        <span class="aud-time" id="time-${markId}">0:00</span>
        <button class="aud-del-btn" onclick="audioDel('${item.id}','${markId}')">✕</button>
      </span>`;
    } else {
      // Ainda sem áudio — mostra botões gravar/importar
      const isRec = _audItemId===item.id && _audMarkId===markId && _audRec;
      return `<span class="aud-chip pending ${isRec?'recording':''}">
        <button class="aud-rec-btn ${isRec?'on':''}" id="arec-${markId}"
          onclick="audioToggleRec('${item.id}','${markId}')">
          ${isRec ? '⏹ Parar' : '🎙 Gravar'}
        </button>
        <button class="aud-rec-btn" onclick="audioImport('${item.id}','${markId}')">📎</button>
        <button class="aud-del-btn" onclick="audioDel('${item.id}','${markId}')">✕</button>
      </span>`;
    }
  }).join('');
}

// ── Player customizado ──
function audioPlayPause(markId, itemId){
  // Para todos os outros players
  Object.entries(_audPlayers).forEach(([id, a]) => {
    if(id !== markId){
      a.pause();
      const b = document.getElementById(`play-${id}`);
      const c = document.getElementById(`chip-${id}`);
      if(b) b.textContent = '▶';
      if(c) c.classList.remove('aud-playing');
    }
  });

  // Cria o player se não existir
  if(!_audPlayers[markId]){
    const list = getL(); if(!list) return;
    const item = find(list.items, itemId); if(!item) return;
    const src  = item.audios?.[markId]?.src; if(!src) return;

    const a = new Audio(src);
    _audPlayers[markId] = a;

    // Atualiza barra e tempo
    a.ontimeupdate = () => {
      const pct = a.duration ? (a.currentTime / a.duration * 100) : 0;
      const bar = document.getElementById(`bar-${markId}`);
      const tim = document.getElementById(`time-${markId}`);
      if(bar) bar.style.width = pct + '%';
      if(tim) tim.textContent = fmtTime(a.currentTime);
    };
    a.onended = () => {
      const b = document.getElementById(`play-${markId}`);
      const c = document.getElementById(`chip-${markId}`);
      const bar = document.getElementById(`bar-${markId}`);
      if(b) b.textContent = '▶';
      if(c) c.classList.remove('aud-playing');
      if(bar) bar.style.width = '0%';
    };
  }

  const a   = _audPlayers[markId];
  const btn = document.getElementById(`play-${markId}`);
  const chip= document.getElementById(`chip-${markId}`);

  if(a.paused){
    a.play();
    if(btn)  btn.textContent = '⏸';
    if(chip) chip.classList.add('aud-playing');
  } else {
    a.pause();
    if(btn)  btn.textContent = '▶';
    if(chip) chip.classList.remove('aud-playing');
  }
}

function audioSeek(event, markId){
  const a = _audPlayers[markId]; if(!a || !a.duration) return;
  const rect = event.currentTarget.getBoundingClientRect();
  const pct  = (event.clientX - rect.left) / rect.width;
  a.currentTime = pct * a.duration;
}

function fmtTime(s){
  const m = Math.floor(s/60);
  const sec = Math.floor(s%60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

// ── Gravação ──
function audioToggleRec(itemId, markId){
  if(_audItemId===itemId && _audMarkId===markId && _audRec){
    _audRec.stop(); return;
  }
  if(_audRec){ _audRec.onstop=null; _audRec.stop(); }
  audioStartRec(itemId, markId);
}

async function audioStartRec(itemId, markId){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({ audio:true });
    _audChunks=[]; _audItemId=itemId; _audMarkId=markId;
    const mime = ['audio/webm','audio/mp4','audio/ogg'].find(t=>MediaRecorder.isTypeSupported(t))||'';
    _audRec = new MediaRecorder(stream, mime?{mimeType:mime}:{});
    _audRec.ondataavailable = e=>{ if(e.data.size>0) _audChunks.push(e.data); };
    _audRec.onstop = ()=>{
      stream.getTracks().forEach(t=>t.stop());
      const blob = new Blob(_audChunks,{type:_audRec.mimeType||'audio/webm'});
      const reader = new FileReader();
      reader.onload = ev=>{
        const list=getL(); if(!list) return;
        const item=find(list.items,itemId); if(!item) return;
        if(!item.audios) item.audios={};
        if(!item.audios[markId]) item.audios[markId]={};
        item.audios[markId].src = ev.target.result;
        _audRec=null; _audItemId=null; _audMarkId=null;
        save(); renderCnt();
      };
      reader.readAsDataURL(blob);
    };
    _audRec.start();
    // Atualiza visual imediatamente
    renderCnt();
  } catch(e){ alert('Microfone inacessível:\n'+e.message); }
}

function audioImport(itemId, markId){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='audio/*';
  inp.onchange=e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const list=getL(); if(!list) return;
      const item=find(list.items,itemId); if(!item) return;
      if(!item.audios) item.audios={};
      if(!item.audios[markId]) item.audios[markId]={};
      item.audios[markId].src=ev.target.result;
      save(); renderCnt();
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

function audioDel(itemId, markId){
  const list=getL(); if(!list) return;
  const item=find(list.items,itemId); if(!item) return;
  // Remove marcador do texto e o dado
  item.text=(item.text||'').replace(`⟨🎙${markId}⟩`,'').trim();
  if(item.audios) delete item.audios[markId];
  if(_audPlayers[markId]){ _audPlayers[markId].pause(); delete _audPlayers[markId]; }
  save(); renderCnt();
}

// ── Helpers ──
function pontoHoje(){ return new Date().toISOString().slice(0,10); }
function hhmm(str){ if(!str||!str.includes(':')) return 0; const[h,m]=str.split(':').map(Number); return h*60+(m||0); }
function minsToStr(mins){ const a=Math.abs(mins),h=Math.floor(a/60),m=a%60; return `${h}h${m.toString().padStart(2,'0')}`; }
function fmtData(key){
  const[y,mo,d]=key.split('-');
  const nomes=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  return `${nomes[new Date(+y,+mo-1,+d).getDay()]} ${d}/${mo}`;
}

// ── Estado temporário dos campos em edição (não salvo) ──
// Usamos S._pontoRascunho para guardar valores enquanto digita
function pontoGetRascunho(key){
  if(!S._pontoRascunho) S._pontoRascunho={};
  const c=S._ponto.config;
  // Se já existe dia salvo, parte dele; senão parte do padrão
  if(!S._pontoRascunho[key]){
    const base = S._ponto.dias[key]
      ? {...S._ponto.dias[key]}
      : {entrada:c.entradaPad,saidaAlm:c.saidaAlmPad,retorno:c.retornoPad,saida:c.saidaPad,extras:[],adiantamentos:[]};
    S._pontoRascunho[key]=base;
  }
  return S._pontoRascunho[key];
}

function calcDia(dia){
  const c=S._ponto.config;
  if(!dia||!dia.entrada||!dia.saida) return {totalMin:0,jornadaMin:0,diffMin:0,totalStr:'--',jornadaStr:'--',diffStr:'--',ok:false};
  const ep=hhmm(c.entradaPad),sap=hhmm(c.saidaAlmPad),rp=hhmm(c.retornoPad),sp=hhmm(c.saidaPad);
  const jornadaMin=(sap-ep)+(sp-rp);
  const entrada=hhmm(dia.entrada);
  const saida=hhmm(dia.saida);
  let totalMin=0;
  // Dia parcial: saída antes do almoço OU sem horário de almoço preenchido
  const temAlmoco = dia.saidaAlm && dia.retorno;
  const saidaAntesAlmoco = saida <= sap;
  if(!temAlmoco || saidaAntesAlmoco){
    totalMin=Math.max(0,saida-entrada);
  } else {
    const saidaAlm=hhmm(dia.saidaAlm), retorno=hhmm(dia.retorno);
    totalMin=Math.max(0,saidaAlm-entrada)+Math.max(0,saida-retorno);
  }
  (dia.extras||[]).filter(e=>e.tipo==='horas').forEach(e=>{ totalMin+=Math.round(parseFloat(e.valor||0)*60); });
  const diffMin=totalMin-jornadaMin;
  return {
    totalMin,jornadaMin,diffMin,
    totalStr:minsToStr(totalMin),
    jornadaStr:minsToStr(jornadaMin),
    diffStr:(diffMin>=0?'+':'-')+minsToStr(Math.abs(diffMin)),
    ok:diffMin>=0
  };
}

function calcResumo(){
  const p=S._ponto,c=p.config;
  const keys=Object.keys(p.dias).sort();
  let totalMin=0,totalAdiant=0,totalServicos=0;
  for(const key of keys){
    const d=p.dias[key];
    if(d._rascunho) continue; // ignora dias não confirmados
    const r=calcDia(d);
    totalMin+=r.totalMin;
    (d.adiantamentos||[]).forEach(e=>{totalAdiant+=parseFloat(e.valor||0);});
    (d.extras||[]).filter(e=>e.tipo==='servico').forEach(e=>{totalServicos+=parseFloat(e.valor||0);});
  }
  const saldoAnteriorReais=parseFloat(p.saldoAnterior||0);
  const valorHoras=(totalMin/60)*parseFloat(c.valorHora||15);
  const totalAPagar=Math.max(0,valorHoras+totalServicos+saldoAnteriorReais-totalAdiant);
  return {totalMin,valorHoras,totalAdiant,totalServicos,saldoAnteriorReais,totalAPagar,keys:Object.keys(p.dias).filter(k=>!p.dias[k]._rascunho).sort()};
}
