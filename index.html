        const labels = { daily: 'Todo dia', weekly: 'Toda semana', monthly: 'Todo mês' };
        return `<span class="recbadge" onclick="setRec('${item.id}')">🔁 ${labels[item.recurrence] || item.recurrence}</span>`;
      },
      // Quando a lista é aberta, verifica se itens precisam ser resetados
      hdr(list) {
        checkRecurrence(list);
        return '';
      }
    });

    function checkRecurrence(list) {
      const now = new Date();
      const today = now.toISOString().slice(0, 10);
      const allItems = [];
      const col = a => a.forEach(i => { allItems.push(i); col(i.children || []); });
      col(list.items);
      let changed = false;
      for (const item of allItems) {
        if (!item.recurrence || !item.checked) continue;
        const last = item._recLast;
        if (!last) { item._recLast = today; continue; }
        let shouldReset = false;
        if (item.recurrence === 'daily' && last < today) shouldReset = true;
        if (item.recurrence === 'weekly') {
          const d1 = new Date(last), d2 = new Date(today);
          shouldReset = (d2 - d1) / (1000 * 60 * 60 * 24) >= 7;
        }
        if (item.recurrence === 'monthly') {
          const d1 = new Date(last), d2 = new Date(today);
          shouldReset = d2.getMonth() !== d1.getMonth() || d2.getFullYear() !== d1.getFullYear();
        }
        if (shouldReset) { item.checked = false; item._recLast = today; changed = true; }
      }
      if (changed) save();
    }

    function setRec(id) {
      const l = getL(); if (!l) return;
      const item = find(l.items, id);
      openM('Item Recorrente', `
    <div class="fg"><div class="fl">Frequência de reset</div>
      <select id="mrc">
        <option value="" ${!item?.recurrence ? 'selected' : ''}>Sem recorrência</option>
        <option value="daily" ${item?.recurrence === 'daily' ? 'selected' : ''}>Todo dia</option>
        <option value="weekly" ${item?.recurrence === 'weekly' ? 'selected' : ''}>Toda semana</option>
        <option value="monthly" ${item?.recurrence === 'monthly' ? 'selected' : ''}>Todo mês</option>
      </select>
    </div>
    <div style="font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace;line-height:1.6">
      O item será automaticamente desmarcado conforme a frequência escolhida quando você abrir o app.
    </div>
  `, () => {
        const v = document.getElementById('mrc')?.value;
        if (item) { item.recurrence = v || null; item._recLast = new Date().toISOString().slice(0, 10); save(); renderCnt(); }
      });
    }

    // ── 11. EXPORT MARKDOWN / CSV ─────────────────────────
    reg('exportmd', {
      name: 'Export Markdown / CSV', icon: '📤', desc: 'Exporta lista em Markdown ou CSV', def: false,
      tb() { return `<button class="tbbtn" onclick="openExportPanel()">📤 Exportar</button>`; }
    });

    function listToMarkdown(items, depth = 0) {
      let out = '';
      for (const item of items) {
        const pad = '  '.repeat(depth);
        const cb = item.checked ? '[x]' : '[ ]';
        out += `${pad}- ${cb} ${item.text}\n`;
        if (item.children?.length) out += listToMarkdown(item.children, depth + 1);
      }
      return out;
    }

    function listToCSV(items, depth = 0) {
      let rows = [];
      for (const item of items) {
        rows.push([`"${'  '.repeat(depth) + item.text.replace(/"/g, '""')}"`, item.checked ? 'sim' : 'não',
        item.priority || 'none', item.due || '', item.estimate || '', `"${(item.tags || []).map(t => t.label).join(', ')}"`].join(','));
        if (item.children?.length) rows = rows.concat(listToCSV(item.children, depth + 1));
      }
      return rows;
    }

    function openExportPanel() {
      const l = getL(); if (!l) return;
      const md = `# ${l.name}\n\n` + listToMarkdown(l.items);
      const csvRows = ['Texto,Concluído,Prioridade,Prazo,Estimativa,Tags', ...listToCSV(l.items)];
      const csv = csvRows.join('\n');

      openM('Exportar Lista', `
    <div class="view-tabs" style="margin-bottom:4px">
      <button class="vtab on" id="vtmd" onclick="swExport('md')">Markdown</button>
      <button class="vtab" id="vtcsv" onclick="swExport('csv')">CSV</button>
    </div>
    <pre class="export-pre" id="expre">${esc(md)}</pre>
    <div class="macts">
      <button class="btn" onclick="copyExport()">📋 Copiar</button>
      <button class="btn pri" onclick="dlExport()">⬇ Download</button>
    </div>
  `, null);
      window._expData = { md, csv, mode: 'md' };
    }

    window.swExport = mode => {
      window._expData.mode = mode;
      document.getElementById('expre').textContent = mode === 'md' ? window._expData.md : window._expData.csv;
      document.getElementById('vtmd').classList.toggle('on', mode === 'md');
      document.getElementById('vtcsv').classList.toggle('on', mode === 'csv');
    };
    window.copyExport = () => {
      const d = window._expData;
      navigator.clipboard.writeText(d.mode === 'md' ? d.md : d.csv).then(() => alert('Copiado!'));
    };
    window.dlExport = () => {
      const d = window._expData;
      const content = d.mode === 'md' ? d.md : d.csv;
      const ext = d.mode === 'md' ? 'md' : 'csv';
      const l = getL();
      const b = new Blob([content], { type: 'text/plain' });
      const a = document.createElement('a'); a.href = URL.createObjectURL(b);
      a.download = `${(l?.name || 'lista').replace(/\s+/g, '_')}.${ext}`; a.click();
    };

    // ── 12. COR DA LISTA ──────────────────────────────────
    const LIST_COLORS = [
      { name: 'roxo', hex: '#7c6af7' },
      { name: 'verde', hex: '#3ecf8e' },
      { name: 'azul', hex: '#4fa7e8' },
      { name: 'vermelho', hex: '#e8565e' },
      { name: 'laranja', hex: '#f0804b' },
      { name: 'amarelo', hex: '#e8c84a' },
      { name: 'rosa', hex: '#e87ac8' },
      { name: 'branco', hex: '#888892' },
    ];

    reg('listcolor', {
      name: 'Cor da Lista', icon: '🎨', desc: 'Cor personalizada por lista', def: false,
      tb() {
        const l = getL(); if (!l) return '';
        const c = l.color || '#7c6af7';
        return `<button class="tbbtn" onclick="openColorPicker()" style="gap:6px">
      <span style="width:10px;height:10px;border-radius:50%;background:${c};display:inline-block"></span>Cor da lista
    </button>`;
      }
    });

    function openColorPicker() {
      const l = getL(); if (!l) return;
      let sel = l.color || '#7c6af7';
      openM('Cor da Lista', `
    <div class="fg"><div class="fl">Escolha uma cor</div>
      <div class="cpick" id="lcp">
        ${LIST_COLORS.map(c => `<div class="lcswatch ${c.hex === sel ? 'sel' : ''}" style="background:${c.hex}" data-c="${c.hex}" title="${c.name}" onclick="pickLC(this,'${c.hex}')"></div>`).join('')}
      </div>
    </div>
  `, () => { l.color = sel; save(); renderAll(); });
      window.pickLC = (el, c) => { sel = c; document.querySelectorAll('.lcswatch').forEach(e => e.classList.toggle('sel', e.dataset.c === c)); };
    }

    // ── 13. LINKS / URLs ──────────────────────────────────
    reg('links', {
      name: 'Links nos itens', icon: '🔗', desc: 'Adiciona URLs clicáveis nos itens', def: false,
      abtn(item) { return `<button class="iabtn" onclick="setLink('${item.id}')">🔗</button>`; },
      meta(item) {
        if (!item.link) return '';
        const domain = (() => { try { return new URL(item.link).hostname.replace('www.', ''); } catch (e) { return item.link; } })();
        return `<a class="linkbadge" href="${esc(item.link)}" target="_blank" rel="noopener">🔗 ${esc(domain)}</a>`;
      }
    });

    function setLink(id) {
      const l = getL(); if (!l) return;
      const item = find(l.items, id);
      openM('Link / URL', `
    <div class="fg"><div class="fl">URL</div>
      <input type="url" id="mlk" placeholder="https://exemplo.com" value="${esc(item?.link || '')}">
    </div>
    ${item?.link ? `<button class="btn dng full" onclick="clrLink('${id}')">Remover link</button>` : ''}
  `, () => {
        const v = document.getElementById('mlk')?.value.trim();
        if (item) { item.link = v || null; save(); renderCnt(); }
      });
    }
    function clrLink(id) { const l = getL(); const item = find(l.items, id); if (item) { item.link = null; save(); closeM(); renderCnt(); } }

    // ── 14. VISTA KANBAN ──────────────────────────────────
    reg('kanban', {
      name: 'Vista Kanban', icon: '📋', desc: 'Visualiza itens em colunas de status', def: false,
      tb() { return `<div class="view-tabs"><button class="vtab ${S._view === 'list' ? 'on' : ''}" onclick="setView('list')">☰ Lista</button><button class="vtab ${S._view === 'kanban' ? 'on' : ''}" onclick="setView('kanban')">📋 Kanban</button></div>`; },
      onRenderTop(lv, list) {
        if (S._view !== 'kanban') return false;
        const kb = document.createElement('div'); kb.innerHTML = renderKanban(list); lv.appendChild(kb);
        return true; // substituiu a árvore
      }
    });

    function setView(v) { S._view = v; renderCnt(); }

    function renderKanban(list) {
      const all = [];
      const col = a => a.forEach(i => { all.push(i); col(i.children || []); });
      col(list.items);

      const todo = all.filter(i => !i.checked && i.priority !== 'high');
      const urgent = all.filter(i => !i.checked && i.priority === 'high');
      const done = all.filter(i => i.checked);

      const card = i => `<div class="kanban-card ${i.checked ? 'done-card' : ''}" onclick="togChk('${i.id}',${!i.checked})">
    ${esc(i.text)}
    ${i.due ? `<div style="font-size:10px;color:var(--text3);margin-top:4px;font-family:'JetBrains Mono',monospace">📅 ${i.due}</div>` : ''}
  </div>`;

      return `<div class="kanban-wrap">
    <div class="kanban-col">
      <div class="kanban-hdr">🔴 Urgente <span style="margin-left:auto;font-size:11px;color:var(--text3)">${urgent.length}</span></div>
      <div class="kanban-body">${urgent.map(card).join('') || '<div style="font-size:12px;color:var(--text3);padding:4px">Vazio</div>'}</div>
    </div>
    <div class="kanban-col">
      <div class="kanban-hdr">📝 A fazer <span style="margin-left:auto;font-size:11px;color:var(--text3)">${todo.length}</span></div>
      <div class="kanban-body">${todo.map(card).join('') || '<div style="font-size:12px;color:var(--text3);padding:4px">Vazio</div>'}</div>
    </div>
    <div class="kanban-col">
      <div class="kanban-hdr">✅ Concluído <span style="margin-left:auto;font-size:11px;color:var(--text3)">${done.length}</span></div>
      <div class="kanban-body">${done.map(card).join('') || '<div style="font-size:12px;color:var(--text3);padding:4px">Vazio</div>'}</div>
    </div>
  </div>`;
    }

    // ── 16. QUIZ ──────────────────────────────────────────
    reg('quiz', {
      name: 'Quiz / Flashcard', icon: '🧠',
      desc: 'Treino com perguntas e respostas — suporta texto e imagem', def: false,
      tb() {
        if (!S._quizAtivo) return `<button class="tbbtn" onclick="iniciarQuiz()">🧠 Iniciar Quiz</button>`;
        return `<button class="tbbtn" onclick="encerrarQuiz()">✕ Sair do Quiz</button>`;
      },
      onRenderCnt(lv, list) {
        if (!S._quizAtivo) return false;
        const h = document.createElement('div');
        h.innerHTML = `<div style="font-size:13px;font-weight:700;color:var(--text3);margin-bottom:4px">${esc(list.name)}</div>`;
        lv.appendChild(h);
        const v = document.createElement('div'); v.innerHTML = renderQuiz(); lv.appendChild(v);
        return true;
      }
    });

    // Extrai conteúdo de um item — texto limpo + imagem se tiver

    function _qExtrair(item) {
      if (!item) return { texto: '?', img: null, aud: null, chave: '' };

      const textoLimpo = (item.text || '').replace(/\u27E8[\s\S]*?\u27E9/g, '').trim();

      // Imagem
      let img = null;
      if (item.imgs && item.imgs.length > 0) img = item.imgs[0];

      // Áudio — vai direto no objeto sem regex
      let aud = null;
      if (item.audios && typeof item.audios === 'object') {
        const keys = Object.keys(item.audios);
        for (const k of keys) {
          const a = item.audios[k];
          if (a && a.src && a.src.length > 10) {
            const pid = 'qp_' + item.id + '_' + k;
            window._qAudSrc = window._qAudSrc || {};
            window._qAudSrc[pid] = a.src;
            aud = { src: a.src, nome: a.nome || textoLimpo || 'Áudio', pid };
            break;
          }
        }
      }

      return { texto: textoLimpo, img, aud, chave: item.id };
    }
    // Renderiza conteúdo como HTML
    function _qHtml(c, isOpcao = false) {
      if (!c) return '';
      let html = '';

      // Imagem
      if (c.img) {
        html += `<div style="display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:6px">
      <img src="${c.img.src}"
        onclick="_qVerImg('${c.img.src}')"
        style="max-width:100%;max-height:${isOpcao ? '100px' : '150px'};border-radius:8px;
               object-fit:contain;border:1px solid var(--border);cursor:zoom-in">
    </div>`;
      }

      // Áudio
      if (c.aud) {
        html += `<div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <button id="qbtn_${c.aud.pid}" onclick="_qTocar('${c.aud.pid}')"
        style="width:40px;height:40px;border-radius:50%;background:var(--accent);
               border:none;color:white;font-size:16px;cursor:pointer;flex-shrink:0;
               display:flex;align-items:center;justify-content:center">▶</button>
      <span style="font-size:13px;color:var(--text2)">${esc(c.aud.nome)}</span>
    </div>`;
      }

      // Texto pré-formatado
      if (c.texto) {
        const temCodigo = c.texto.includes('\n') || c.texto.includes('  ');
        if (temCodigo) {
          html += `<pre style="
          font-size:${isOpcao ? '12px' : '13px'};
          font-family:'JetBrains Mono',monospace;
          white-space:pre;
          overflow-x:auto;
          overflow-y:hidden;
          margin:0;
          padding:${isOpcao ? '6px 8px' : '10px 12px'};
          background:rgba(0,0,0,.2);
          border-radius:6px;
          border:1px solid var(--border);
          color:inherit;
          line-height:1.6;
          text-align:left;
          font-weight:400;
          max-width:100%">${esc(c.texto)}</pre>`;
        } else {
          html += `<span style="
        font-size:${isOpcao ? '14px' : '16px'};
        font-family:'Syne',sans-serif;
        white-space:pre-wrap;
        word-break:break-word;
        font-weight:${isOpcao ? '600' : '700'};
        line-height:1.5;
        text-align:left">${esc(c.texto)}</span>`;
        }
      }

      if (!html) html = '<span style="color:var(--text3)">...</span>';
      return html;
    }



    function iniciarQuiz() {
      const list = getL(); if (!list) return;

      const candidatos = list.items.filter(i => i.children && i.children.length >= 2);
      if (!candidatos.length) {
        alert('Para o quiz, crie itens com pelo menos 2 filhos.\nOs pais serão as perguntas e os filhos as respostas.\n\nDica: adicione imagens aos itens com o plugin 🖼️');
        return;
      }

      // Guarda apenas os IDs — busca os itens originais sempre na hora de renderizar
      const perguntas = shuffle(candidatos.map(pai => ({
        paiId: pai.id,
        certaId: pai.children[0].id,
        opcaoIds: shuffle(pai.children.map(f => f.id))
      })));

      S._quizAtivo = true;
      S._quizPerguntas = perguntas;
      S._quizIdx = 0;
      S._quizPontos = 0;
      S._quizTotal = 0;
      S._quizRespondeu = false;
      S._quizEscolha = null;
      save(); renderAll();
    }

    function encerrarQuiz() {
      S._quizAtivo = false;
      save(); renderAll();
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // Busca item por id em toda a árvore
    function _qAcharItem(id) {
      const list = getL(); if (!list) return null;
      const todos = [];
      const varrer = arr => arr.forEach(i => { todos.push(i); if (i.children?.length) varrer(i.children); });
      varrer(list.items);
      return todos.find(i => i.id === id) || null;
    }

    function responderQuiz(opcaoId) {
      if (S._quizRespondeu) return;
      S._quizRespondeu = true;
      S._quizEscolha = opcaoId;
      S._quizTotal++;
      const q = S._quizPerguntas[S._quizIdx];
      if (opcaoId === q.certaId) S._quizPontos++;
      save(); renderCnt();
    }

    function proximaQuiz() {
      // Para todos os áudios ao trocar de pergunta
      Object.values(window._qAudPlayers || {}).forEach(a => { a.pause(); a.currentTime = 0; });
      window._qAudPlayers = {};
      S._quizIdx++;
      S._quizRespondeu = false;
      S._quizEscolha = null;
      if (S._quizIdx >= S._quizPerguntas.length) {
        S._quizIdx = 0;
        S._quizPerguntas = shuffle(S._quizPerguntas);
      }
      save(); renderCnt();
    }

    window._qAudSrc = {};
    window._qAudPlayers = {};

    function _qTocar(pid) {
      // Para todos os outros
      Object.entries(window._qAudPlayers).forEach(([id, a]) => {
        if (id !== pid) {
          a.pause(); a.currentTime = 0;
          const b = document.getElementById('qbtn_' + id); if (b) b.textContent = '▶';
        }
      });

      // Cria player se não existe
      if (!window._qAudPlayers[pid]) {
        const src = window._qAudSrc[pid];
        if (!src) { console.warn('src não encontrado:', pid); return; }
        const a = new Audio(src);
        a.onended = () => { const b = document.getElementById('qbtn_' + pid); if (b) b.textContent = '▶'; };
        window._qAudPlayers[pid] = a;
      }

      const a = window._qAudPlayers[pid];
      const btn = document.getElementById('qbtn_' + pid);
      if (a.paused) { a.play(); if (btn) btn.textContent = '⏸'; }
      else { a.pause(); if (btn) btn.textContent = '▶'; }
    }

    function renderQuiz() {
      const perguntas = S._quizPerguntas;
      const idx = S._quizIdx;
      const qd = perguntas[idx];
      const pontos = S._quizPontos;
      const total = S._quizTotal;
      const respondeu = S._quizRespondeu;
      const escolha = S._quizEscolha;
      const pct = total > 0 ? Math.round(pontos / total * 100) : 0;
      const acertou = respondeu && escolha === qd.certaId;

      // Busca itens originais com todos os dados (imgs, etc)
      const paiItem = _qAcharItem(qd.paiId);
      const certaItem = _qAcharItem(qd.certaId);
      if (!paiItem) return '<div style="color:var(--red);padding:20px">Erro: pergunta não encontrada.</div>';

      const pergC = _qExtrair(paiItem);
      const certaC = _qExtrair(certaItem || { id: qd.certaId, text: '?' });
      const opcoes = qd.opcaoIds.map(id => {
        const item = _qAcharItem(id);
        return { id, c: _qExtrair(item || { id, text: '?' }) };
      });

      const estiloOp = op => {
        if (!respondeu) return `background:var(--surface2);border-color:var(--border);color:var(--text)`;
        if (op.id === qd.certaId) return `background:rgba(62,207,142,.15);border-color:var(--green);color:var(--green)`;
        if (op.id === escolha) return `background:rgba(232,86,94,.1);border-color:rgba(232,86,94,.4);color:var(--red)`;
        return `background:var(--surface2);border-color:var(--border);color:var(--text3);opacity:.5`;
      };

      const iconeOp = op => {
        if (!respondeu) return '';
        if (op.id === qd.certaId) return '<span style="margin-right:6px">✅</span>';
        if (op.id === escolha) return '<span style="margin-right:6px">❌</span>';
        return '';
      };

      return `
  <div style="display:flex;flex-direction:column;gap:14px">

    <!-- Placar -->
    <div style="display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px">
      <div style="flex:1;display:flex;flex-direction:column;gap:4px">
        <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3)">Pontuação</div>
        <div style="display:flex;align-items:baseline;gap:6px">
          <span style="font-size:24px;font-weight:800;color:var(--accent)">${pontos}</span>
          <span style="font-size:13px;color:var(--text3)">/ ${total} respondidas</span>
        </div>
        <div style="background:var(--border);border-radius:99px;height:4px;overflow:hidden;margin-top:2px">
          <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:99px;transition:width .4s"></div>
        </div>
      </div>
      <div style="text-align:center;padding-left:12px;border-left:1px solid var(--border)">
        <div style="font-size:22px;font-weight:800;color:${pct >= 70 ? 'var(--green)' : pct >= 40 ? 'var(--yellow)' : 'var(--red)'}">${pct}%</div>
        <div style="font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace">${idx + 1} / ${perguntas.length}</div>
      </div>
    </div>

    <!-- Pergunta -->
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:18px 16px;display:flex;flex-direction:column;gap:12px">
      <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3)">
        🧠 Pergunta ${idx + 1} de ${perguntas.length}
      </div>
      <div style="font-size:17px;font-weight:700;color:var(--text);line-height:1.5">
        ${_qHtml(pergC)}
      </div>
    </div>

    <!-- Opções -->
    <div style="display:flex;flex-direction:column;gap:8px">
      ${opcoes.map(op => `
        <button onclick="responderQuiz('${op.id}')"
          style="width:100%;padding:13px 16px;border-radius:var(--r);border:1px solid;
                 font-family:'Syne',sans-serif;font-size:14px;font-weight:600;
                 cursor:pointer;text-align:left;transition:all .2s;${estiloOp(op)}">
          ${iconeOp(op)}${_qHtml(op.c, true)}
        </button>`).join('')}
    </div>

    <!-- Feedback -->
    ${respondeu ? `
      <div style="display:flex;flex-direction:column;gap:8px">
        <div style="padding:14px;border-radius:var(--r);
          background:${acertou ? 'rgba(62,207,142,.1)' : 'rgba(232,86,94,.08)'};
          border:1px solid ${acertou ? 'rgba(62,207,142,.3)' : 'rgba(232,86,94,.3)'};
          display:flex;flex-direction:column;gap:8px">
          <div style="font-size:15px;font-weight:700;color:${acertou ? 'var(--green)' : 'var(--red)'}">
            ${acertou ? '🎉 Correto!' : '❌ Errou!'}
          </div>

    // plugin estrelas
    reg('stars', {

    function parseValorItem(texto) {
      // Captura número antes de palavras de dinheiro ou tempo
      // Ex: "10 reais", "1 hora", "30 minutos", "5 conto", "3 pilas"
      const money = /(\d+(?:[.,]\d+)?)\s*(?:reais?|real|contos?|pilas?|r\$)/gi;
      const hours = /(\d+(?:[.,]\d+)?)\s*h(?:oras?|r)?(?:\b)/gi;
      const mins = /(\d+(?:[.,]\d+)?)\s*min(?:utos?)?(?:\b)/gi;

      let totalMoney = 0;
      let totalMinutes = 0;

      let m;
      while ((m = money.exec(texto)) !== null)
        totalMoney += parseFloat(m[1].replace(',', '.'));
      while ((m = hours.exec(texto)) !== null)
        totalMinutes += parseFloat(m[1].replace(',', '.')) * 60;
      while ((m = mins.exec(texto)) !== null)
        totalMinutes += parseFloat(m[1].replace(',', '.'));

      return { totalMoney, totalMinutes };
    }

    function calcOrcamento(list) {
      // Pega todos os itens MARCADOS recursivamente
      const checked = [];
      const walk = arr => arr.forEach(i => {
        if (i.checked) checked.push(i);
        if (i.children) walk(i.children);
      });
      walk(list.items);

      if (!checked.length) return `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px">
      <div style="font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace">

      </div>
    </div>`;

      const precoHora = parseFloat(S._orcPrecoHora || 100);

      let totalDinheiro = 0;
      let totalMinutos = 0;
      const linhas = [];

      for (const item of checked) {
        const { totalMoney, totalMinutes } = parseValorItem(item.text);
        if (totalMoney > 0 || totalMinutes > 0) {
          const valorTempo = (totalMinutes / 60) * precoHora;
          const subtotal = totalMoney + valorTempo;
          totalDinheiro += totalMoney;
          totalMinutos += totalMinutes;

          let descTempo = '';
          if (totalMinutes > 0) {
            const h = Math.floor(totalMinutes / 60);
            const min = Math.round(totalMinutes % 60);
            descTempo = h > 0 && min > 0 ? `${h}h ${min}min` : h > 0 ? `${h}h` : `${min}min`;
          }

          linhas.push(`
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid var(--border)">
          <div style="font-size:12px;color:var(--text2);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(item.text)}</div>
          <div style="font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text);flex-shrink:0;text-align:right">
            ${totalMoney > 0 ? `<span style="color:var(--green)">R$ ${totalMoney.toFixed(2).replace('.', ',')}</span>` : ''}
            ${descTempo ? `<span style="color:var(--blue);margin-left:6px">⏱ ${descTempo}</span>` : ''}
            ${valorTempo > 0 ? `<span style="color:var(--orange);margin-left:6px">+R$ ${valorTempo.toFixed(2).replace('.', ',')}</span>` : ''}
          </div>
        </div>`);
        }
      }

      const valorTotalTempo = (totalMinutos / 60) * precoHora;
      const grandTotal = totalDinheiro + valorTotalTempo;

      const hTotal = Math.floor(totalMinutos / 60);
      const minTotal = Math.round(totalMinutos % 60);
      const tempoStr = hTotal > 0 && minTotal > 0 ? `${hTotal}h ${minTotal}min` : hTotal > 0 ? `${hTotal}h` : minTotal > 0 ? `${minTotal}min` : '';

      if (!linhas.length) return `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px">
      <div style="font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace">
        💰 Nenhum item marcado contém valores ou horas reconhecíveis.
      </div>
    </div>`;

      return `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:14px;display:flex;flex-direction:column;gap:4px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3)">💰 Orçamento</div>
        <div style="font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3)">
          mão de obra: R$ ${precoHora.toFixed(2).replace('.', ',')}/h
        </div>
      </div>
      ${linhas.join('')}
      <div style="display:flex;justify-content:space-between;align-items:center;padding-top:10px;margin-top:4px">
        <div style="display:flex;flex-direction:column;gap:2px">
          ${tempoStr ? `<div style="font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--blue)">⏱ ${tempoStr} × R$ ${precoHora.toFixed(2).replace('.', ',')}/h = R$ ${valorTotalTempo.toFixed(2).replace('.', ',')}</div>` : ''}
          ${totalDinheiro > 0 ? `<div style="font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--green)">💵 Materiais: R$ ${totalDinheiro.toFixed(2).replace('.', ',')}</div>` : ''}
        </div>
        <div style="font-size:18px;font-weight:800;color:var(--accent)">R$ ${grandTotal.toFixed(2).replace('.', ',')}</div>
      </div>
    </div>`;
    }

    function openOrcConfig() {
      openM('💰 Mão de obra', `
    <div class="fg">
      <div class="fl">Preço por hora (R$)</div>
      <input type="number" id="moh" min="0" step="0.01"

      let nivelAtual;
      let itemAtivo = null;

      if (path.length === 0) {
        nivelAtual = list.items;
      } else {
        itemAtivo = find(list.items, path[path.length - 1]);
        nivelAtual = itemAtivo?.children || [];
      }

      // Monta o breadcrumb (trilha de navegação)
      const breadcrumb = path.map((id, i) => {
        const item = find(list.items, id);
        return `<span onclick="focusEntrar('${id}')"
      style="cursor:pointer;color:${i === path.length - 1 ? 'var(--accent)' : 'var(--text3)'};
             font-size:12px;font-family:'JetBrains Mono',monospace;
             text-decoration:${i === path.length - 1 ? 'none' : 'underline'}"
      >${esc(item?.text || '?')}</span>`;

      const trilha = `
    <div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;padding:8px 12px;
                background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);

      <span onclick="encerrarFocus();iniciarFocus()"
        style="cursor:pointer;color:var(--text3);text-decoration:underline">🎯 raiz</span>
      ${breadcrumb.map(b => `<span style="color:var(--border)">›</span>${b}`).join('')}
    </div>`;

      // Botão voltar
      const btnVoltar = path.length > 0 ? `

    </button>` : '';

      // Contexto: mostra o item pai atual em destaque
      const ctxPai = itemAtivo ? `
    <div style="background:var(--surface2);border:1px solid var(--accent);border-radius:var(--r);
                padding:14px 16px;display:flex;align-items:center;gap:10px">
      <input type="checkbox" class="icb ${itemAtivo.checked ? 'checked' : ''}"

    </div>` : '';

          if (pon('orcamento')) {
            const { totalMoney, totalMinutes } = parseValorItem(item.text);
            const precoHora = parseFloat(S._orcPrecoHora || 100);
            const valorTempo = (totalMinutes / 60) * precoHora;
            const subtotal = totalMoney + valorTempo;
            if (subtotal > 0) {
              const h = Math.floor(totalMinutes / 60), min = Math.round(totalMinutes % 60);
              const tempoStr = h > 0 && min > 0 ? `${h}h ${min}min` : h > 0 ? `${h}h` : min > 0 ? `${min}min` : '';
              orcHtml = `<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:5px">
            ${totalMoney > 0 ? `<span style="font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--green);background:rgba(62,207,142,.1);border:1px solid rgba(62,207,142,.3);padding:1px 7px;border-radius:20px">R$ ${totalMoney.toFixed(2).replace('.', ',')}</span>` : ''}
            ${tempoStr ? `<span style="font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--blue);background:rgba(79,167,232,.1);border:1px solid rgba(79,167,232,.3);padding:1px 7px;border-radius:20px">⏱ ${tempoStr} = R$ ${valorTempo.toFixed(2).replace('.', ',')}</span>` : ''}
            <span style="font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--accent);font-weight:700">= R$ ${subtotal.toFixed(2).replace('.', ',')}</span>
          </div>`;
            }
          }

          return `
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;transition:border-color .15s">
          <div style="display:flex;align-items:center;gap:8px">
            <input type="checkbox" class="icb"
              ${item.checked ? 'checked' : ''}
              onchange="togChkFocus('${item.id}',this.checked)"
              style="flex-shrink:0;width:30px;height:28px">
            <div style="flex:1;font-size:14px;
                        color:${item.checked ? 'var(--text3)' : 'var(--text)'};
                        text-decoration:${item.checked ? 'line-through' : 'none'};
                        line-height:1.5;cursor:${temFilhos ? 'pointer' : 'default'}"
                 ${temFilhos ? `onclick="focusEntrar('${item.id}')"` : ''}
            >${(pon('audio') && item.text && item.text.includes('⟨🎙')) ? renderRichText(item) : esc(item.text)}</div>
            ${temFilhos ? `<div onclick="focusEntrar('${item.id}')" style="display:flex;align-items:center;gap:4px;flex-shrink:0;cursor:pointer;padding:4px">

      // Total orçamento dos itens marcados no nível atual
      // Total orçamento — soma TODOS os itens marcados da lista inteira, não só do nível atual
      let orcTotalHtml = '';
      if (pon('orcamento')) {
        const precoHora = parseFloat(S._orcPrecoHora || 100);
        let total = 0;
        let marcados = 0;

        // Coleta todos os itens marcados recursivamente na lista toda
        const walk = arr => arr.forEach(item => {
          if (item.checked) {
            const { totalMoney, totalMinutes } = parseValorItem(item.text);
            const subtotal = totalMoney + (totalMinutes / 60) * precoHora;
            if (subtotal > 0) { total += subtotal; marcados++; }

        if (total > 0) {
          orcTotalHtml = `<div style="display:flex;align-items:center;justify-content:space-between;

        </span>
        <span style="font-size:16px;font-weight:800;color:var(--accent)">
          R$ ${total.toFixed(2).replace('.', ',')}
        </span>
      </div>`;
        }
      }

      return `
    <div style="display:flex;flex-direction:column;gap:10px">
      ${trilha}
      ${btnVoltar}
      ${ctxPai}
      ${ctxPai && nivelAtual.length > 0 ? `<div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text3);padding:4px 2px">Filhos</div>` : ''}
      <div style="display:flex;flex-direction:column;gap:6px">${listaItens}</div>
      ${orcTotalHtml}
      ${nivelAtual.length > 0 && nivelAtual.some(i => i.children?.length > 0) ? `<div style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;text-align:center;padding:4px">Toque no texto para entrar nos filhos ›</div>` : ''}
    </div>`;
    }
    // ── 18. ÁUDIO INLINE ──────────────────────────────────
    reg('audio', {
      name: 'Áudio Inline', icon: '🎙️', desc: 'Áudios embutidos dentro do texto', def: false,
      abtn(item) {
        return `<button class="iabtn" title="Inserir áudio no cursor" onclick="audioInsert('${item.id}')">🎙️</button>`;
      }
    });

    (() => {
      const s = document.createElement('style');
      s.textContent = `

    // ── Estado global de gravação ──
    let _audRec = null, _audChunks = [], _audItemId = null, _audMarkId = null;
    let _audPaused = false; // novo

    // ── Players ativos (audio elements em memória) ──
    const _audPlayers = {}; // markId → HTMLAudioElement

    // ── Insere marcador no cursor dentro do itext ──
    function audioInsert(itemId) {
      const list = getL(); if (!list) return;
      const item = find(list.items, itemId); if (!item) return;

      const markId = genId();
      const marker = `⟨🎙${markId}⟩`;

      // Tenta inserir no cursor do contenteditable
      const el = document.querySelector(`[data-id="${itemId}"] .itext`);
      if (el && el.isContentEditable) {
        el.focus();
        const sel = window.getSelection();
        if (sel && sel.rangeCount) {
          const range = sel.getRangeAt(0);
          range.deleteContents();
          const node = document.createTextNode(marker);
          range.insertNode(node);
          range.setStartAfter(node);
          range.collapse(true);
          sel.removeAllRanges(); sel.addRange(range);
          item.text = el.innerText;
        } else {
          item.text = (item.text || '') + marker;
        }
      } else {
        item.text = (item.text || '') + marker;
      }

      if (!item.audios) item.audios = {};
      item.audios[markId] = { src: null };
      save(); renderCnt();

      // Auto-inicia gravação
      setTimeout(() => audioStartRec(itemId, markId), 100);
    }

    // ── Renderiza o texto com chips de áudio inline ──
    function renderRichText(item) {
      if (!item.text) return '';
      const audios = item.audios || {};

      // Divide nos marcadores ⟨🎙id⟩
      const parts = item.text.split(/(⟨🎙[a-z0-9]+⟩)/g);

      return parts.map(part => {
        const m = part.match(/^⟨🎙([a-z0-9]+)⟩$/);
        if (!m) return esc(part);

        const markId = m[1];
        const aud = audios[markId];

        if (aud && aud.src) {
          // Player customizado
          return `<span class="aud-chip" id="chip-${markId}">
        <button class="aud-play" id="play-${markId}"
          onclick="audioPlayPause('${markId}','${item.id}')">▶</button>
        <span class="aud-bar-wrap" onclick="audioSeek(event,'${markId}')">
          <div class="aud-bar-fill" id="bar-${markId}"></div>
        </span>
        <span class="aud-time" id="time-${markId}">0:00</span>
        ${aud.nome ? `<span style="font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(aud.nome)}</span>` : ''}
        <button class="aud-del-btn" onclick="audioDel('${item.id}','${markId}')">✕</button>
      </span>`;
        } else {
          // Ainda sem áudio — mostra botões gravar/importar
          const isRec = _audItemId === item.id && _audMarkId === markId && _audRec && !_audPaused;
          const isPaused = _audItemId === item.id && _audMarkId === markId && _audRec && _audPaused;
          const isActive = isRec || isPaused;

          return `<span class="aud-chip pending ${isRec ? 'recording' : ''}">
          ${!isActive ? `
            <button class="aud-rec-btn" id="arec-${markId}"
              onclick="audioToggleRec('${item.id}','${markId}')">
              🎙 Gravar
            </button>
            <button class="aud-rec-btn" onclick="audioImport('${item.id}','${markId}')">📎</button>
          ` : `
            <button class="aud-rec-btn ${isRec ? 'on' : ''}" id="arec-${markId}"
              onclick="audioToggleRec('${item.id}','${markId}')">
              ${isRec ? '⏸ Pausar' : '▶ Continuar'}
            </button>
            <button class="aud-rec-btn" style="background:rgba(232,86,94,.15);border-color:var(--red);color:var(--red)"
              onclick="audioStopRec('${item.id}','${markId}')">
              ⏹ Parar
            </button>
          `}
          <button class="aud-del-btn" onclick="audioDel('${item.id}','${markId}')">✕</button>
        </span>`;
        }
      }).join('');
    }

    // ── Player customizado ──
    function audioPlayPause(markId, itemId) {
      // Para todos os outros players
      Object.entries(_audPlayers).forEach(([id, a]) => {
        if (id !== markId) {
          a.pause();
          const b = document.getElementById(`play-${id}`);
          const c = document.getElementById(`chip-${id}`);
          if (b) b.textContent = '▶';
          if (c) c.classList.remove('aud-playing');
        }
      });

      // Cria o player se não existir
      if (!_audPlayers[markId]) {
        const list = getL(); if (!list) return;
        const item = find(list.items, itemId); if (!item) return;
        const src = item.audios?.[markId]?.src; if (!src) return;

        const a = new Audio(src);
        _audPlayers[markId] = a;

        // Atualiza barra e tempo
        a.ontimeupdate = () => {
          const pct = a.duration ? (a.currentTime / a.duration * 100) : 0;
          const bar = document.getElementById(`bar-${markId}`);
          const tim = document.getElementById(`time-${markId}`);
          if (bar) bar.style.width = pct + '%';
          if (tim) tim.textContent = fmtTime(a.currentTime);
        };
        a.onended = () => {
          const b = document.getElementById(`play-${markId}`);
          const c = document.getElementById(`chip-${markId}`);
          const bar = document.getElementById(`bar-${markId}`);
          if (b) b.textContent = '▶';
          if (c) c.classList.remove('aud-playing');
          if (bar) bar.style.width = '0%';
        };
      }

      const a = _audPlayers[markId];
      const btn = document.getElementById(`play-${markId}`);
      const chip = document.getElementById(`chip-${markId}`);

      if (a.paused) {
        a.play();
        if (btn) btn.textContent = '⏸';
        if (chip) chip.classList.add('aud-playing');
      } else {
        a.pause();
        if (btn) btn.textContent = '▶';
        if (chip) chip.classList.remove('aud-playing');
      }
    }

    function audioSeek(event, markId) {
      const a = _audPlayers[markId]; if (!a || !a.duration) return;
      const rect = event.currentTarget.getBoundingClientRect();
      const pct = (event.clientX - rect.left) / rect.width;
      a.currentTime = pct * a.duration;
    }

    function fmtTime(s) {
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    // ── Gravação ──
    function audioToggleRec(itemId, markId) {
      // Se está gravando ou pausado neste chip
      if (_audItemId === itemId && _audMarkId === markId && _audRec) {
        if (_audPaused) {
          // Retomar
          _audRec.resume();
          _audPaused = false;
          renderCnt();
        } else {
          // Pausar
          _audRec.pause();
          _audPaused = true;
          renderCnt();
        }
        return;
      }
      // Se estava gravando outro chip, para ele primeiro
      if (_audRec) { _audRec.onstop = null; _audRec.stop(); _audPaused = false; }
      audioStartRec(itemId, markId);
    }

    async function audioStartRec(itemId, markId) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        _audChunks = []; _audItemId = itemId; _audMarkId = markId; _audPaused = false;
        const mime = ['audio/webm', 'audio/mp4', 'audio/ogg'].find(t => MediaRecorder.isTypeSupported(t)) || '';
        _audRec = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
        _audRec.ondataavailable = e => { if (e.data.size > 0) _audChunks.push(e.data); };
        _audRec.onstop = () => {
          stream.getTracks().forEach(t => t.stop());
          const blob = new Blob(_audChunks, { type: _audRec.mimeType || 'audio/webm' });
          const reader = new FileReader();
          reader.onload = ev => {
            // Pede nome antes de salvar
            openM('🎙️ Nomear Áudio', `
          <div class="fg">
            <div class="fl">Nome do áudio</div>
            <input type="text" id="audNome" placeholder="Ex: Lembrete, Ideia, Nota..." autofocus>
          </div>
          <div style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:4px">
            Deixe em branco para usar "Áudio"
          </div>
        `, () => {
              const nome = document.getElementById('audNome')?.value.trim() || 'Áudio';
              const list = getL(); if (!list) return;
              const item = find(list.items, itemId); if (!item) return;
              if (!item.audios) item.audios = {};
              if (!item.audios[markId]) item.audios[markId] = {};
              item.audios[markId].src = ev.target.result;
              item.audios[markId].nome = nome;
              _audRec = null; _audItemId = null; _audMarkId = null; _audPaused = false;
              save(); renderCnt();
            });
          };
          reader.readAsDataURL(blob);
        };
        _audRec.start(100); // coleta chunks a cada 100ms para suportar pause/resume
        renderCnt();
      } catch (e) { alert('Microfone inacessível:\n' + e.message); }
    }

    function audioStopRec(itemId, markId) {
      if (_audRec && _audItemId === itemId && _audMarkId === markId) {
        _audPaused = false;
        _audRec.stop();
      }
    }
    function audioImport(itemId, markId) {
      const inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'audio/*';
      inp.onchange = e => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => {
          const list = getL(); if (!list) return;
          const item = find(list.items, itemId); if (!item) return;
          if (!item.audios) item.audios = {};
          if (!item.audios[markId]) item.audios[markId] = {};
          item.audios[markId].src = ev.target.result;
          save(); renderCnt();
        };
        reader.readAsDataURL(file);
      };
      inp.click();
    }

    function audioDel(itemId, markId) {
      const list = getL(); if (!list) return;
      const item = find(list.items, itemId); if (!item) return;
      // Remove marcador do texto e o dado
      item.text = (item.text || '').replace(`⟨🎙${markId}⟩`, '').trim();
      if (item.audios) delete item.audios[markId];
      if (_audPlayers[markId]) { _audPlayers[markId].pause(); delete _audPlayers[markId]; }
      save(); renderCnt();
    }

    // ── IMAGENS NOS ITENS ─────────────────────────────────
    reg('imagens', {
      name: 'Imagens nos itens', icon: '🖼️',
      desc: 'Galeria de imagens por item com visualizador', def: false,
      abtn(item) {
        return `<button class="iabtn" title="Adicionar imagem" onclick="imgAdd('${item.id}')">🖼️</button>`;
      },
      extra(item) {
        if (!item.imgs || !item.imgs.length) return '';
        return _imgGaleria(item);
      }
    });

    // ── CSS ──────────────────────────────────────────────
    (() => {
      const s = document.createElement('style');
      s.textContent = `

    }
  `;
      document.head.appendChild(s);
    })();

    // ── Estado do lightbox ──
    let _lbItemId = null, _lbIdx = 0;

    // ── Galeria miniatura ──
    function _imgGaleria(item) {
      const imgs = item.imgs || [];
      const thumbs = imgs.map((img, i) => `
    <div class="img-thumb-wrap">
      <img class="img-thumb" src="${img.src}" alt="${esc(img.nome || '')}"
        onclick="imgOpenLb('${item.id}',${i})" loading="lazy">
      <button class="img-thumb-del" onclick="imgDel('${item.id}','${img.id}')" title="Remover">✕</button>
    </div>`).join('');

      return `<div class="img-galeria">
    ${thumbs}
    <button class="img-add-btn" onclick="imgAdd('${item.id}')" title="Adicionar imagem">＋</button>
  </div>`;
    }

    // ── Adicionar imagem ──
    function imgAdd(itemId) {
      const l = getL(); if (!l) return;
      const item = find(l.items, itemId); if (!item) return;

      // Abre modal para escolher origem
      openM('🖼️ Adicionar Imagem', `
    <div style="display:flex;flex-direction:column;gap:10px">
      <button class="btn pri" style="margin-top:0" onclick="imgFromCamera('${itemId}');closeM()">
        📷 Câmera / Galeria do celular
      </button>
      <button class="btn" style="margin-top:0" onclick="imgFromFile('${itemId}');closeM()">
        📁 Arquivo do computador
      </button>
      <button class="btn" style="margin-top:0" onclick="imgFromUrl('${itemId}')">
        🔗 URL de imagem
      </button>
    </div>
  `, null);
    }

    function imgFromCamera(itemId) {
      const inp = document.createElement('input');
      inp.type = 'file'; inp.accept = 'image/*'; inp.capture = 'environment'; inp.multiple = true;
      inp.onchange = e => _imgProcessFiles(itemId, e.target.files);
      inp.click();
    }

    function imgFromFile(itemId) {
      const inp = document.createElement('input');
      inp.type = 'file'; inp.accept = 'image/*'; inp.multiple = true;
      inp.onchange = e => _imgProcessFiles(itemId, e.target.files);
      inp.click();
    }

    function imgFromUrl(itemId) {
      openM('🔗 URL da imagem', `
    <div class="fg"><div class="fl">URL</div>
      <input type="url" id="imgUrl" placeholder="https://exemplo.com/foto.jpg">
    </div>
    <div class="fg"><div class="fl">Nome (opcional)</div>
      <input type="text" id="imgNomeUrl" placeholder="Ex: Foto da peça">
    </div>
  `, () => {
        const url = document.getElementById('imgUrl')?.value.trim();
        const nome = document.getElementById('imgNomeUrl')?.value.trim() || 'Imagem';
        if (!url) return;
        const l = getL(); if (!l) return;
        const item = find(l.items, itemId); if (!item) return;
        if (!item.imgs) item.imgs = [];
        item.imgs.push({ id: 'i' + genId(), src: url, nome });
        save(); renderCnt();
      });
    }

    function _imgProcessFiles(itemId, files) {
      if (!files || !files.length) return;
      const l = getL(); if (!l) return;
      const item = find(l.items, itemId); if (!item) return;
      if (!item.imgs) item.imgs = [];

      let pending = files.length;
      Array.from(files).forEach(file => {
        const reader = new FileReader();
        reader.onload = ev => {
          // Redimensiona para não pesar tanto
          const img = new Image();
          img.onload = () => {
            const MAX = 1200;
            let w = img.width, h = img.height;
            if (w > MAX || h > MAX) {
              if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
              else { w = Math.round(w * MAX / h); h = MAX; }
            }
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            const src = canvas.toDataURL('image/jpeg', 0.82);
            item.imgs.push({ id: 'i' + genId(), src, nome: file.name.replace(/\.[^.]+$/, '') });
            pending--;
            if (pending === 0) { save(); renderCnt(); }
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    // ── Deletar imagem ──
    function imgDel(itemId, imgId) {
      const l = getL(); if (!l) return;
      const item = find(l.items, itemId); if (!item) return;
      item.imgs = (item.imgs || []).filter(i => i.id !== imgId);
      save(); renderCnt();
      // Fecha lightbox se estava aberto neste item
      if (_lbItemId === itemId) imgCloseLb();
    }

    // ── Lightbox ──
    function imgOpenLb(itemId, idx) {
      _lbItemId = itemId; _lbIdx = idx;

      // Cria o lightbox se não existe
      if (!document.getElementById('imgLb')) {
        const lb = document.createElement('div');
        lb.id = 'imgLb'; lb.className = 'img-lightbox';
        lb.innerHTML = `
      <div class="img-lb-top">
        <div class="img-lb-counter" id="lbCounter">1 / 1</div>
        <div class="img-lb-actions">
          <button class="img-lb-btn" onclick="imgLbDownload()" title="Baixar">⬇</button>
          <button class="img-lb-btn" onclick="imgLbDelCurrent()" title="Excluir" style="color:#ff6b6b">✕</button>
          <button class="img-lb-btn" onclick="imgCloseLb()" title="Fechar">✕</button>
        </div>
      </div>
      <button class="img-lb-nav img-lb-prev" onclick="imgLbNav(-1)">‹</button>
      <img class="img-lb-img" id="lbImg" src="" alt="">
      <div class="img-lb-nome" id="lbNome"></div>
      <button class="img-lb-nav img-lb-next" onclick="imgLbNav(1)">›</button>
      <div class="img-lb-dots" id="lbDots"></div>`;

        // Swipe no mobile
        let tx = 0;
        lb.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
        lb.addEventListener('touchend', e => {
          const dx = e.changedTouches[0].clientX - tx;
          if (Math.abs(dx) > 50) imgLbNav(dx < 0 ? 1 : -1);
        }, { passive: true });

        // Fecha ao clicar no fundo
        lb.addEventListener('click', e => { if (e.target === lb) imgCloseLb(); });
        // Fecha com ESC, navega com setas
        document.addEventListener('keydown', e => {
          if (!document.getElementById('imgLb')?.classList.contains('open')) return;
          if (e.key === 'Escape') imgCloseLb();
          if (e.key === 'ArrowLeft') imgLbNav(-1);
          if (e.key === 'ArrowRight') imgLbNav(1);
        });

        document.body.appendChild(lb);
      }

      _imgLbUpdate();
      requestAnimationFrame(() => document.getElementById('imgLb').classList.add('open'));
      document.body.style.overflow = 'hidden';
    }

    function imgCloseLb() {
      const lb = document.getElementById('imgLb');
      if (lb) lb.classList.remove('open');
      document.body.style.overflow = '';
      _lbItemId = null;
    }

    function imgLbNav(dir) {
      const l = getL(); if (!l) return;
      const item = find(l.items, _lbItemId); if (!item || !item.imgs?.length) return;
      _lbIdx = (_lbIdx + dir + item.imgs.length) % item.imgs.length;
      _imgLbUpdate();
    }

    function _imgLbUpdate() {
      const l = getL(); if (!l) return;
      const item = find(l.items, _lbItemId); if (!item || !item.imgs?.length) return;
      const imgs = item.imgs;
      const img = imgs[_lbIdx];

      const el = document.getElementById('lbImg');
      const counter = document.getElementById('lbCounter');
      const nome = document.getElementById('lbNome');
      const dots = document.getElementById('lbDots');

      if (el) { el.src = img.src; el.alt = img.nome || ''; }
      if (counter) counter.textContent = `${_lbIdx + 1} / ${imgs.length}`;
      if (nome) nome.textContent = img.nome || '';

      // Dots de navegação
      if (dots) {
        dots.innerHTML = imgs.map((_, i) =>
          `<div class="img-lb-dot ${i === _lbIdx ? 'on' : ''}" onclick="imgLbGoTo(${i})"></div>`
        ).join('');
      }

      // Esconde nav se só 1 imagem
      const navs = document.querySelectorAll('.img-lb-nav');
      navs.forEach(n => n.style.display = imgs.length > 1 ? 'flex' : 'none');
    }

    function imgLbGoTo(idx) { _lbIdx = idx; _imgLbUpdate(); }

    function imgLbDownload() {
      const l = getL(); if (!l) return;
      const item = find(l.items, _lbItemId); if (!item) return;
      const img = item.imgs?.[_lbIdx]; if (!img) return;
      const a = document.createElement('a');
      a.href = img.src; a.download = img.nome || `imagem_${_lbIdx + 1}`;
      a.click();
    }

    function imgLbDelCurrent() {
      const l = getL(); if (!l) return;
      const item = find(l.items, _lbItemId); if (!item || !item.imgs) return;
      const img = item.imgs[_lbIdx]; if (!img) return;
      item.imgs.splice(_lbIdx, 1);
      save();
      if (!item.imgs.length) { imgCloseLb(); renderCnt(); return; }
      _lbIdx = Math.min(_lbIdx, item.imgs.length - 1);
      _imgLbUpdate();
      renderCnt();
    }
    // ************* plugin registrar horas ******************
    reg('ponto', {
      name: 'Controle de Ponto', icon: '🕐', desc: 'Registro de horas, extras e relatório', def: false,

      onInit() {
        const s = document.createElement('style');
        s.textContent = `

    `;
        document.head.appendChild(s);

        if (!S._ponto) S._ponto = {
          config: { valorHora: 15, entradaPad: '08:00', saidaAlmPad: '12:30', retornoPad: '13:30', saidaPad: '17:00' },
          saldoAnterior: 0,
          dias: {}
        };

        if (!S._pontoDiaAtivo) S._pontoDiaAtivo = pontoHoje();
        // NÃO cria o dia automaticamente — só salva quando usuário clicar em Salvar
      },

      tb() { return `<button class="tbbtn" onclick="pontoAbrir()">🕐 Ponto</button>`; },

      onRenderCnt(lv, list) {
        if (!S._pontoAberto) return false;
        const h = document.createElement('div');
        h.innerHTML = `<div style="font-size:13px;font-weight:700;color:var(--text3);margin-bottom:4px">🕐 Controle de Ponto</div>`;
        lv.appendChild(h);
        const v = document.createElement('div');
        v.innerHTML = renderPonto();
        lv.appendChild(v);
        return true;
      }
    });

    // ── Helpers ──
    function pontoHoje() { return new Date().toISOString().slice(0, 10); }
    function hhmm(str) { if (!str || !str.includes(':')) return 0; const [h, m] = str.split(':').map(Number); return h * 60 + (m || 0); }
    function minsToStr(mins) { const a = Math.abs(mins), h = Math.floor(a / 60), m = a % 60; return `${h}h${m.toString().padStart(2, '0')}`; }
    function fmtData(key) {
      const [y, mo, d] = key.split('-');
      const nomes = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
      return `${nomes[new Date(+y, +mo - 1, +d).getDay()]} ${d}/${mo}`;
    }

    // ── Estado temporário dos campos em edição (não salvo) ──
    // Usamos S._pontoRascunho para guardar valores enquanto digita
    function pontoGetRascunho(key) {
      if (!S._pontoRascunho) S._pontoRascunho = {};
      const c = S._ponto.config;
      // Se já existe dia salvo, parte dele; senão parte do padrão
      if (!S._pontoRascunho[key]) {
        const base = S._ponto.dias[key]
          ? { ...S._ponto.dias[key] }
          : { entrada: c.entradaPad, saidaAlm: c.saidaAlmPad, retorno: c.retornoPad, saida: c.saidaPad, extras: [], adiantamentos: [] };
        S._pontoRascunho[key] = base;
      }
      return S._pontoRascunho[key];
    }

    function calcDia(dia) {
      const c = S._ponto.config;
      if (!dia || !dia.entrada || !dia.saida) return { totalMin: 0, jornadaMin: 0, diffMin: 0, totalStr: '--', jornadaStr: '--', diffStr: '--', ok: false };
      const ep = hhmm(c.entradaPad), sap = hhmm(c.saidaAlmPad), rp = hhmm(c.retornoPad), sp = hhmm(c.saidaPad);
      const jornadaMin = (sap - ep) + (sp - rp);
      const entrada = hhmm(dia.entrada);
      const saida = hhmm(dia.saida);
      let totalMin = 0;
      // Dia parcial: saída antes do almoço OU sem horário de almoço preenchido
      const temAlmoco = dia.saidaAlm && dia.retorno;
      const saidaAntesAlmoco = saida <= sap;
      if (!temAlmoco || saidaAntesAlmoco) {
        totalMin = Math.max(0, saida - entrada);
      } else {
        const saidaAlm = hhmm(dia.saidaAlm), retorno = hhmm(dia.retorno);
        totalMin = Math.max(0, saidaAlm - entrada) + Math.max(0, saida - retorno);
      }
      (dia.extras || []).filter(e => e.tipo === 'horas').forEach(e => { totalMin += Math.round(parseFloat(e.valor || 0) * 60); });
      const diffMin = totalMin - jornadaMin;
      return {
        totalMin, jornadaMin, diffMin,
        totalStr: minsToStr(totalMin),
        jornadaStr: minsToStr(jornadaMin),
        diffStr: (diffMin >= 0 ? '+' : '-') + minsToStr(Math.abs(diffMin)),
        ok: diffMin >= 0
      };
    }

    function calcResumo() {
      const p = S._ponto, c = p.config;
      const keys = Object.keys(p.dias).sort();
      let totalMin = 0, totalAdiant = 0, totalServicos = 0;
      for (const key of keys) {
        const d = p.dias[key];
        if (d._rascunho) continue; // ignora dias não confirmados
        const r = calcDia(d);
        totalMin += r.totalMin;
        (d.adiantamentos || []).forEach(e => { totalAdiant += parseFloat(e.valor || 0); });
        (d.extras || []).filter(e => e.tipo === 'servico').forEach(e => { totalServicos += parseFloat(e.valor || 0); });
      }
      const saldoAnteriorReais = parseFloat(p.saldoAnterior || 0);
      const valorHoras = (totalMin / 60) * parseFloat(c.valorHora || 15);
      const totalAPagar = Math.max(0, valorHoras + totalServicos + saldoAnteriorReais - totalAdiant);
      return { totalMin, valorHoras, totalAdiant, totalServicos, saldoAnteriorReais, totalAPagar, keys: Object.keys(p.dias).filter(k => !p.dias[k]._rascunho).sort() };
    }

    function renderPonto() {
      const p = S._ponto, c = p.config;
      const hoje = pontoHoje();
      if (!S._pontoDiaAtivo) S._pontoDiaAtivo = hoje;
      const diaAtivo = S._pontoDiaAtivo;

      // Usa rascunho para exibir os campos (não o dia salvo diretamente)
      const rascunho = pontoGetRascunho(diaAtivo);
      const diaSalvo = !!p.dias[diaAtivo];
      const rAtivo = calcDia(rascunho);
      const res = calcResumo();

      const cardDia = `
    <div class="ponto-card">
      <div class="ponto-title">
