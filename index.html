          <input type="date" class="ponto-date-sel" value="${diaAtivo}"
            onchange="pontoMudarData(this.value)">
        </div>
      </div>
      <div style="text-align:center;font-size:12px;color:var(--text2);font-family:'JetBrains Mono',monospace;font-weight:700">
        ${fmtData(diaAtivo)}${diaAtivo === hoje ? ' 📍 hoje' : ''}
      </div>
      <div class="ponto-mini-grid">
        <div class="ponto-field">
          <div class="ponto-label">Entrada</div>
          <input class="ponto-input ${rascunho.entrada === c.entradaPad ? 'ok' : 'diff'}"
            type="time" value="${rascunho.entrada}"
            onchange="pontoCampo('${diaAtivo}','entrada',this.value)">
        </div>
                <div class="ponto-field">
          <div class="ponto-label">Saída</div>
          <input class="ponto-input ${rascunho.saida === c.saidaPad ? 'ok' : 'diff'}"
            type="time" value="${rascunho.saida}"
            onchange="pontoCampo('${diaAtivo}','saida',this.value)">
        </div>
        <div class="ponto-field">
          <div class="ponto-label">Saída Almoço</div>
          <input class="ponto-input ${rascunho.saidaAlm === c.saidaAlmPad ? 'ok' : 'diff'}"
            type="time" value="${rascunho.saidaAlm}"
            onchange="pontoCampo('${diaAtivo}','saidaAlm',this.value)">
        </div>
        <div class="ponto-field">
          <div class="ponto-label">Retorno Almoço</div>
          <input class="ponto-input ${rascunho.retorno === c.retornoPad ? 'ok' : 'diff'}"
            type="time" value="${rascunho.retorno}"
            onchange="pontoCampo('${diaAtivo}','retorno',this.value)">
        </div>
      </div>
      <div class="ponto-resumo-dia">
        <span>Jornada: <b>${rAtivo.jornadaStr}</b></span>
        <span>Trabalhado: <b style="color:var(--text)">${rAtivo.totalStr}</b></span>
        <span style="color:${rAtivo.ok ? 'var(--green)' : 'var(--red)'}">Saldo: <b>${rAtivo.diffStr}</b></span>
      </div>
      ${renderLancamentos(diaAtivo)}
      <div style="display:flex;gap:8px">
        <button class="ponto-salvar" style="flex:1" onclick="pontoSalvarDia('${diaAtivo}')">
          💾 ${diaSalvo ? 'Atualizar' : 'Salvar'} ${fmtData(diaAtivo)}
        </button>
        ${diaSalvo ? `<button class="btn dng" style="padding:10px;font-size:16px" onclick="pontoDiaDel('${diaAtivo}')">🗑</button>` : ''}
      </div>
      <button class="btn" style="padding:8px;font-size:12px" onclick="pontoAddLancamento('${diaAtivo}')">
        ＋ Extra / Serviço / Adiantamento
      </button>
    </div>`;

      const cardResumo = `
    <div class="ponto-card">
      <div class="ponto-title">
        📊 Resumo do período
        <button class="iabtn" onclick="pontoConfig()" title="Configurar">⚙️</button>
      </div>
      <div>
        ${res.saldoAnteriorReais !== 0 ? `
        <div class="ponto-row">
          <span class="ponto-key">Saldo anterior</span>
          <span class="ponto-val warn">${res.saldoAnteriorReais >= 0 ? '+' : ''}R$ ${res.saldoAnteriorReais.toFixed(2).replace('.', ',')}</span>
        </div>`: ''}
        <div class="ponto-row">
          <span class="ponto-key">Total trabalhado</span>
          <span class="ponto-val">${(res.totalMin / 60).toFixed(2)}h (${minsToStr(res.totalMin)})</span>
        </div>
        <div class="ponto-row">
          <span class="ponto-key">${(res.totalMin / 60).toFixed(2)}h × R$ ${p.config.valorHora}/h</span>
          <span class="ponto-val pos">R$ ${res.valorHoras.toFixed(2).replace('.', ',')}</span>
        </div>
        ${res.totalServicos > 0 ? `
        <div class="ponto-row">
          <span class="ponto-key">Serviços extras</span>
          <span class="ponto-val pos">+R$ ${res.totalServicos.toFixed(2).replace('.', ',')}</span>
        </div>`: ''}
        ${res.totalAdiant > 0 ? `
        <div class="ponto-row">
          <span class="ponto-key">Adiantamentos</span>
          <span class="ponto-val neg">-R$ ${res.totalAdiant.toFixed(2).replace('.', ',')}</span>
        </div>`: ''}
      </div>
      <div class="ponto-total">
        <span class="ponto-total-label">Total a receber</span>
        <span class="ponto-total-val">R$ ${res.totalAPagar.toFixed(2).replace('.', ',')}</span>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn pri" style="padding:10px" onclick="pontoRelatorio()">📋 Relatório WhatsApp</button>
        <button class="btn" style="padding:10px" onclick="pontoFechar()">✕ Fechar</button>
      </div>
    </div>`;

      const diasHtml = Object.keys(p.dias).filter(k => !p.dias[k]._rascunho).sort().reverse().map(key => {
        const d = p.dias[key], r = calcDia(d);
        const adiantTotal = (d.adiantamentos || []).reduce((a, e) => a + parseFloat(e.valor || 0), 0);
        const servicoTotal = (d.extras || []).filter(e => e.tipo === 'servico').reduce((a, e) => a + parseFloat(e.valor || 0), 0);
        return `
      <div class="ponto-dia-row ${key === diaAtivo ? 'aberto' : ''}" onclick="pontoMudarData('${key}')">
        <div class="ponto-dia-data">${fmtData(key)}${key === hoje ? ' 📍' : ''}</div>
        <div class="ponto-dia-res">
          ${d.entrada || '--'} → ${d.saida || '--'}
          ${adiantTotal > 0 ? `<span style="color:var(--orange);margin-left:4px">-R$${adiantTotal.toFixed(0)}</span>` : ''}
          ${servicoTotal > 0 ? `<span style="color:var(--green);margin-left:4px">+R$${servicoTotal.toFixed(0)}</span>` : ''}
        </div>
        <div class="ponto-dia-saldo" style="color:${r.ok ? 'var(--green)' : d.saida ? 'var(--red)' : 'var(--text3)'}">
          ${d.saida ? r.diffStr : '--'}
        </div>
      </div>`;
      }).join('');

      const cardHistorico = `
    <div class="ponto-card">
      <div class="ponto-title">📆 Histórico — toque para editar</div>
      <div class="ponto-dias">
        ${diasHtml || '<div style="font-size:12px;color:var(--text3)">Nenhum dia salvo ainda.</div>'}
      </div>
    </div>`;

      return `<div class="ponto-wrap">${cardDia}${cardResumo}${cardHistorico}</div>`;
    }

    function renderLancamentos(key) {
      // Lança do rascunho se existir, senão do salvo
      const d = (S._pontoRascunho && S._pontoRascunho[key]) || S._ponto.dias[key];
      if (!d) return '';
      const itens = [
        ...(d.extras || []).map((e, i) => `
      <div class="ponto-lancamento">
        <span>${e.tipo === 'servico' ? '🔧' : '⏱'}</span>
        <span style="flex:1;color:var(--text2)">${e.desc || 'Extra'}</span>
        <span style="font-weight:700;color:${e.tipo === 'servico' ? 'var(--green)' : 'var(--blue)'}">
          ${e.tipo === 'servico' ? 'R$ ' + parseFloat(e.valor).toFixed(2).replace('.', ',') : e.valor + 'h'}
        </span>
        <button onclick="pontoRemLanc('${key}','extra',${i})"
          style="border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:13px;padding:0 4px">✕</button>
      </div>`),
        ...(d.adiantamentos || []).map((e, i) => `
      <div class="ponto-lancamento">
        <span>💵</span>
        <span style="flex:1;color:var(--text2)">${e.desc || 'Adiantamento'}</span>
        <span style="font-weight:700;color:var(--orange)">-R$ ${parseFloat(e.valor).toFixed(2).replace('.', ',')}</span>
        <button onclick="pontoRemLanc('${key}','adiant',${i})"
          style="border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:13px;padding:0 4px">✕</button>
      </div>`)
      ];
      if (!itens.length) return '';
      return `<div style="display:flex;flex-direction:column;gap:2px;padding:6px 0;border-top:1px solid var(--border)">${itens.join('')}</div>`;
    }

    // ── Ações ──
    function pontoAbrir() {
      S._pontoAberto = true;
      if (!S._pontoDiaAtivo) S._pontoDiaAtivo = pontoHoje();
      // Inicializa rascunho do dia ativo sem salvar
      pontoGetRascunho(S._pontoDiaAtivo);
      renderCnt();
    }

    function pontoFechar() { S._pontoAberto = false; save(); renderCnt(); }

    function pontoMudarData(data) {
      S._pontoDiaAtivo = data;
      // Inicializa rascunho sem salvar no estado
      pontoGetRascunho(data);
      renderCnt();
    }

    function pontoCampo(key, campo, valor) {
      // Atualiza SOMENTE o rascunho, não salva
      const rascunho = pontoGetRascunho(key);
      rascunho[campo] = valor;
      // Atualiza só o resumo visual sem chamar renderCnt completo
      const resumo = document.querySelector('.ponto-resumo-dia');
      if (resumo) {
        const r = calcDia(rascunho);
        resumo.innerHTML = `
      <span>Jornada: <b>${r.jornadaStr}</b></span>
      <span>Trabalhado: <b style="color:var(--text)">${r.totalStr}</b></span>
      <span style="color:${r.ok ? 'var(--green)' : 'var(--red)'}">Saldo: <b>${r.diffStr}</b></span>`;
      }
    }

    function pontoSalvarDia(key) {
      // Copia rascunho para o estado salvo
      const rascunho = pontoGetRascunho(key);
      S._ponto.dias[key] = { ...rascunho };
      delete S._ponto.dias[key]._rascunho;
      save();
      renderCnt();
      setTimeout(() => {
        const btn = document.querySelector('.ponto-salvar');
        if (btn) {
          btn.innerHTML = '✅ Salvo!';
          btn.style.background = 'var(--green)';
          setTimeout(() => renderCnt(), 1200);
        }
      }, 50);
    }

    function pontoDiaDel(key) {
      openM('🗑 Remover dia', `
    <div style="font-size:14px;color:var(--text2);text-align:center;padding:8px 0">
      Remover o dia <b style="color:var(--text)">${fmtData(key)}</b>?<br>
      <span style="font-size:12px;color:var(--text3)">Esta ação não pode ser desfeita.</span>
    </div>
  `, () => {
        delete S._ponto.dias[key];
        // Limpa também o rascunho deste dia
        if (S._pontoRascunho) delete S._pontoRascunho[key];
        // Volta para hoje sem criar nada
        S._pontoDiaAtivo = pontoHoje();
        pontoGetRascunho(S._pontoDiaAtivo);
        save();
        renderCnt();
      });
    }

    function pontoRemLanc(key, tipo, idx) {
      const rascunho = pontoGetRascunho(key);
      if (tipo === 'extra') rascunho.extras.splice(idx, 1);
      else rascunho.adiantamentos.splice(idx, 1);
      // Se dia já foi salvo, atualiza também o salvo
      if (S._ponto.dias[key]) {
        S._ponto.dias[key] = { ...rascunho };
        save();
      }
      renderCnt();
    }

    function pontoAddLancamento(key) {
      openM('＋ Lançamento', `
    <div class="fg">
      <div class="fl">Tipo</div>
      <select id="plt" onchange="pontoTipoChg(this.value)">
        <option value="horas">⏱ Horas extras avulsas</option>
        <option value="servico">🔧 Serviço extra (R$)</option>
        <option value="adiant">💵 Adiantamento (R$)</option>
      </select>
    </div>
    <div class="fg">
      <div class="fl" id="plt-label">Quantidade de horas</div>
      <input type="number" id="plv" min="0" step="0.25" placeholder="Ex: 1.5">
    </div>
    <div class="fg">
      <div class="fl">Descrição</div>
      <input type="text" id="pld" placeholder="Ex: polimento, reunião, instalação...">
    </div>
  `, () => {
        const t = document.getElementById('plt').value;
        const v = parseFloat(document.getElementById('plv').value || 0);
        const desc = document.getElementById('pld').value.trim();
        if (!v || isNaN(v)) return;
        const rascunho = pontoGetRascunho(key);
        if (t === 'horas') rascunho.extras.push({ tipo: 'horas', valor: v, desc });
        if (t === 'servico') rascunho.extras.push({ tipo: 'servico', valor: v, desc });
        if (t === 'adiant') rascunho.adiantamentos.push({ valor: v, desc });
        // Se dia já salvo, persiste imediatamente
        if (S._ponto.dias[key]) { S._ponto.dias[key] = { ...rascunho }; save(); }
        renderCnt();
      });
    }

    window.pontoTipoChg = tipo => {
      const l = document.getElementById('plt-label'), i = document.getElementById('plv');
      if (!l || !i) return;
      if (tipo === 'horas') { l.textContent = 'Quantidade de horas'; i.step = '0.25'; i.placeholder = 'Ex: 1.5'; }
      if (tipo === 'servico') { l.textContent = 'Valor em R$'; i.step = '0.01'; i.placeholder = 'Ex: 250.00'; }
      if (tipo === 'adiant') { l.textContent = 'Valor em R$'; i.step = '0.01'; i.placeholder = 'Ex: 100.00'; }
    };

    function pontoConfig() {
      const c = S._ponto.config;
      openM('⚙️ Configurações do Ponto', `
    <div class="fg"><div class="fl">Valor da hora (R$)</div>
      <input type="number" id="pcvh" value="${c.valorHora}" min="0" step="0.5"></div>
    <div class="fg"><div class="fl">Entrada padrão</div>
      <input type="time" id="pcep" value="${c.entradaPad}"></div>
    <div class="fg"><div class="fl">Saída almoço padrão</div>
      <input type="time" id="pcsa" value="${c.saidaAlmPad}"></div>
    <div class="fg"><div class="fl">Retorno padrão</div>
      <input type="time" id="pcrp" value="${c.retornoPad}"></div>
    <div class="fg"><div class="fl">Saída padrão</div>
      <input type="time" id="pcsp" value="${c.saidaPad}"></div>
    <div class="fg"><div class="fl">Saldo anterior (R$)</div>
      <input type="number" id="pcsl" value="${S._ponto.saldoAnterior || 0}" step="0.01" placeholder="Ex: 150.00"></div>
  `, () => {
        c.valorHora = parseFloat(document.getElementById('pcvh').value) || 15;
        c.entradaPad = document.getElementById('pcep').value || '08:00';
        c.saidaAlmPad = document.getElementById('pcsa').value || '12:30';
        c.retornoPad = document.getElementById('pcrp').value || '13:30';
        c.saidaPad = document.getElementById('pcsp').value || '17:00';
        S._ponto.saldoAnterior = parseFloat(document.getElementById('pcsl').value) || 0;
        // Limpa rascunhos para recarregar com novos padrões
        S._pontoRascunho = {};
        save(); renderCnt();
      });
    }

    function pontoRelatorio() {
      const p = S._ponto, c = p.config;
      const res = calcResumo();
      let txt = '📋 *RELATÓRIO DE PONTO*\n';
      txt += '━━━━━━━━━━━━━━━━━━━━\n\n';
      for (const key of res.keys) {
        const d = p.dias[key], r = calcDia(d);
        if (!d.entrada && !d.saida) continue;
        txt += `📅 *${fmtData(key)}*\n`;
        txt += `  ⏰ Entrada: ${d.entrada || '--'}\n`;
        if (d.saidaAlm && d.retorno) txt += `  🍽 Almoço: ${d.saidaAlm} → ${d.retorno}\n`;
        txt += `  🏁 Saída: ${d.saida || '--'}\n`;
        if (d.saida) txt += `  ⏱ Total: ${r.totalStr}  Saldo: ${r.diffStr}\n`;
        (d.extras || []).forEach(e => {
          if (e.tipo === 'horas') txt += `  ➕ Extra: ${e.desc ? e.desc + ' ' : ''}${e.valor}h\n`;
          if (e.tipo === 'servico') txt += `  🔧 Serviço: ${e.desc ? e.desc + ' ' : ''}R$ ${parseFloat(e.valor).toFixed(2).replace('.', ',')}\n`;
        });
        (d.adiantamentos || []).forEach(e => {
          txt += `  💵 Adiantamento: ${e.desc ? e.desc + ' ' : ''}R$ ${parseFloat(e.valor).toFixed(2).replace('.', ',')}\n`;
        });
        txt += '\n';
      }
      txt += '━━━━━━━━━━━━━━━━━━━━\n';
      if (res.saldoAnteriorReais !== 0)
        txt += `📦 Saldo anterior: ${res.saldoAnteriorReais >= 0 ? '+' : ''}R$ ${res.saldoAnteriorReais.toFixed(2).replace('.', ',')}\n`;
      txt += `⏱ Total: ${(res.totalMin / 60).toFixed(2)}h × R$ ${c.valorHora}/h = R$ ${res.valorHoras.toFixed(2).replace('.', ',')}\n`;
      if (res.totalServicos > 0) txt += `🔧 Serviços: +R$ ${res.totalServicos.toFixed(2).replace('.', ',')}\n`;
      if (res.totalAdiant > 0) txt += `➖ Adiantamentos: -R$ ${res.totalAdiant.toFixed(2).replace('.', ',')}\n`;
      txt += `\n💵 *TOTAL A RECEBER: R$ ${res.totalAPagar.toFixed(2).replace('.', ',')}*`;

      openM('📋 Relatório', `
    <pre style="background:var(--bg);border:1px solid var(--border);border-radius:8px;
      padding:12px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);
      white-space:pre;overflow-x:auto;max-height:300px;overflow-y:auto;line-height:1.7">${esc(txt)}</pre>
    <button class="btn pri full" id="btn-copiar-ponto" style="margin-top:8px">
      📋 Copiar para WhatsApp
    </button>
  `, null);

      setTimeout(() => {
        const btn = document.getElementById('btn-copiar-ponto');
        if (!btn) return;
        btn.addEventListener('click', () => {
          navigator.clipboard.writeText(txt).then(() => {
            btn.textContent = '✅ Copiado! Cole no WhatsApp';
            btn.style.background = 'var(--green)';
          }).catch(() => {
            const ta = document.createElement('textarea');
            ta.value = txt; ta.style.cssText = 'position:fixed;opacity:0';
            document.body.appendChild(ta); ta.focus(); ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            btn.textContent = '✅ Copiado!';
            btn.style.background = 'var(--green)';
          });
        });
      }, 150);
    }

    // ── MÍDIA (Filmes / Livros / Jogos) ───────────────────
    reg('midia', {
      name: 'Mídia (Filmes/Livros/Jogos)', icon: '🎬',
      desc: 'Tela separada para filmes, livros e jogos', def: false,
      onToggle(on) {
        if (!on) {
          const s = document.getElementById('midiaScreen');
          const m = document.querySelector('.main');
          if (s) { s.classList.remove('active'); s.remove(); }
          if (m) m.style.display = 'flex';
          const b = document.getElementById('midiaBtn');
          if (b) b.remove();
          document.getElementById('fab').style.display = getL() ? 'flex' : 'none';
        } else {
          _midiaInit();
        }
      }
    });

    if (!S._midia) S._midia = [];

    const MTIPOS = { filme: '🎬', livro: '📚', jogo: '🎮' };
    const MSTATUS = {
      quero: { label: 'Quero', color: 'var(--text3)', bg: 'var(--surface2)' },
      andamento: { label: 'Em andamento', color: 'var(--yellow)', bg: 'rgba(232,200,74,.1)' },
      concluido: { label: 'Concluído', color: 'var(--green)', bg: 'rgba(62,207,142,.1)' },
    };

    function _midiaInit() {
      // Cria tela se não existe
      if (!document.getElementById('midiaScreen')) {
        const s = document.createElement('div');
        s.id = 'midiaScreen';
        s.style.cssText = 'display:none;flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 16px calc(80px + var(--sab)) 16px;flex-direction:column;gap:14px;height:100%;box-sizing:border-box';
        document.querySelector('.body').appendChild(s);
      }
      // Cria botão no header se não existe
      if (!document.getElementById('midiaBtn')) {
        const b = document.createElement('button');
        b.id = 'midiaBtn'; b.title = 'Mídia'; b.textContent = '🎬';
        b.className = 'ibtn';
        b.onclick = openMidiaScreen;
        document.querySelector('.hright').prepend(b);
      }
    }

    function openMidiaScreen() {
      const s = document.getElementById('midiaScreen');
      const m = document.querySelector('.main');
      const b = document.getElementById('midiaBtn');
      const fab = document.getElementById('fab');
      if (!s || !m) return;

      const isOpen = s.style.display === 'flex';
      if (isOpen) {
        s.style.display = 'none';
        m.style.display = 'flex';
        b.style.background = ''; b.style.color = '';
        fab.style.display = getL() ? 'flex' : 'none';
      } else {
        m.style.display = 'none';
        s.style.display = 'flex';
        b.style.background = 'var(--accent)'; b.style.color = 'white';
        fab.style.display = 'none';
        _midiaRender();
      }
    }

    function _midiaRender() {
      const s = document.getElementById('midiaScreen');
      if (!s || s.style.display !== 'flex') return;
      if (!S._midia) S._midia = [];

      const ft = S._midiaFT || 'todos';
      const fs = S._midiaFS || 'todos';
      const fb = (S._midiaFB || '').toLowerCase();

      let itens = S._midia;
      if (ft !== 'todos') itens = itens.filter(i => i.tipo === ft);
      if (fs !== 'todos') itens = itens.filter(i => i.status === fs);
      if (fb) itens = itens.filter(i => i.titulo.toLowerCase().includes(fb));

      const tot = S._midia.length;
      const conc = S._midia.filter(i => i.status === 'concluido').length;
      const and = S._midia.filter(i => i.status === 'andamento').length;
      const qro = S._midia.filter(i => i.status === 'quero').length;

      const cards = itens.map(item => {
        const tp = MTIPOS[item.tipo] || '📄';
        const st = MSTATUS[item.status] || MSTATUS.quero;
        const nota = item.nota ? '⭐'.repeat(Math.min(item.nota, 5)) : '';
        const datas = [
          item.dataInicio ? `Início: ${item.dataInicio}` : '',
          item.dataFim ? `Fim: ${item.dataFim}` : '',
        ].filter(Boolean).join(' • ');
        return `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;flex-direction:column;gap:8px">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <span style="font-size:24px;flex-shrink:0">${tp}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:15px;font-weight:700;color:var(--text);word-break:break-word">${esc(item.titulo)}</div>
          ${item.ano ? `<div style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:2px">${item.ano}</div>` : ''}
        </div>
        <span style="font-size:10px;padding:3px 8px;border-radius:20px;background:${st.bg};color:${st.color};border:1px solid ${st.color};white-space:nowrap;flex-shrink:0">${st.label}</span>
      </div>
      ${nota ? `<div style="font-size:14px">${nota}</div>` : ''}
      ${datas ? `<div style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace">${datas}</div>` : ''}
      ${item.observacoes ? `<div style="font-size:12px;color:var(--text2);line-height:1.6;border-left:2px solid var(--border);padding-left:8px;font-style:italic;word-break:break-word">${esc(item.observacoes)}</div>` : ''}
      <div style="display:flex;gap:6px;margin-top:2px">
        <button class="tbbtn" style="flex:1;justify-content:center" onclick="editMidia('${item.id}')">✏️ Editar</button>
        <button class="tbbtn" style="flex:1;justify-content:center;color:var(--red)" onclick="delMidia('${item.id}')">✕ Remover</button>
      </div>
    </div>`;
      }).join('');

      s.innerHTML = `
    <!-- Cabeçalho -->
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div style="font-size:18px;font-weight:800;color:var(--text)">🎬 Mídia</div>
      <div style="display:flex;gap:12px;font-family:'JetBrains Mono',monospace;font-size:11px">
        <span style="color:var(--green)">✅ ${conc}</span>
        <span style="color:var(--yellow)">▶ ${and}</span>
        <span style="color:var(--text3)">🔖 ${qro}</span>
        <span style="color:var(--text3)">Total: ${tot}</span>
      </div>
    </div>

    <!-- Filtro tipo -->
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${['todos', 'filme', 'livro', 'jogo'].map(t => `
        <button class="vtab ${ft === t ? 'on' : ''}" onclick="setMFiltro('ft','${t}')">${t === 'todos' ? 'Todos' : (MTIPOS[t] || '') + ' ' + t.charAt(0).toUpperCase() + t.slice(1)}</button>
      `).join('')}
    </div>

    <!-- Filtro status -->
    <div style="display: flex;
    gap: 6px;
    flex-wrap: nowrap;
    flex-direction: row;">
      ${['todos', 'quero', 'andamento', 'concluido'].map(s => `
        <button class="vtab ${fs === s ? 'on' : ''}" onclick="setMFiltro('fs','${s}')">${s === 'todos' ? 'Todos os status' : (MSTATUS[s]?.label || s)}</button>
      `).join('')}
    </div>

    <!-- Busca + Adicionar + Exportar -->
    <div style="display: grid;
    gap: 8px;">
      <input type="text" placeholder="🔍 Buscar título..."
        value="${esc(S._midiaFB || '')}"
        oninput="S._midiaFB=this.value;_midiaRender()"
        style="flex:1;min-width:140px;font-size:13px;padding:9px 12px">
      <button class="btn pri" style="flex:0;padding:9px 16px" onclick="editMidia(null)">＋ Adicionar</button>
      <button class="tbbtn" onclick="exportMidia()">📤 Exportar</button>
    </div>

    <!-- Cards -->
    ${itens.length
          ? `<div style="display:flex;flex-direction:column;gap:10px">${cards}</div>`
          : `<div style="font-size:13px;color:var(--text3);font-family:'JetBrains Mono',monospace;padding:12px 0">Nenhum item encontrado.</div>`
        }`;
    }

    function setMFiltro(campo, valor) {
      if (campo === 'ft') S._midiaFT = valor;
      if (campo === 'fs') S._midiaFS = valor;
      save(); _midiaRender();
    }

    function editMidia(id) {
      if (!S._midia) S._midia = [];
      const item = id ? S._midia.find(i => i.id === id) : null;
      openM(id ? '✏️ Editar' : '＋ Adicionar Mídia', `
    <div class="fg"><div class="fl">Tipo</div>
      <select id="mdt">
        <option value="filme" ${item?.tipo === 'filme' ? 'selected' : ''}>🎬 Filme</option>
        <option value="livro" ${item?.tipo === 'livro' ? 'selected' : ''}>📚 Livro</option>
        <option value="jogo"  ${item?.tipo === 'jogo' ? 'selected' : ''}>🎮 Jogo</option>
      </select>
    </div>
    <div class="fg"><div class="fl">Título</div>
      <input type="text" id="mdti" placeholder="Nome..." value="${esc(item?.titulo || '')}">
    </div>
    <div class="fg"><div class="fl">Ano</div>
      <input type="text" id="mdano" placeholder="Ex: 2024" value="${esc(item?.ano || '')}">
    </div>
    <div class="fg"><div class="fl">Status</div>
      <select id="mdst">
        <option value="quero"     ${item?.status === 'quero' ? 'selected' : ''}>🔖 Quero</option>
        <option value="andamento" ${item?.status === 'andamento' ? 'selected' : ''}>▶ Em andamento</option>
        <option value="concluido" ${item?.status === 'concluido' ? 'selected' : ''}>✅ Concluído</option>
      </select>
    </div>
    <div style="display:flex;gap:8px">
      <div class="fg" style="flex:1"><div class="fl">Data início</div>
        <input type="date" id="mddi" value="${item?.dataInicio || ''}">
      </div>
      <div class="fg" style="flex:1"><div class="fl">Data fim</div>
        <input type="date" id="mddp" value="${item?.dataFim || ''}">
      </div>
    </div>
    <div class="fg"><div class="fl">Nota (1 a 5 ⭐)</div>
      <input type="number" id="mdno" min="1" max="5" placeholder="1 a 5" value="${item?.nota || ''}">
    </div>
    <div class="fg"><div class="fl">Observações / Impressões</div>
      <textarea class="fta" id="mdobs" placeholder="O que achou? Pontos fortes, fracos, momentos marcantes...">${esc(item?.observacoes || '')}</textarea>
    </div>
  `, () => {
        const novo = {
          id: item?.id || genId(),
          tipo: document.getElementById('mdt').value,
          titulo: document.getElementById('mdti').value.trim(),
          ano: document.getElementById('mdano').value.trim(),
          status: document.getElementById('mdst').value,
          dataInicio: document.getElementById('mddi').value,
          dataFim: document.getElementById('mddp').value,
          nota: parseInt(document.getElementById('mdno').value) || 0,
          observacoes: document.getElementById('mdobs').value.trim(),
        };
        if (!novo.titulo) return;
        if (id) { const idx = S._midia.findIndex(i => i.id === id); if (idx >= 0) S._midia[idx] = novo; }
        else S._midia.push(novo);
        save(); _midiaRender();
      });
    }

    function delMidia(id) {
      S._midia = (S._midia || []).filter(i => i.id !== id);
      save(); _midiaRender();
    }

    function exportMidia() {
      if (!S._midia?.length) { alert('Nenhum item para exportar.'); return; }
      const ft = S._midiaFT || 'todos';
      const fs = S._midiaFS || 'todos';
      let itens = S._midia;
      if (ft !== 'todos') itens = itens.filter(i => i.tipo === ft);
      if (fs !== 'todos') itens = itens.filter(i => i.status === fs);

      const grupos = { filme: [], livro: [], jogo: [] };
      itens.forEach(i => { if (grupos[i.tipo]) grupos[i.tipo].push(i); });

      let md = `# 🎬 Relatório de Mídia\n_Gerado em ${new Date().toLocaleDateString('pt-BR')}_\n\n`;
      md += `**Total:** ${itens.length}`;
      const conc = itens.filter(i => i.status === 'concluido').length;
      if (conc) md += ` • ✅ ${conc} concluídos`;
      md += `\n\n---\n\n`;
      for (const [t, lista] of Object.entries(grupos)) {
        if (!lista.length) continue;
        md += `## ${MTIPOS[t]} ${t.charAt(0).toUpperCase() + t.slice(1)}s\n\n`;
        for (const item of lista) {
          const st = MSTATUS[item.status]?.label || item.status;
          const nota = item.nota ? ' — ' + '⭐'.repeat(item.nota) : '';
          md += `### ${item.titulo}${item.ano ? ` (${item.ano})` : ''}\n`;
          md += `**Status:** ${st}${nota}\n`;
          if (item.dataInicio) md += `**Início:** ${item.dataInicio}\n`;
          if (item.dataFim) md += `**Fim:** ${item.dataFim}\n`;
          if (item.observacoes) md += `\n> ${item.observacoes.replace(/\n/g, '\n> ')}\n`;
          md += `\n`;
        }
      }

      const csvRows = ['Tipo,Título,Ano,Status,Início,Fim,Nota,Observações'];
      itens.forEach(i => csvRows.push([
        i.tipo, `"${(i.titulo || '').replace(/"/g, '""')}"`, i.ano || '',
        MSTATUS[i.status]?.label || i.status,
        i.dataInicio || '', i.dataFim || '', i.nota || '',
        `"${(i.observacoes || '').replace(/"/g, '""').replace(/\n/g, ' ')}"`
      ].join(',')));
      const csv = csvRows.join('\n');

      openM('📤 Exportar Relatório', `
    <div class="view-tabs" style="margin-bottom:4px">
      <button class="vtab on" id="vt_mmd" onclick="swMExp('md')">Markdown</button>
      <button class="vtab"    id="vt_mcsv" onclick="swMExp('csv')">CSV</button>
    </div>
    <pre style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text2);overflow:auto;max-height:200px;white-space:pre-wrap" id="mExpPre">${esc(md)}</pre>
    <div class="macts">
      <button class="btn" onclick="cpMExp()">📋 Copiar</button>
      <button class="btn pri" onclick="dlMExp()">⬇ Download</button>
    </div>
  `, null);

      window._mExp = { md, csv, mode: 'md' };
    }

    window.swMExp = mode => { window._mExp.mode = mode; document.getElementById('mExpPre').textContent = mode === 'md' ? window._mExp.md : window._mExp.csv; document.getElementById('vt_mmd').classList.toggle('on', mode === 'md'); document.getElementById('vt_mcsv').classList.toggle('on', mode === 'csv'); };
    window.cpMExp = () => navigator.clipboard.writeText(window._mExp.mode === 'md' ? window._mExp.md : window._mExp.csv).then(() => alert('Copiado!'));
    window.dlMExp = () => { const d = window._mExp; const b = new Blob([d.mode === 'md' ? d.md : d.csv], { type: 'text/plain' }); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `midia_relatorio.${d.mode === 'md' ? 'md' : 'csv'}`; a.click(); };

    // ── CALCULADORAS PERSONALIZADAS ───────────────────────
    reg('calcbox', {
      name: 'Calculadoras', icon: '📟',
      desc: 'Calculadoras personalizadas sempre à mão', def: false,
      onToggle(on) {
        if (!on) {
          const s = document.getElementById('calcScreen');
          const m = document.querySelector('.main');
          if (s) { s.style.display = 'none'; }
          if (m) m.style.display = 'flex';
          const b = document.getElementById('calcBtn');
          if (b) b.remove();
          document.getElementById('fab').style.display = getL() ? 'flex' : 'none';
        } else {
          _calcInit();
        }
      }
    });

    if (!S._calcs) S._calcs = [];
    if (!S._calcVals) S._calcVals = {};

    const CALC_BUILTIN = [
      //diferença de horas
      {
        id: 'horas-diff', nome: 'Diferença de Horas', icon: '⏰',
        campos: [
          { id: 'h1', label: 'Hora início', tipo: 'time', placeholder: '07:00' },
          { id: 'h2', label: 'Hora fim', tipo: 'time', placeholder: '18:30' },
          { id: 'hpause', label: 'Pausas (minutos)', tipo: 'number', placeholder: '60' },
        ],
        calcular(v) {
          const toMin = t => { const [h, m] = (t || '00:00').split(':').map(Number); return h * 60 + m; };
          const ini = toMin(v.h1), fim = toMin(v.h2);
          const pause = parseInt(v.hpause) || 0;
          let diff = fim - ini; if (diff < 0) diff += 1440;
          const liquido = Math.max(0, diff - pause);
          const fmt = m => `${String(Math.floor(m / 60)).padStart(2, '0')}:${String(m % 60).padStart(2, '0')}`;
          return [
            { label: 'Total bruto', valor: fmt(diff), destaque: false },
            { label: 'Total líquido', valor: fmt(liquido), destaque: true },
            { label: 'Em decimal', valor: (liquido / 60).toFixed(2) + 'h', destaque: false },
          ];
        }
      },

      //🧮 Calculadora Científica ULTRA (Expressões completas)
      {
        id: 'calc-cientifica', nome: 'Calculadora Científica', icon: '🧮',
        campos: [
          { id: 'exp', label: 'Expressão', tipo: 'text', placeholder: 'Ex: (1+2)*3-5/6' }
        ],

        calcular(v) {

          let exp = (v.exp || '')
            .replace(/,/g, '.')
            .replace(/π/g, 'Math.PI')
            .replace(/sqrt/g, 'Math.sqrt')
            .replace(/sin/g, 'Math.sin')
            .replace(/cos/g, 'Math.cos')
            .replace(/tan/g, 'Math.tan')
            .replace(/log/g, 'Math.log10')
            .replace(/ln/g, 'Math.log')
            .replace(/abs/g, 'Math.abs')
            .replace(/floor/g, 'Math.floor')
            .replace(/ceil/g, 'Math.ceil')
            .replace(/round/g, 'Math.round')
            .replace(/\^/g, '**')
            .replace(/(\d+)%/g, '($1/100)');

          let resultado = 0;

          try {
            resultado = Function('"use strict";return (' + exp + ')')();
          } catch (e) {
            return [
              { label: 'Erro', valor: 'Expressão inválida', destaque: true }
            ];
          }

          return [
            { label: 'Resultado', valor: String(resultado).replace('.', ','), destaque: true }
          ];

        }
      },
      //soma horas

    function _calcTodos() { return [...CALC_BUILTIN, ...(S._calcs || [])]; }

    function _calcInit() {
      if (!document.getElementById('calcScreen')) {
        const s = document.createElement('div');
        s.id = 'calcScreen';
        s.style.cssText = 'display:none;flex:1;overflow-y:auto;overflow-x:hidden;padding:16px 16px calc(80px + var(--sab)) 16px;flex-direction:column;gap:14px;box-sizing:border-box';
        document.querySelector('.body').appendChild(s);
      }
      if (!document.getElementById('calcBtn')) {
        const b = document.createElement('button');
        b.id = 'calcBtn'; b.title = 'Calculadoras'; b.textContent = '📟';
        b.className = 'ibtn'; b.onclick = openCalcScreen;
        document.querySelector('.hright').prepend(b);
      }
    }

    function openCalcScreen() {
      const s = document.getElementById('calcScreen');
      const m = document.querySelector('.main');
      const b = document.getElementById('calcBtn');
      const fab = document.getElementById('fab');
      if (!s || !m) return;
      const isOpen = s.style.display === 'flex';
      if (isOpen) {
        s.style.display = 'none'; m.style.display = 'flex';
        b.style.background = ''; b.style.color = '';
        fab.style.display = getL() ? 'flex' : 'none';
      } else {
        m.style.display = 'none'; s.style.display = 'flex';
        b.style.background = 'var(--accent)'; b.style.color = 'white';
        fab.style.display = 'none';
        // Limpa e reconstrói do zero ao abrir
        s.innerHTML = '';
        S._calcBusca = '';
        _calcMontarEstrutura(s);
        _calcAtualizarCards();
      }
    }

    // Monta o cabeçalho e input de busca UMA única vez
    function _calcMontarEstrutura(s) {
      const header = document.createElement('div');
      header.style.cssText = 'display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;flex-shrink:0';
      header.innerHTML = `
    <div style="font-size:18px;font-weight:800;color:var(--text)">🧮 Calculadoras</div>
    <button class="btn pri" style="flex:0;padding:9px 16px" onclick="novaCalc()">＋ Nova</button>`;
      s.appendChild(header);

      const buscaInput = document.createElement('input');
      buscaInput.id = 'calcBuscaInput';
      buscaInput.type = 'text';
      buscaInput.placeholder = '🔍 Buscar calculadora...';
      buscaInput.style.cssText = 'flex-shrink:0;font-size:13px;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);outline:none;width:100%;box-sizing:border-box';
      // Usa addEventListener — nunca perde o foco
      buscaInput.addEventListener('input', e => {
        S._calcBusca = e.target.value;
        _calcAtualizarCards();
      });
      s.appendChild(buscaInput);

      const area = document.createElement('div');
      area.id = 'calcCardsArea';
      area.style.cssText = 'display:flex;flex-direction:column;gap:10px';
      s.appendChild(area);
    }
    function _calcLimpar(calcId) {
      const calc = _calcTodos().find(c => c.id === calcId);
      if (!calc) return;

      // Limpa valores no estado
      if (!S._calcVals) S._calcVals = {};
      if (!S._calcVals[calcId]) S._calcVals[calcId] = {};
      calc.campos.forEach(c => {
        S._calcVals[calcId][c.id] = '';
        const el = document.getElementById(`cf_${calcId}_${c.id}`);
        if (el) el.value = '';
      });

      // Atualiza resultados para mostrar valores limpos
      _calcCalc(calcId);
    }
    // Só atualiza a área dos cards — nunca toca no input de busca
    function _calcAtualizarCards() {
      const area = document.getElementById('calcCardsArea');
      if (!area) return;

      if (!S._calcVals || typeof S._calcVals !== 'object') S._calcVals = {};
      const todos = _calcTodos();
      todos.forEach(c => { if (!S._calcVals[c.id]) S._calcVals[c.id] = {}; });

      const busca = (S._calcBusca || '').toLowerCase().trim();
      const filtrados = busca
        ? todos.filter(c => c.nome.toLowerCase().includes(busca) || c.icon.includes(busca))
        : todos;

      if (!filtrados.length) {
        area.innerHTML = `<div style="font-size:13px;color:var(--text3);font-family:'JetBrains Mono',monospace;padding:8px 0">Nenhuma calculadora encontrada.</div>`;
        return;
      }

      area.innerHTML = filtrados.map(calc => {
        if (!S._calcVals[calc.id]) S._calcVals[calc.id] = {};
        const vals = S._calcVals[calc.id];
        const resultados = _calcResultados(calc, vals);
        const isCustom = !CALC_BUILTIN.find(b => b.id === calc.id);

        const campos = calc.campos.map(c => `
      <div class="fg">
        <div class="fl">${c.label}</div>
        <input type="${c.tipo === 'time' ? 'time' : c.tipo === 'number' ? 'number' : 'text'}"
          id="cf_${calc.id}_${c.id}"
          placeholder="${c.placeholder || ''}"
          value="${esc(vals[c.id] || '')}"
          oninput="_calcInput('${calc.id}','${c.id}',this.value)"
          style="font-size:15px;padding:10px 12px">
      </div>`).join('');

        const resHtml = resultados.map(r => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:8px;
        background:${r.destaque ? 'rgba(124,106,247,.12)' : 'var(--bg)'};
        border:1px solid ${r.destaque ? 'rgba(124,106,247,.3)' : 'var(--border)'}">
        <span style="font-size:12px;color:var(--text3)">${r.label}</span>
        <span style="font-size:${r.destaque ? '20px' : '15px'};font-weight:${r.destaque ? '800' : '600'};
          font-family:'JetBrains Mono',monospace;
          color:${r.destaque ? 'var(--accent)' : 'var(--text)'}">${r.valor}</span>
      </div>`).join('');

        return `
    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--r)">
      <details>
        <summary style="padding:14px 16px;cursor:pointer;list-style:none;display:flex;align-items:center;gap:10px;font-weight:700;font-size:14px;user-select:none">
          <span style="font-size:20px">${calc.icon}</span>
          <span style="flex:1">${esc(calc.nome)}</span>
          ${isCustom ? `
          <button class="iabtn" style="font-size:11px;width:auto;padding:0 8px"
            onclick="event.preventDefault();event.stopPropagation();editCalc('${calc.id}')">✏️</button>
          <button class="iabtn" style="font-size:11px;width:auto;padding:0 8px;color:var(--red)"
            onclick="event.preventDefault();event.stopPropagation();delCalc('${calc.id}')">✕</button>` : ''}
          <span style="font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace">${isCustom ? 'criado' : 'código'}</span>
        </summary>
        <div style="padding:0 16px 16px;display:flex;flex-direction:column;gap:10px">
          <div style="display:flex;flex-direction:column;gap:8px">${campos}</div>
          
          <div id="res_${calc.id}" style="display:flex;flex-direction:column;gap:6px">${resHtml}</div>
          <div style="display:flex;gap:8px;margin-top:6px">
  <button class="btn" onclick="_calcLimpar('${calc.id}')">🧹 Limpar</button>
</div>
        </div>
      </details>
    </div>`;
      }).join('');
    }

    // Alias para compatibilidade com chamadas antigas
    function _calcRender() {
      const s = document.getElementById('calcScreen');
      if (!s || s.style.display !== 'flex') return;
      // Se a estrutura ainda não existe, cria
      if (!document.getElementById('calcCardsArea')) {
        s.innerHTML = '';
        _calcMontarEstrutura(s);
      }
      _calcAtualizarCards();
    }

    function _calcInput(calcId, campoId, valor) {
      if (!S._calcVals) S._calcVals = {};
      if (!S._calcVals[calcId]) S._calcVals[calcId] = {};
      S._calcVals[calcId][campoId] = valor;
      _calcCalc(calcId);
    }

    function _calcCalc(calcId) {
      const calc = _calcTodos().find(c => c.id === calcId);
      if (!calc) return;
      if (!S._calcVals) S._calcVals = {};
      if (!S._calcVals[calcId]) S._calcVals[calcId] = {};

      calc.campos.forEach(c => {
        const el = document.getElementById(`cf_${calcId}_${c.id}`);
        if (el) S._calcVals[calcId][c.id] = el.value;
      });

      const resultados = _calcResultados(calc, S._calcVals[calcId]);
      save();

      const resEl = document.getElementById(`res_${calcId}`);
      if (!resEl) return;
      resEl.innerHTML = resultados.map(r => `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:8px;
      background:${r.destaque ? 'rgba(124,106,247,.12)' : 'var(--bg)'};
      border:1px solid ${r.destaque ? 'rgba(124,106,247,.3)' : 'var(--border)'}">
      <span style="font-size:12px;color:var(--text3)">${r.label}</span>
      <span style="font-size:${r.destaque ? '20px' : '15px'};font-weight:${r.destaque ? '800' : '600'};
        font-family:'JetBrains Mono',monospace;
        color:${r.destaque ? 'var(--accent)' : 'var(--text)'}">${r.valor}</span>
    </div>`).join('');
    }

    function _calcResultados(calc, vals) {
      try { return calc.calcular(vals) || []; }
      catch (e) { return [{ label: 'Erro', valor: String(e.message), destaque: true }]; }
    }

    function novaCalc() { editCalc(null); }

    function editCalc(id) {
      const item = id ? (S._calcs || []).find(c => c.id === id) : null;
      const camposJson = item
        ? JSON.stringify(item.campos, null, 2)
        : '[\n  {"id":"c1","label":"Valor 1","tipo":"number","placeholder":"0"},\n  {"id":"c2","label":"Valor 2","tipo":"number","placeholder":"0"}\n]';
      const calcFn = item ? item._fn : `function calcular(v){
  const a = parseFloat(v.c1)||0;
  const b = parseFloat(v.c2)||0;
  return [
    { label: 'Soma',      valor: (a+b).toFixed(2), destaque: true  },
    { label: 'Diferença', valor: (a-b).toFixed(2), destaque: false },
    { label: 'Produto',   valor: (a*b).toFixed(2), destaque: false },
  ];
}`;

      openM(id ? '✏️ Editar Calculadora' : '＋ Nova Calculadora', `
    <div class="fg"><div class="fl">Nome</div>
      <input type="text" id="cnome" placeholder="Ex: Calculadora de desconto" value="${esc(item?.nome || '')}">
    </div>
    <div class="fg"><div class="fl">Ícone (emoji)</div>
      <input type="text" id="cicon" placeholder="Ex: 💰" value="${esc(item?.icon || '🧮')}" style="font-size:24px;text-align:center">
    </div>
    <div class="fg">
      <div class="fl">Campos (JSON)</div>
      <textarea class="fta" id="ccampos" style="min-height:120px;font-size:12px">${esc(camposJson)}</textarea>
      <div style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;line-height:1.6">tipo: "number" | "text" | "time"</div>
    </div>
    <div class="fg">
      <div class="fl">Função de cálculo (JavaScript)</div>
      <textarea class="fta" id="cfn" style="min-height:180px;font-size:12px;line-height:1.6">${esc(calcFn)}</textarea>
      <div style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;line-height:1.6">
        Recebe <code>v</code> com os valores dos campos.<br>
        Retorna: <code>[{label, valor, destaque}]</code>
      </div>
    </div>
    <button class="btn" onclick="_calcTestar()">🧪 Testar</button>
    <div id="cteste" style="font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text3)"></div>
  `, () => {
        const nome = document.getElementById('cnome').value.trim();
        const icon = document.getElementById('cicon').value.trim() || '🧮';
        const fnTxt = document.getElementById('cfn').value.trim();
        let campos;
        try { campos = JSON.parse(document.getElementById('ccampos').value); }
        catch (e) { alert('JSON dos campos inválido: ' + e.message); return; }
        let fn;
        try { fn = new Function('v', fnTxt.replace(/^function calcular\(v\)\s*\{/, '').replace(/\}$/, '')); }
        catch (e) { alert('Erro na função: ' + e.message); return; }
        if (!nome) return;
        const nova = { id: item?.id || genId(), nome, icon, campos, calcular: fn, _fn: fnTxt };
        if (!S._calcs) S._calcs = [];
        if (id) { const idx = S._calcs.findIndex(c => c.id === id); if (idx >= 0) S._calcs[idx] = nova; else S._calcs.push(nova); }
        else S._calcs.push(nova);
        save(); _calcAtualizarCards();
      });
    }

        const fnTxt = document.getElementById('cfn').value.trim();
        const campos = JSON.parse(document.getElementById('ccampos').value);
        const fn = new Function('v', fnTxt.replace(/^function calcular\(v\)\s*\{/, '').replace(/\}$/, ''));
        const fakeVals = {};
        campos.forEach(c => fakeVals[c.id] = c.placeholder || '0');
        const res = fn(fakeVals);

      } catch (e) {
        document.getElementById('cteste').innerHTML = '❌ Erro: ' + e.message;

    // ── ESTADO ──────────────────────────────────────────
    function _cpEstadoInicial() {
      return {
        aba: 'basico',
        expr: '',
        resultado: '0',
        exprAnterior: '',
        opAtivo: '',
        acabouDeCalc: false,
        memoria: 0,
        hist: [],
        shift: false,
        graus: true,
        convTipo: 'comprimento',
        convUA: null,
        convUB: null,
        convA: 0,
      };
    }
    if (!S._cp || !S._cp.aba) S._cp = _cpEstadoInicial();

    function _calcproInit() {
      if (!document.getElementById('calcproScreen')) {
        const s = document.createElement('div');
        s.id = 'calcproScreen'; s.className = 'cp-screen';
        s.style.display = 'none';
        document.querySelector('.body').appendChild(s);
      }
      if (!document.getElementById('calcproBtn')) {
        const b = document.createElement('button');
        b.id = 'calcproBtn'; b.title = 'Calculadora'; b.textContent = '🧮';
        b.className = 'ibtn'; b.onclick = openCalcPro;
        document.querySelector('.hright').prepend(b);
      }
    }

    function openCalcPro() {
      const s = document.getElementById('calcproScreen');
      const m = document.querySelector('.main');
      const b = document.getElementById('calcproBtn');
      const fab = document.getElementById('fab');
      if (!s || !m) return;
      const isOpen = s.style.display === 'flex';
      if (isOpen) {
        s.style.display = 'none'; m.style.display = 'flex';
        b.style.background = ''; b.style.color = '';
        fab.style.display = getL() ? 'flex' : 'none';
      } else {
        m.style.display = 'none'; s.style.display = 'flex';
        b.style.background = 'var(--accent)'; b.style.color = 'white';
        fab.style.display = 'none';
        _cpRender();
      }
    }

    // ── LÓGICA DA CALCULADORA ───────────────────────────
    function _cpNum(n) {
      const g = S._cp;
      if (g.acabouDeCalc) { g.expr = ''; g.acabouDeCalc = false; }
      if (n === '.' && g.expr.split(/[\+\-\×\÷\(]/).pop().includes('.')) return;
      g.expr += n;
      g.opAtivo = '';
      _cpAtualizarDisplay();
    }

    function _cpOp(op) {
      const g = S._cp;
      if (g.expr === '' && g.resultado !== '0' && g.resultado !== '') g.expr = g.resultado;
      // Remove operador no final se houver
      g.expr = g.expr.replace(/[\+\-\×\÷]$/, '');
      g.expr += op;
      g.opAtivo = op;
      g.acabouDeCalc = false;
      _cpAtualizarDisplay();
    }

    function _cpIgual() {
      const g = S._cp;
      if (!g.expr) return;
      const exprOrig = g.expr;
      try {
        const res = _cpEval(g.expr);
        const resStr = _cpFmt(res);
        g.hist.unshift({ expr: exprOrig, res: resStr, ts: Date.now() });
        if (g.hist.length > 50) g.hist.pop();
        g.exprAnterior = exprOrig + '=';
        g.resultado = resStr;
        g.expr = '';
        g.opAtivo = '';
        g.acabouDeCalc = true;
        save();
      } catch (e) {
        g.resultado = 'Erro';
        g.expr = '';
      }
      _cpAtualizarDisplay();
    }

    function _cpEval(expr) {
      const g = S._cp;
      let e = expr
        .replace(/×/g, '*').replace(/÷/g, '/')
        .replace(/π/g, 'Math.PI').replace(/e/g, 'Math.E')
        .replace(/\^/g, '**')
        .replace(/(\d+(?:\.\d+)?)%/g, '($1/100)');

      // Funções trig em graus
      if (g.graus) {
        e = e.replace(/sin\(/g, 'Math.sin(Math.PI/180*')
          .replace(/cos\(/g, 'Math.cos(Math.PI/180*')
          .replace(/tan\(/g, 'Math.tan(Math.PI/180*')
          .replace(/asin\(/g, '(180/Math.PI)*Math.asin(')
          .replace(/acos\(/g, '(180/Math.PI)*Math.acos(')
          .replace(/atan\(/g, '(180/Math.PI)*Math.atan(');
      } else {
        e = e.replace(/sin\(/g, 'Math.sin(')
          .replace(/cos\(/g, 'Math.cos(')
          .replace(/tan\(/g, 'Math.tan(')
          .replace(/asin\(/g, 'Math.asin(')
          .replace(/acos\(/g, 'Math.acos(')
          .replace(/atan\(/g, 'Math.atan(');
      }
      e = e.replace(/log\(/g, 'Math.log10(')
        .replace(/ln\(/g, 'Math.log(')
        .replace(/sqrt\(/g, 'Math.sqrt(')
        .replace(/cbrt\(/g, 'Math.cbrt(')
        .replace(/abs\(/g, 'Math.abs(')
        .replace(/floor\(/g, 'Math.floor(')
        .replace(/ceil\(/g, 'Math.ceil(')
        .replace(/round\(/g, 'Math.round(')
        .replace(/fact\((\d+)\)/g, '_cpFat($1)');

      return Function('"use strict";return (' + e + ')')();
    }

    function _cpFat(n) { if (n <= 1) return 1; return n * _cpFat(n - 1); }

    function _cpFmt(n) {
      if (!isFinite(n)) return n > 0 ? '∞' : '-∞';
      if (isNaN(n)) return 'Erro';
      if (Number.isInteger(n) && Math.abs(n) < 1e15) return String(n);
      if (Math.abs(n) >= 1e10 || Math.abs(n) < 1e-6 && n !== 0) return n.toExponential(6).replace(/\.?0+e/, 'e');
      return parseFloat(n.toPrecision(10)).toString();
    }

    function _cpDel() {
      const g = S._cp;
      if (g.acabouDeCalc) { g.expr = ''; g.resultado = '0'; g.acabouDeCalc = false; }
      else g.expr = g.expr.slice(0, -1);
      _cpAtualizarDisplay();
    }

    function _cpAC() {
      const g = S._cp;
      g.expr = ''; g.resultado = '0'; g.exprAnterior = '';
      g.opAtivo = ''; g.acabouDeCalc = false;
      _cpAtualizarDisplay();
    }

    function _cpSinal() {
      const g = S._cp;
      if (g.expr) {
        if (g.expr.startsWith('-')) g.expr = g.expr.slice(1);
        else g.expr = '-' + g.expr;
      } else if (g.resultado !== '0') {
        if (g.resultado.startsWith('-')) g.resultado = g.resultado.slice(1);
        else g.resultado = '-' + g.resultado;
      }
      _cpAtualizarDisplay();
    }

    function _cpPorcento() {
      const g = S._cp;
      if (!g.expr && g.resultado !== '0') g.expr = g.resultado;
      if (g.expr) g.expr += '%';
      _cpAtualizarDisplay();
    }

    function _cpFunc(f) {
      const g = S._cp;
      if (g.acabouDeCalc && g.resultado !== '0') { g.expr = g.resultado; g.acabouDeCalc = false; }
      // Funções de sufixo
      if (f === 'x²') { g.expr = '(' + (g.expr || g.resultado) + ')**2'; _cpIgual(); return; }
      if (f === 'x³') { g.expr = '(' + (g.expr || g.resultado) + ')**3'; _cpIgual(); return; }
      if (f === '1/x') { g.expr = '1/(' + (g.expr || g.resultado) + ')'; _cpIgual(); return; }
      if (f === 'x!') { g.expr = 'fact(' + (g.expr || g.resultado) + ')'; _cpIgual(); return; }
      if (f === '10ˣ') { g.expr = '10**(' + (g.expr || g.resultado) + ')'; _cpIgual(); return; }
      if (f === 'eˣ') { g.expr = 'Math.E**(' + (g.expr || g.resultado) + ')'; _cpIgual(); return; }
      if (f === '2ˣ') { g.expr = '2**(' + (g.expr || g.resultado) + ')'; _cpIgual(); return; }
      // Funções de prefixo (abrem parêntese)
      g.expr += f + '(';
      _cpAtualizarDisplay();
    }

    function _cpMem(op) {
      const g = S._cp;
      const val = parseFloat(g.resultado) || 0;
      if (op === 'MC') { g.memoria = 0; }
      else if (op === 'M+') { g.memoria += val; }
      else if (op === 'M-') { g.memoria -= val; }
      else if (op === 'MR') { g.expr = String(g.memoria); g.acabouDeCalc = false; }
      save(); _cpAtualizarDisplay();
    }

    function _cpParentese() {
      const g = S._cp;
      const abertos = (g.expr.match(/\(/g) || []).length;
      const fechados = (g.expr.match(/\)/g) || []).length;
      if (abertos > fechados && g.expr.slice(-1) !== '(') g.expr += ')';
      else g.expr += '(';
      _cpAtualizarDisplay();
    }

    function _cpToggleShift() {
      S._cp.shift = !S._cp.shift;
      _cpRender();
    }

    function _cpToggleGraus() {
      S._cp.graus = !S._cp.graus;
      save(); _cpRender();
    }

    function _cpAtualizarDisplay() {
      const g = S._cp;
      // Preview ao vivo
      if (g.expr) {
        try {
          const r = _cpEval(g.expr);
          if (isFinite(r)) g.resultado = _cpFmt(r);
        } catch (e) { }
      }

      const exprEl = document.getElementById('cpExpr');
      const resEl = document.getElementById('cpRes');
      const histEl = document.getElementById('cpHist');
      if (exprEl) {

      } else if (g.aba === 'hist') {

    function _cpBtnRow(btns) {
      return btns.map(b => `

    }

    function _cpSetAba(aba) {
      S._cp.aba = aba; save(); _cpRender();
    }

    function _cpUsarHist(i) {
      const h = S._cp.hist[i];
      if (!h) return;
      S._cp.resultado = h.res;
      S._cp.expr = '';
      S._cp.exprAnterior = h.expr + '=';
      S._cp.acabouDeCalc = true;
      S._cp.aba = 'basico';
      save(); _cpRender();
    }

    // ── CONVERSOR ────────────────────────────────────────
    const _CP_CONV = {
      comprimento: {
        nome: 'Comprimento',
        unidades: { m: 1, km: 1e-3, cm: 100, mm: 1000, mi: 0.000621371, yd: 1.09361, ft: 3.28084, in: 39.3701, nm: 1e-9 },
        nomes: { m: 'metro', km: 'quilômetro', cm: 'centímetro', mm: 'milímetro', mi: 'milha', yd: 'jarda', ft: 'pé', in: 'polegada', nm: 'nanômetro' },
      },
      massa: {
        nome: 'Massa',
        unidades: { kg: 1, g: 1000, mg: 1e6, lb: 2.20462, oz: 35.274, t: 0.001, st: 0.157473 },
        nomes: { kg: 'quilograma', g: 'grama', mg: 'miligrama', lb: 'libra', oz: 'onça', t: 'tonelada', st: 'stone' },
      },
      temperatura: {
        nome: 'Temperatura',
        especial: true,
        unidades: ['°C', '°F', 'K'],
        converter(val, de, para) {
          let c = val;
          if (de === '°F') c = (val - 32) * 5 / 9;
          else if (de === 'K') c = val - 273.15;
          if (para === '°C') return c;
          if (para === '°F') return c * 9 / 5 + 32;
          return c + 273.15;
        }
      },
      area: {
        nome: 'Área',
        unidades: { 'm²': 1, 'km²': 1e-6, 'cm²': 1e4, 'mm²': 1e6, ha: 1e-4, ac: 0.000247105, 'ft²': 10.7639, 'in²': 1550 },
        nomes: { 'm²': 'metro²', 'km²': 'km²', 'cm²': 'cm²', 'mm²': 'mm²', ha: 'hectare', ac: 'acre', 'ft²': 'pé²', 'in²': 'pol²' },
      },
      volume: {
        nome: 'Volume',
        unidades: { L: 1, mL: 1000, 'm³': 0.001, 'cm³': 1000, 'ft³': 0.0353147, gal: 0.264172, fl_oz: 33.814, tsp: 202.884, tbsp: 67.628 },
        nomes: { L: 'litro', mL: 'mililitro', 'm³': 'metro³', 'cm³': 'cm³', 'ft³': 'pé³', gal: 'galão', fl_oz: 'fl oz', tsp: 'colher chá', tbsp: 'colher sopa' },
      },
      tempo: {
        nome: 'Tempo',
        unidades: { s: 1, ms: 1000, min: 1 / 60, h: 1 / 3600, d: 1 / 86400, sem: 1 / 604800, mes: 1 / 2628000, ano: 1 / 31536000 },
        nomes: { s: 'segundo', ms: 'milissegundo', min: 'minuto', h: 'hora', d: 'dia', sem: 'semana', mes: 'mês', ano: 'ano' },
      },
      velocidade: {
        nome: 'Velocidade',
        unidades: { 'm/s': 1, 'km/h': 3.6, 'mph': 2.23694, 'nó': 1.94384, 'ft/s': 3.28084 },
        nomes: { 'm/s': 'metro/s', 'km/h': 'km/h', 'mph': 'milha/h', 'nó': 'nó', 'ft/s': 'pé/s' },
      },
      digital: {
        nome: 'Digital',
        unidades: { B: 1, KB: 1 / 1024, MB: 1 / 1048576, GB: 1 / 1073741824, TB: 1 / 1099511627776, bit: 8 },
        nomes: { B: 'byte', KB: 'kilobyte', MB: 'megabyte', GB: 'gigabyte', TB: 'terabyte', bit: 'bit' },
      },
    };
    function _cpAtualizarConv() {
      const g = S._cp;
      const tipo = g.convTipo || 'comprimento';
      const conv = _CP_CONV[tipo];
      const unids = conv.especial ? conv.unidades : Object.keys(conv.unidades);
      const uA = g.convUA || unids[0];
      const uB = g.convUB || unids[1];
      const valA = parseFloat(g.convA) || 0;

      let valB = 0;
      try {
        if (conv.especial) valB = conv.converter(valA, uA, uB);
        else valB = (valA / conv.unidades[uA]) * conv.unidades[uB];
      } catch (e) { }

      const fmtB = parseFloat(valB.toPrecision(8)).toString();

      // Atualiza só o resultado sem reconstruir o HTML
      const resEl = document.getElementById('cpConvB');
      if (resEl) resEl.value = fmtB;

      // Atualiza tabela rápida
      const tabEl = document.getElementById('cpConvTabela');
      if (tabEl) {
        tabEl.innerHTML = [1, 5, 10, 25, 50, 100].map(n => {
          let r = 0;
          try {
            if (conv.especial) r = conv.converter(n, uA, uB);
            else r = (n / conv.unidades[uA]) * conv.unidades[uB];
          } catch (e) { }
          return `<div style="display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:13px">
        <span style="color:#8e8e93">${n} ${uA}</span>
        <span style="color:#ffffff">${parseFloat(r.toPrecision(6))} ${uB}</span>
      </div>`;
        }).join('');
      }
    }

    function _cpConvHtml() {
      const g = S._cp;
      const tipo = g.convTipo || 'comprimento';
      const conv = _CP_CONV[tipo];
      const unids = conv.especial ? conv.unidades : Object.keys(conv.unidades);
      const uA = g.convUA || unids[0];
      const uB = g.convUB || unids[1];
      const valA = g.convA || 0;

      // Converte
      let valB = 0;
      try {
        if (conv.especial) valB = conv.converter(parseFloat(valA) || 0, uA, uB);
        else {
          const base = (parseFloat(valA) || 0) / conv.unidades[uA];
          valB = base * conv.unidades[uB];
        }
      } catch (e) { valB = 0; }

      const fmtB = parseFloat(valB.toPrecision(8)).toString();

      const tiposHtml = Object.entries(_CP_CONV).map(([k, v]) =>
        `<option value="${k}"${k === tipo ? ' selected' : ''}>${v.nome}</option>`
      ).join('');

      const unidOpts = (us) => us.map(u =>
        `<option value="${u}">${u}${_CP_CONV[tipo].nomes?.[u] ? ' — ' + _CP_CONV[tipo].nomes[u] : ''}</option>`
      ).join('');

      return `<div class="cp-conv-wrap">
    <select class="cp-conv-select" onchange="S._cp.convTipo=this.value;S._cp.convUA=null;S._cp.convUB=null;save();_cpRender()">
      ${tiposHtml}
    </select>

    <div class="cp-conv-row">
      <input type="number" class="cp-conv-inp" id="cpConvA" value="${valA}"
  oninput="S._cp.convA=this.value;save();_cpAtualizarConv()" placeholder="0">
      <select class="cp-conv-select" style="width:auto;flex:0;min-width:120px"
        onchange="S._cp.convUA=this.value;save();_cpRender()">
        ${unidOpts(unids).replace(`value="${uA}"`, `value="${uA}" selected`)}
      </select>
    </div>

    <div class="cp-conv-arrow">⬇</div>

    <div class="cp-conv-row">
      <input type="number" class="cp-conv-inp" id="cpConvB" value="${fmtB}" readonly
        style="color:#ff9f0a">
      <select class="cp-conv-select" style="width:auto;flex:0;min-width:120px"
        onchange="S._cp.convUB=this.value;save();_cpRender()">
        ${unidOpts(unids).replace(`value="${uB}"`, `value="${uB}" selected`)}
      </select>
    </div>

    <div style="font-size:12px;color:#636366;font-family:'JetBrains Mono',monospace;text-align:center;margin-top:4px">
      1 ${uA} = ${conv.especial ? conv.converter(1, uA, uB).toPrecision(6) : parseFloat((conv.unidades[uB] / conv.unidades[uA]).toPrecision(6))} ${uB}
    </div>

    <!-- Tabela de conversão rápida -->
    <div style="background:#2c2c2e;border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:6px;margin-top:4px">
      <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#636366;margin-bottom:4px">
        Tabela rápida
        </div>
        <div id="cpConvTabela">${[1, 5, 10, 25, 50, 100].map(n => {
        let r = 0;
        try {
          if (conv.especial) r = conv.converter(n, uA, uB);
          else r = (n / conv.unidades[uA]) * conv.unidades[uB];
        } catch (e) { }
        return `<div style="display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:13px">
          <span style="color:#8e8e93">${n} ${uA}</span>
          <span style="color:#ffffff">${parseFloat(r.toPrecision(6))} ${uB}</span>
            </div>`;
      }).join('')}
        </div>
      </div>
    </div>`;
    }
    // ── FRASES INSPIRADORAS ───────────────────────────────
    reg('frases', {
      name: 'Frases Inspiradoras', icon: '💬',

          document.getElementById('fab').style.display = getL() ? 'flex' : 'none';

          _frasesInit();

      }
    });

    if (!S._frases) S._frases = [];       // lista de frases
    if (!S._frasesVis) S._frasesVis = [];    // ids já vistos no ciclo atual
    if (!S._frasesAtual) S._frasesAtual = null; // frase atual exibida

    // Frases padrão para começar
    const FRASES_DEFAULT = [
      { id: 'f1', texto: 'A vida é aquilo que acontece enquanto você está ocupado fazendo outros planos.', autor: 'John Lennon' },
      { id: 'f2', texto: 'Seja a mudança que você quer ver no mundo.', autor: 'Mahatma Gandhi' },
