    .damas-coord{font-size:10px;font-family:'JetBrains Mono',monospace;color:rgba(255,255,255,.3);width:min(460px,92vw);display:flex;justify-content:space-around;padding:0 2px}
  `;
      document.head.appendChild(s);
    })();

    // ── ESTADO ──────────────────────────────────────────
    function _damasEstadoInicial(modo) {
      // tab: 0=vazio, 1=vermelho, 2=preto, 3=dama vermelha, 4=dama preta
      const tab = Array(8).fill(null).map(() => Array(8).fill(0));
      // Peças pretas (rows 0-2)
      for (let r = 0; r < 3; r++)
        for (let c = 0; c < 8; c++)
          if ((r + c) % 2 !== 0) tab[r][c] = 2;
      // Peças vermelhas (rows 5-7)
      for (let r = 5; r < 8; r++)
        for (let c = 0; c < 8; c++)
          if ((r + c) % 2 !== 0) tab[r][c] = 1;
      return {
        tab, turno: 1, // 1=vermelho, 2=preto
        modo: modo || 'pvp',
        sel: null, movimentos: [],
        capturas: [], // capturas obrigatórias
        capSeq: null, // peça em sequência de captura
        ultMov: [], fim: null,
        placar: { verm: 0, pret: 0 },
        hist: [],
        snapshot: null, // para desfazer
      };
    }

    let _DG = null;

    function _damasInit() {
      if (!document.getElementById('damasScreen')) {
        const s = document.createElement('div');
        s.id = 'damasScreen'; s.className = 'damas-screen';
        s.style.display = 'none';
        document.querySelector('.body').appendChild(s);
      }
      if (!document.getElementById('damasBtn')) {
        const b = document.createElement('button');
        b.id = 'damasBtn'; b.title = 'Damas'; b.textContent = '🔴';
        b.className = 'ibtn'; b.onclick = openDamasScreen;
        document.querySelector('.hright').prepend(b);
      }
    }

    function openDamasScreen() {
      const s = document.getElementById('damasScreen');
      const m = document.querySelector('.main');
      const b = document.getElementById('damasBtn');
      const fab = document.getElementById('fab');
      if (!s || !m) return;
      const isOpen = s.style.display === 'flex';
      if (isOpen) {
        s.style.display = 'none'; m.style.display = 'flex';
        b.style.background = ''; b.style.color = '';
        fab.style.display = getL() ? 'flex' : 'none';
      } else {
        m.style.display = 'none'; s.style.display = 'flex';
        b.style.background = 'var(--accent)'; b.style.color = 'white';
        fab.style.display = 'none';
        if (!_DG) _DG = _damasEstadoInicial('pvp');
        _damasRender();
      }
    }

    // ── LÓGICA ──────────────────────────────────────────
    function _dTipo(p) { return p === 1 || p === 3 ? 'verm' : 'pret'; }
    function _dEDama(p) { return p >= 3; }
    function _dDoTurno(p, t) { return t === 1 ? (p === 1 || p === 3) : (p === 2 || p === 4); }

    function _dMovimentos(r, c, tab, turno, apenasCaptura = false) {
      const p = tab[r][c]; if (!p || !_dDoTurno(p, turno)) return [];
      const dama = _dEDama(p);
      const dirs = dama ? [[-1, -1], [-1, 1], [1, -1], [1, 1]] :
        turno === 1 ? [[-1, -1], [-1, 1]] : [[1, -1], [1, 1]];
      const movs = [], caps = [];

      for (const [dr, dc] of dirs) {
        if (dama) {
          // Dama: move várias casas
          let nr = r + dr, nc = c + dc;
          let capturou = false, capR = -1, capC = -1;
          while (nr >= 0 && nr < 8 && nc >= 0 && nc < 8) {
            const alvo = tab[nr][nc];
            if (alvo === 0) {
              if (capturou) caps.push({ de: [r, c], para: [nr, nc], cap: [capR, capC] });
              else movs.push({ de: [r, c], para: [nr, nc] });
            } else if (!_dDoTurno(alvo, turno) && alvo !== 0 && !capturou) {
              capturou = true; capR = nr; capC = nc;
            } else break;
            nr += dr; nc += dc;
          }
        } else {
          // Peão: move 1 casa
          const nr = r + dr, nc = c + dc;
          if (nr < 0 || nr > 7 || nc < 0 || nc > 7) continue;
          const alvo = tab[nr][nc];
          if (alvo === 0 && !apenasCaptura) movs.push({ de: [r, c], para: [nr, nc] });
          if (alvo !== 0 && !_dDoTurno(alvo, turno)) {
            const sr = r + 2 * dr, sc = c + 2 * dc;
            if (sr >= 0 && sr < 8 && sc >= 0 && sc < 8 && tab[sr][sc] === 0)
              caps.push({ de: [r, c], para: [sr, sc], cap: [nr, nc] });
          }
        }
      }
      return caps.length > 0 || apenasCaptura ? caps : movs;
    }

    function _dTodasCapturas(tab, turno) {
      const caps = [];
      for (let r = 0; r < 8; r++)
        for (let c = 0; c < 8; c++)
          if (tab[r][c] && _dDoTurno(tab[r][c], turno))
            caps.push(..._dMovimentos(r, c, tab, turno, true));
      return caps;
    }

    function _dTodosMovimentos(tab, turno) {
      const caps = _dTodasCapturas(tab, turno);
      if (caps.length) return caps;
      const movs = [];
      for (let r = 0; r < 8; r++)
        for (let c = 0; c < 8; c++)
          if (tab[r][c] && _dDoTurno(tab[r][c], turno))
            movs.push(..._dMovimentos(r, c, tab, turno));
      return movs;
    }

    function damasClicar(r, c) {
      const g = _DG; if (!g || g.fim) return;
      if (g.modo === 'pvc' && g.turno === 2) return;
      const tab = g.tab;
      const p = tab[r][c];

      // Se tem sequência de captura, só pode mover a peça em sequência
      if (g.capSeq) {
        const [sr, sc] = g.capSeq;
        if (r === sr && c === sc) { _damasRender(); return; } // clicou na mesma peça
        if (g.sel && g.movimentos.some(m => m.para[0] === r && m.para[1] === c)) {
          _dExecutarMov(g.sel[0], g.sel[1], r, c); return;
        }
        return;
      }

      // Capturas obrigatórias
      const capsObrig = _dTodasCapturas(tab, g.turno);

      if (g.sel) {
        // Verifica se é destino válido
        if (g.movimentos.some(m => m.para[0] === r && m.para[1] === c)) {
          _dExecutarMov(g.sel[0], g.sel[1], r, c); return;
        }
        // Clicou em outra peça do mesmo time
        if (p && _dDoTurno(p, g.turno)) {
          // Se há capturas obrigatórias, só pode selecionar peças que capturam
          const podeSelect = capsObrig.length === 0 || capsObrig.some(m => m.de[0] === r && m.de[1] === c);
          if (podeSelect) {
            g.sel = [r, c];
            const movsPeca = _dMovimentos(r, c, tab, g.turno, capsObrig.length > 0);
            g.movimentos = movsPeca;
            _damasRender(); return;
          }
        }
        g.sel = null; g.movimentos = []; _damasRender(); return;
      }

      // Seleciona peça
      if (p && _dDoTurno(p, g.turno)) {
        const podeSelect = capsObrig.length === 0 || capsObrig.some(m => m.de[0] === r && m.de[1] === c);
        if (podeSelect) {
          g.sel = [r, c];
          const movsPeca = _dMovimentos(r, c, tab, g.turno, capsObrig.length > 0);
          g.movimentos = movsPeca;
          _damasRender();
        }
      }
    }

    function _dExecutarMov(r1, c1, r2, c2) {
      const g = _DG;
      g.snapshot = JSON.parse(JSON.stringify(g.tab)); // salva para desfazer

      const tab = g.tab;
      const p = tab[r1][c1];
      const mov = g.movimentos.find(m => m.para[0] === r2 && m.para[1] === c2);

      // Move
      tab[r2][c2] = p;
      tab[r1][c1] = 0;
      g.ultMov = [[r1, c1], [r2, c2]];

      let capturou = false;
      if (mov && mov.cap) {
        tab[mov.cap[0]][mov.cap[1]] = 0;
        capturou = true;
      }

      // Promoção a dama
      if (p === 1 && r2 === 0) tab[r2][c2] = 3;
      if (p === 2 && r2 === 7) tab[r2][c2] = 4;

      // Sequência de captura?
      if (capturou) {
        const novaCaps = _dMovimentos(r2, c2, tab, g.turno, true);
        if (novaCaps.length > 0 && tab[r2][c2] < 3) { // peão em sequência (dama já tratada diferente)
          g.capSeq = [r2, c2];
          g.sel = [r2, c2];
          g.movimentos = novaCaps;
          g.hist.push(`${g.turno === 1 ? 'V' : 'P'}: (${r1},${c1})→(${r2},${c2}) captura!`);
          _damasRender();
          return;
        }
      }

      g.capSeq = null; g.sel = null; g.movimentos = [];
      g.hist.push(`${g.turno === 1 ? 'V' : 'P'}: (${r1},${c1})→(${r2},${c2})${capturou ? ' ×' : ''}`);

      // Verifica fim
      _dVerificarFim();

      if (!g.fim) {
        g.turno = g.turno === 1 ? 2 : 1;
        // Verifica se próximo tem movimentos
        if (_dTodosMovimentos(tab, g.turno).length === 0) {
          g.fim = g.turno === 1 ? 'pret' : 'verm';
          if (g.fim === 'verm') g.placar.verm++;
          else g.placar.pret++;
        }
        _damasRender();
        if (g.modo === 'pvc' && g.turno === 2 && !g.fim)
          setTimeout(() => _damasIA(), 500);
      }
    }

    function _dVerificarFim() {
      const g = _DG; const tab = g.tab;
      let verm = 0, pret = 0;
      for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
        if (tab[r][c] === 1 || tab[r][c] === 3) verm++;
        if (tab[r][c] === 2 || tab[r][c] === 4) pret++;
      }
      if (verm === 0) { g.fim = 'pret'; g.placar.pret++; }
      if (pret === 0) { g.fim = 'verm'; g.placar.verm++; }
    }

    // ── IA ──────────────────────────────────────────────
    function _dAvaliarTab(tab) {
      let score = 0;
      for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
        const p = tab[r][c];
        if (p === 1) score -= 10 - (r * 0.5);   // vermelho perde ponto (IA é preto)
        if (p === 2) score += 10 - ((7 - r) * 0.5); // preto ganha ponto
        if (p === 3) score -= 18;
        if (p === 4) score += 18;
      }
      return score;
    }

    function _dMinimax(tab, prof, alpha, beta, maxim, turno) {
      const movs = _dTodosMovimentos(tab, turno);
      if (prof === 0 || movs.length === 0) return _dAvaliarTab(tab);

      if (maxim) {
        let best = -99999;
        for (const m of movs) {
          const t2 = tab.map(r => [...r]);
          t2[m.para[0]][m.para[1]] = t2[m.de[0]][m.de[1]];
          t2[m.de[0]][m.de[1]] = 0;
          if (m.cap) t2[m.cap[0]][m.cap[1]] = 0;
          if (t2[m.para[0]][m.para[1]] === 2 && m.para[0] === 7) t2[m.para[0]][m.para[1]] = 4;
          const v = _dMinimax(t2, prof - 1, alpha, beta, false, 1);
          best = Math.max(best, v); alpha = Math.max(alpha, v);
          if (beta <= alpha) break;
        }
        return best;
      } else {
        let best = 99999;
        for (const m of movs) {
          const t2 = tab.map(r => [...r]);
          t2[m.para[0]][m.para[1]] = t2[m.de[0]][m.de[1]];
          t2[m.de[0]][m.de[1]] = 0;
          if (m.cap) t2[m.cap[0]][m.cap[1]] = 0;
          if (t2[m.para[0]][m.para[1]] === 1 && m.para[0] === 0) t2[m.para[0]][m.para[1]] = 3;
          const v = _dMinimax(t2, prof - 1, alpha, beta, true, 2);
          best = Math.min(best, v); beta = Math.min(beta, v);
          if (beta <= alpha) break;
        }
        return best;
      }
    }

    function _damasIA() {
      const g = _DG; if (!g || g.fim || g.turno !== 2) return;
      const movs = _dTodosMovimentos(g.tab, 2);
      if (!movs.length) return;

      movs.sort(() => Math.random() - .5);
      let best = -99999, bestMov = movs[0];
      for (const m of movs) {
        const t2 = g.tab.map(r => [...r]);
        t2[m.para[0]][m.para[1]] = t2[m.de[0]][m.de[1]];
        t2[m.de[0]][m.de[1]] = 0;
        if (m.cap) t2[m.cap[0]][m.cap[1]] = 0;
        const v = _dMinimax(t2, 3, -99999, 99999, false, 1);
        if (v > best) { best = v; bestMov = m; }
      }

      g.sel = [bestMov.de[0], bestMov.de[1]];
      g.movimentos = [bestMov];
      _dExecutarMov(bestMov.de[0], bestMov.de[1], bestMov.para[0], bestMov.para[1]);

    function damasNovoJogo(modo) {

      if (g.hist.length) g.hist.pop();
      _damasRender();
    }

    // ── RENDER ──────────────────────────────────────────
    function _damasRender() {
      const s = document.getElementById('damasScreen');
      if (!s || s.style.display !== 'flex') return;
      const g = _DG;
      const tab = g.tab;

      let casas = '';
      for (let r = 0; r < 8; r++) {

          const p = tab[r][c];

          const isDest = g.movimentos.some(m => m.para[0] === r && m.para[1] === c);

          let cls = claro ? 'claro' : 'escuro';
          if (isSel) cls += ' sel';
          else if (isDest) cls += ' dest';
          else if (isUlt && !isSel) cls += ' ultmov';

          let pecaHtml = '';
          if (p) {
            const cor = p === 1 || p === 3 ? 'verm' : 'pret';
            const dama = p >= 3 ? ' dama' : '';
            pecaHtml = `<div class="dp ${cor}${dama}"></div>`;
          }

          casas += `<div class="dc ${cls}" onclick="damasClicar(${r},${c})">${pecaHtml}</div>`;
        }
      }

      // Conta peças
      let nVerm = 0, nPret = 0;
      for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
        if (tab[r][c] === 1 || tab[r][c] === 3) nVerm++;
        if (tab[r][c] === 2 || tab[r][c] === 4) nPret++;
      }

      const letras = ['a', 'b', 'c', 'd', 'e', 'f', 'g', 'h'];

      let statusTxt = '';
      if (g.fim) statusTxt = '';
      else if (g.capSeq) statusTxt = '⚡ Captura obrigatória!';
      else if (g.modo === 'pvc' && g.turno === 2) statusTxt = '🤖 IA pensando...';
      else statusTxt = `Vez das ${g.turno === 1 ? '🔴 vermelhas' : '⚫ pretas'}`;

      let resultHtml = '';
      if (g.fim) {
        const vencedor = g.fim === 'verm' ? '🔴 Vermelhas vencem!' : '⚫ Pretas vencem!';
        resultHtml = `<div class="damas-result ${g.fim}">${vencedor}</div>`;
      }

      s.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <div style="font-size:18px;font-weight:800;color:white">🔴 Damas</div>
      <div style="display:flex;gap:6px">
        <button class="vtab ${g.modo === 'pvp' ? 'on' : ''}" onclick="damasNovoJogo('pvp')">👥 PvP</button>
        <button class="vtab ${g.modo === 'pvc' ? 'on' : ''}" onclick="damasNovoJogo('pvc')">🤖 vs IA</button>
      </div>
    </div>

    <div class="damas-info">
      <div class="damas-turno">
        <span style="font-size:20px">${g.turno === 1 ? '🔴' : '⚫'}</span>
        ${g.fim ? `Fim de jogo` : statusTxt}
      </div>
      <div class="damas-score">
        <div class="ds-item">
          <div class="ds-val" style="color:#ff6b6b">${nVerm} 🔴</div>
          <div class="ds-label">Verm.</div>
        </div>
        <div class="ds-item">
          <div class="ds-val" style="color:#aaa">${nPret} ⚫</div>
          <div class="ds-label">Pret.</div>
        </div>
        <div class="ds-item">
          <div class="ds-val" style="color:#e8c84a">${g.placar.verm}-${g.placar.pret}</div>
          <div class="ds-label">Placar</div>
        </div>
      </div>
    </div>

    ${resultHtml}

    <div class="damas-board-wrap">
      <div class="damas-coord">
        ${letras.map(l => `<span>${l}</span>`).join('')}
      </div>
      <div class="damas-board">${casas}</div>
    </div>

    <div class="damas-ctrl">
      <button class="db-btn novo" onclick="damasNovoJogo()">🔄 Novo jogo</button>
      <button class="db-btn desfazer" onclick="damasDesfazer()" ${g.snapshot ? '' : 'disabled'}>↩ Desfazer</button>
    </div>

    ${g.hist.length ? `
    <div class="damas-hist">
      ${g.hist.slice(-8).join(' | ')}
    </div>`: ''}
  `;
    }
    // ── DESENHO (Paint) ────────────────────────────────────
    reg('desenho', {
      name: 'Desenho', icon: '🎨',

    function _dshIniciarCanvas() {

    // ── EVENTOS DE DESENHO ───────────────────────────────

      const { x, y } = _dshPos(e);
      const g = _DSH;
      const ctx = g.ctx; if (!ctx) return;

      // Ferramenta texto

      g.desenhando = true;

    // ── FLOOD FILL ───────────────────────────────────────
    function _dshFloodFill(x, y, corHex) {
      const ctx = _DSH.ctx; const canvas = _DSH.canvas;
      const W = canvas.width, H = canvas.height;
      const img = ctx.getImageData(0, 0, W, H);
      const data = img.data;

      const idx = (r, c) => (r * W + c) * 4;
      const alvo = idx(y, x);
      const tR = data[alvo], tG = data[alvo + 1], tB = data[alvo + 2];

      // Cor de destino
      const nova = parseInt(corHex.slice(1), 16);
      const nR = (nova >> 16) & 255, nG = (nova >> 8) & 255, nB = nova & 255;
      if (tR === nR && tG === nG && tB === nB) return;

      const igual = (r, c) => {
        const i = idx(r, c);
        return data[i] === tR && data[i + 1] === tG && data[i + 2] === tB;
      };

      const fila = [[x, y]]; const vis = new Set();
      while (fila.length) {
        const [cx, cy] = fila.pop();
        if (cx < 0 || cx >= W || cy < 0 || cy >= H) continue;
        const k = cy * W + cx;
        if (vis.has(k)) continue;
        if (!igual(cy, cx)) continue;
        vis.add(k);
        const i = idx(cy, cx);
        data[i] = nR; data[i + 1] = nG; data[i + 2] = nB; data[i + 3] = 255;
        fila.push([cx + 1, cy], [cx - 1, cy], [cx, cy + 1], [cx, cy - 1]);
      }
      ctx.putImageData(img, 0, 0);
    }

    // ── UNDO / REDO ──────────────────────────────────────

    function _dshUndo() {

    function _dshSalvar() {
      const g = _DSH; if (!g.canvas) return;

      _dshRenderSaves();
    }

    function _dshCarregar(idx) {
      const g = _DSH; if (!g.canvas) return;
      if (!S._dsh?.saves[idx]) return;
      S._dsh.saveAtual = idx;
      save();
      const img = new Image();
      img.onload = () => {
        g.ctx.fillStyle = '#ffffff';
        g.ctx.fillRect(0, 0, g.canvas.width, g.canvas.height);
        g.ctx.drawImage(img, 0, 0, g.canvas.width, g.canvas.height);
        g.undo = []; g.redo = [];
        _dshRenderSaves();
      };
      img.src = S._dsh.saves[idx];
    }

    function _dshDeletarSave(idx) {
      if (!S._dsh?.saves) return;
      S._dsh.saves.splice(idx, 1);
      if (S._dsh.saveAtual >= S._dsh.saves.length)

    // ── GRAVAÇÃO ─────────────────────────────────────────
    async function gravIniciar() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        // Setup AudioContext para visualização
        window._gravAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        window._gravAnalyser = window._gravAudioCtx.createAnalyser();
        window._gravAnalyser.fftSize = 64;
        const src = window._gravAudioCtx.createMediaStreamSource(stream);
        src.connect(window._gravAnalyser);

        window._gravChunks = [];
        window._gravRec = new MediaRecorder(stream);
        window._gravRec.ondataavailable = e => { if (e.data.size > 0) window._gravChunks.push(e.data); };
        window._gravRec.onstop = _gravProcessar;
        window._gravRec.start(100);

        window._gravEstado = 'gravando';
        _gravIniciarTimer();
        _gravIniciarOndas();
        _gravRenderPainel();

      } catch (e) {
        alert('Não foi possível acessar o microfone. Verifique as permissões.');
      }
    }

    function gravPausar() {
      if (window._gravRec?.state === 'recording') {
        window._gravRec.pause();
        window._gravEstado = 'pausado';
        clearInterval(window._gravTimer);
        cancelAnimationFrame(window._gravAnimRAF);
        _gravRenderPainel();
      }
    }

    function gravRetomar() {
      if (window._gravRec?.state === 'paused') {
        window._gravRec.resume();
        window._gravEstado = 'gravando';
        _gravIniciarTimer();
        _gravIniciarOndas();
        _gravRenderPainel();
      }
    }

    function gravParar() {
      if (window._gravRec && window._gravRec.state !== 'inactive') {
        window._gravRec.stop();
        window._gravRec.stream.getTracks().forEach(t => t.stop());
        clearInterval(window._gravTimer);
        cancelAnimationFrame(window._gravAnimRAF);
        window._gravEstado = 'idle';
      }
    }

    function _gravProcessar() {
      const blob = new Blob(window._gravChunks, { type: 'audio/webm' });
      const secs = window._gravSecs;
      const nomeEl = document.getElementById('gravNomeInp');
      const nome = nomeEl?.value.trim() || _gravNomeAuto();
      const id = genId();
      const audio = {
        id, nome, dur: secs,
        tags: [...window._gravTagsSel],
        data: new Date().toISOString(),
        tamanho: Math.round(blob.size / 1024),
      };
      if (!S._grav) S._grav = { audios: [], filtroTag: null, busca: '' };
      S._grav.audios.unshift(audio);
      _GravDB.salvar(id, blob).then(() => {
        save();
        window._gravSecs = 0;
        window._gravTagsSel = [];
        window._gravChunks = [];
        _gravRender();
      }).catch(e => {
        console.error('Erro ao salvar áudio:', e);
        alert('Erro ao salvar o áudio. Tente novamente.');
      });
    }

    function _gravNomeAuto() {
      const d = new Date();
      return `Áudio ${d.toLocaleDateString('pt-BR')} ${d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}`;
    }

    function _gravIniciarTimer() {
      window._gravTimer = setInterval(() => {
        window._gravSecs++;
        const el = document.getElementById('gravTimer');
        if (el) el.textContent = _gravFmtTempo(window._gravSecs);
      }, 1000);
    }

    function _gravIniciarOndas() {
      const animar = () => {
        if (window._gravEstado !== 'gravando') return;
        const analyser = window._gravAnalyser;
        if (!analyser) { window._gravAnimRAF = requestAnimationFrame(animar); return; }
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        const bars = document.querySelectorAll('.grav-bar');
        bars.forEach((bar, i) => {
          const val = data[i] || 0;
          const h = Math.max(3, Math.round((val / 255) * 54));
          bar.style.height = h + 'px';
          bar.classList.remove('idle');
        });
        window._gravAnimRAF = requestAnimationFrame(animar);
      };
      animar();
    }

function _gravFmtTempo(secs){
  if(!secs||!isFinite(secs)||isNaN(secs)) return '--:--';
  secs=Math.floor(secs);
  const h=Math.floor(secs/3600);
  const m=Math.floor((secs%3600)/60);
  const s=secs%60;
  if(h>0) return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

    // ── PLAYER ───────────────────────────────────────────
    function gravTocar(id) {
      if (window._gravAudAtual) {
        window._gravAudAtual.pause();
        window._gravAudAtual.currentTime = 0;
        const oldBtn = document.getElementById('gravPlay_' + window._gravIdAtual);
        const oldCard = document.getElementById('gravCard_' + window._gravIdAtual);
        if (oldBtn) { oldBtn.textContent = '▶'; oldBtn.classList.remove('playing'); }
        if (oldCard) oldCard.classList.remove('playing');
        if (window._gravIdAtual === id) { window._gravAudAtual = null; window._gravIdAtual = null; return; }
      }
      const meta = S._grav?.audios.find(a => a.id === id);
      if (!meta) return;
      const btn = document.getElementById('gravPlay_' + id);
      const card = document.getElementById('gravCard_' + id);
      if (btn) btn.textContent = '⌛';
      _GravDB.carregar(id).then(blob => {
        if (!blob) { alert('Áudio não encontrado.'); if (btn) btn.textContent = '▶'; return; }
        const url = URL.createObjectURL(blob);
        const el = new Audio(url);
        window._gravAudAtual = el;
        window._gravIdAtual = id;
        const prog = document.getElementById('gravProg_' + id);
        const tempo = document.getElementById('gravTempo_' + id);
        if (btn) { btn.textContent = '⏸'; btn.classList.add('playing'); }
        if (card) card.classList.add('playing');
        el.ontimeupdate = () => {
          if (!el.duration) return;
          const pct = (el.currentTime / el.duration) * 100;
          if (prog) prog.style.width = pct + '%';
          if (tempo) tempo.textContent = _gravFmtTempo(Math.floor(el.currentTime)) + ' / ' + _gravFmtTempo(Math.floor(el.duration));
        };
        el.onended = () => {
          if (btn) { btn.textContent = '▶'; btn.classList.remove('playing'); }
          if (card) card.classList.remove('playing');
          if (prog) prog.style.width = '0%';
          URL.revokeObjectURL(url);
          window._gravAudAtual = null; window._gravIdAtual = null;
        };
        el.onerror = () => { alert('Erro ao reproduzir.'); if (btn) btn.textContent = '▶'; URL.revokeObjectURL(url); };
        el.play();
      }).catch(e => { console.error(e); if (btn) btn.textContent = '▶'; });
    }

    function gravSeek(id, e) {
      const audio = S._grav?.audios.find(a => a.id === id);
      if (!audio || window._gravIdAtual !== id) return;
      const wrap = e.currentTarget;
      const rect = wrap.getBoundingClientRect();
      const pct = (e.clientX - rect.left) / rect.width;
      if (window._gravAudAtual) window._gravAudAtual.currentTime = window._gravAudAtual.duration * pct;
    }

    // ── AÇÕES ────────────────────────────────────────────
    function gravRenomear(id) {
      const audio = S._grav?.audios.find(a => a.id === id);
      if (!audio) return;
      openM('✏️ Renomear áudio', `
    <div class="fg">
      <div class="fl">Nome</div>
      <input type="text" id="gravRenNome" value="${esc(audio.nome)}" placeholder="Nome do áudio">
    </div>
  `, () => {
        const nome = document.getElementById('gravRenNome')?.value.trim();
        if (nome) { audio.nome = nome; save(); _gravRender(); }
      });
    }

    function gravEditarTags(id) {
      const audio = S._grav?.audios.find(a => a.id === id);
      if (!audio) return;

      // Usa window para ficar acessível nos onclicks inline
      window._gravTagsEdit = [...audio.tags];

      openM('🏷️ Tags', `
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${_GRAV_TAGS.map(t => {
        const tid = 'gtag_' + t.replace(/[^a-z0-9]/gi, '_');
        const on = window._gravTagsEdit.includes(t);
        return `<div id="${tid}"
          class="grav-tag-chip${on ? ' on' : ''}"
          onclick="_gravToggleTagEdit('${tid}','${t}')"
        >${t}</div>`;
      }).join('')}
    </div>
    <div style="font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-top:8px">
      Toque nas tags para selecionar ou remover
    </div>
  `, () => {
        audio.tags = [...window._gravTagsEdit];
        save(); _gravRender();
      });
    }

    function _gravToggleTagEdit(tid, tag) {
      const idx = window._gravTagsEdit.indexOf(tag);
      if (idx > -1) window._gravTagsEdit.splice(idx, 1);
      else window._gravTagsEdit.push(tag);
      const el = document.getElementById(tid);
      if (el) el.classList.toggle('on', window._gravTagsEdit.includes(tag));
    }

    function gravExportar(id) {
      const meta = S._grav?.audios.find(a => a.id === id);
      if (!meta) return;
      _GravDB.carregar(id).then(blob => {
        if (!blob) { alert('Áudio não encontrado.'); return; }
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = (meta.nome || 'audio') + '.webm';
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      });
    }

    function gravDeletar(id) {
      confirmarDel('audio_grav', id);
    }

    // Override confirmarDel para suportar audio_grav
    const _confirmarDelOrig = confirmarDel;
    confirmarDel = function (tipo, id) {
      if (tipo === 'audio_grav') {
        const audio = S._grav?.audios.find(a => a.id === id);
        const nome = audio?.nome || 'este áudio';
        openM('🗑️ Excluir áudio', `
      <div style="text-align:center;padding:8px 0;display:flex;flex-direction:column;gap:12px;align-items:center">
        <div style="font-size:40px">🎙️</div>
        <div style="font-size:15px;color:var(--text)">Excluir "${esc(nome)}"?</div>
        <div style="font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace">Esta ação não pode ser desfeita.</div>
      </div>
    `, () => {
          if (window._gravIdAtual === id) { window._gravAudAtual?.pause(); window._gravAudAtual = null; window._gravIdAtual = null; }
          _GravDB.deletar(id).catch(e => console.error('Erro ao deletar blob:', e));
          S._grav.audios = S._grav.audios.filter(a => a.id !== id);
          save(); _gravRender();
        });
        return;
      }
      _confirmarDelOrig(tipo, id);
    };

    function gravImportar() {
      const inp = document.createElement('input');
      inp.type = 'file'; inp.accept = 'audio/*'; inp.multiple = true;
      inp.onchange = e => {
        const files = Array.from(e.target.files);
        let done = 0;
        files.forEach(f => {
          const id = genId();
          const audio = {
            id, nome: f.name.replace(/\.[^.]+$/, ''),
            dur: 0, tags: [], data: new Date().toISOString(),
            tamanho: Math.round(f.size / 1024),
          };
          const url = URL.createObjectURL(f);
          const el = new Audio(url);
          el.onloadedmetadata = () => { audio.dur = Math.round(el.duration); URL.revokeObjectURL(url); };
          _GravDB.salvar(id, f).then(() => {
            if (!S._grav) S._grav = { audios: [], filtroTag: null, busca: '' };
            S._grav.audios.unshift(audio);
            done++;
            if (done === files.length) { save(); _gravRender(); }
          }).catch(err => { console.error('Erro ao importar:', err); done++; if (done === files.length) { save(); _gravRender(); } });
        });
      };
      inp.click();
    }

    function gravToggleTag(tag) {
      const g = S._cp; // usa S._grav
      if (!S._grav) return;
      S._grav.filtroTag = S._grav.filtroTag === tag ? null : tag;
      save(); _gravRenderLista();
    }

    function gravBuscar(q) {
      if (!S._grav) return;
      S._grav.busca = q;
      _gravRenderLista();
    }

    // ── RENDER ───────────────────────────────────────────
    function _gravRenderPainel() {
      const el = document.getElementById('gravPainel');
      if (!el) return;
      const estado = window._gravEstado;
      const secs = window._gravSecs;

      const barras = Array(24).fill(0).map((_, i) =>
        `<div class="grav-bar idle" id="gravBar${i}" style="height:3px"></div>`
      ).join('');

      let btnPrincipal = '';
      if (estado === 'idle') {
        btnPrincipal = `<button class="grav-btn-rec iniciar" onclick="gravIniciar()" title="Iniciar gravação">🎙️</button>`;
      } else if (estado === 'gravando') {
        btnPrincipal = `<button class="grav-btn-rec pausar" onclick="gravPausar()" title="Pausar">⏸</button>`;
      } else {
        btnPrincipal = `<button class="grav-btn-rec retomar" onclick="gravRetomar()" title="Continuar">▶</button>`;
      }

      el.innerHTML = `
    <!-- Visualizador -->
    <div class="grav-wave">${barras}</div>

    <!-- Timer -->
    <div class="grav-timer ${estado === 'gravando' ? 'rec' : estado === 'pausado' ? 'pause' : ''}" id="gravTimer">
      ${_gravFmtTempo(secs)}
    </div>

    <!-- Controles -->
    <div class="grav-btns">
      <button class="grav-btn-sm" onclick="gravImportar()" title="Importar áudio">📁</button>
      ${btnPrincipal}
      <button class="grav-btn-sm ${estado === 'idle' ? '' : 'danger'}"
        onclick="${estado === 'idle' ? 'gravImportar()' : 'gravParar()'}"
        title="${estado === 'idle' ? 'Importar' : 'Parar e salvar'}"
        ${estado === 'idle' ? 'disabled' : ''}>
        ${estado === 'idle' ? '📁' : '⏹'}
      </button>
    </div>

    <!-- Nome e tags (só quando gravando ou pausado) -->
    ${estado !== 'idle' ? `
    <div class="grav-nome-wrap">
      <input class="grav-nome-inp" id="gravNomeInp"
        placeholder="Nome da gravação (opcional)"
        value="${_gravNomeAuto()}">
    </div>
    <div class="grav-tags-wrap">
      ${_GRAV_TAGS.map(t => `
        <div class="grav-tag-chip${window._gravTagsSel.includes(t) ? ' on' : ''}"
          onclick="
            const idx=_gravTagsSel.indexOf('${t}');
            if(idx>-1) _gravTagsSel.splice(idx,1);
            else _gravTagsSel.push('${t}');
            document.querySelectorAll('.grav-tag-chip').forEach(el=>{
              el.classList.toggle('on',_gravTagsSel.includes(el.textContent.trim()));
            });
          ">${t}</div>
      `).join('')}
    </div>
    `: ''}
  `;

      if (estado === 'gravando') _gravIniciarOndas();
    }

    function _gravRenderLista() {
      const el = document.getElementById('gravLista');
      if (!el) return;
      if (!S._grav) return;

      const busca = (S._grav.busca || '').toLowerCase().trim();
      const filtroTag = S._grav.filtroTag || null;

      let audios = [...S._grav.audios];

      if (busca) audios = audios.filter(a =>
        a.nome.toLowerCase().includes(busca) ||
        a.tags.some(t => t.toLowerCase().includes(busca))
      );
      if (filtroTag) audios = audios.filter(a => a.tags.includes(filtroTag));

      // Atualiza visual dos filtros sem reconstruir tudo
      document.querySelectorAll('.grav-filtro').forEach(el => {
        const tag = el.dataset.tag;
        if (tag === undefined) el.classList.toggle('on', !filtroTag); // botão Todos
        else el.classList.toggle('on', filtroTag === tag);
      });

      if (!audios.length) {
        el.innerHTML = `<div class="grav-empty">
      <div class="grav-empty-ico">🎙️</div>
      <div style="font-size:16px;font-weight:700;color:var(--text2)">${busca || filtroTag ? 'Nenhum resultado' : 'Nenhum áudio gravado'}</div>
      <div style="font-size:13px;text-align:center;line-height:1.6">
        ${busca || filtroTag ? 'Tente outros termos' : 'Toque em 🎙️ para gravar'}
      </div>
    </div>`;
        return;
      }

      const grupos = {};
      audios.forEach(a => {
        const d = new Date(a.data);
        const hoje = new Date(); const ontem = new Date(hoje); ontem.setDate(hoje.getDate() - 1);
        let label;
        if (d.toDateString() === hoje.toDateString()) label = 'Hoje';
        else if (d.toDateString() === ontem.toDateString()) label = 'Ontem';
        else label = d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
        if (!grupos[label]) grupos[label] = [];
        grupos[label].push(a);
      });

      el.innerHTML = Object.entries(grupos).map(([label, items]) => `
    <div style="font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
      color:var(--text3);padding:4px 2px;font-family:'JetBrains Mono',monospace">${label}</div>
    ${items.map(a => `
      <div class="grav-card" id="gravCard_${a.id}">
        <div class="grav-card-header">
          <div class="grav-card-info">
            <div class="grav-card-nome">${esc(a.nome)}</div>
            <div class="grav-card-meta">
              <span>⏱ ${a.dur ? _gravFmtTempo(a.dur) : '--:--'}</span>
              <span>📦 ${a.tamanho > 1024 ? (a.tamanho / 1024).toFixed(1) + 'MB' : a.tamanho + 'KB'}</span>
              <span>🕐 ${new Date(a.data).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })}</span>
            </div>
            ${a.tags.length ? `<div class="grav-card-tags">${a.tags.map(t => `<span class="grav-card-tag">${t}</span>`).join('')}</div>` : ''}
          </div>
        </div>
        <div class="grav-player">
          <button class="grav-play-btn" id="gravPlay_${a.id}" onclick="gravTocar('${a.id}')">▶</button>
          <div class="grav-progress-wrap" onclick="gravSeek('${a.id}',event)">
            <div class="grav-progress-fill" id="gravProg_${a.id}" style="width:0%"></div>
          </div>
          <span class="grav-time" id="gravTempo_${a.id}">
            ${a.dur&&a.dur>0?_gravFmtTempo(a.dur):'--:--'}
          </span>
        </div>
        <div class="grav-card-acoes">
          <button class="grav-acao" onclick="gravRenomear('${a.id}')">✏️ Renomear</button>
          <button class="grav-acao" onclick="gravEditarTags('${a.id}')">🏷️ Tags</button>
          <button class="grav-acao success" onclick="gravExportar('${a.id}')">⬇ Exportar</button>
          <button class="grav-acao danger" onclick="gravDeletar('${a.id}')">🗑</button>
        </div>
      </div>
    `).join('')}
  `).join('');
    }

    function _gravRender() {
      const s = document.getElementById('gravadorScreen');
      if (!s || s.style.display !== 'flex') return;
      const g = S._grav || { audios: [], filtroTag: null, busca: '' };

      // Tags únicas usadas
      const tagsUsadas = [...new Set(g.audios.flatMap(a => a.tags))];

      s.innerHTML = `
    <!-- Header com busca -->
    <div class="grav-header">
      <div class="grav-title">🎙️</div>
      <div class="grav-search-wrap">
        <input class="grav-search" id="gravBusca"
          placeholder="Buscar por nome ou tag..."
          value="${esc(g.busca || '')}"
          oninput="gravBuscar(this.value);document.getElementById('gravBuscaClear').classList.toggle('vis',this.value.length>0)">
        <button class="grav-search-clear${g.busca ? ' vis' : ''}" id="gravBuscaClear"
          onclick="gravBuscar('');document.getElementById('gravBusca').value='';this.classList.remove('vis')">✕</button>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
        <div style="font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text3);white-space:nowrap">
          ${g.audios.length} áudio${g.audios.length!==1?'s':''}
        </div>
        ${g.audios.length>0?`
        <button onclick="gravExportarTodos()"
          style="padding:4px 10px;border-radius:8px;border:1px solid rgba(62,207,142,.3);
                 background:rgba(62,207,142,.1);color:var(--green);font-size:11px;
                 font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;white-space:nowrap">
          ⬇ Exportar tudo
        </button>`:''}
      </div>
    </div>

    <!-- Painel de gravação -->
    <div class="grav-rec-panel" id="gravPainel"></div>

    <!-- Filtros por tag -->
    ${tagsUsadas.length ? `
    <div class="grav-filtros">
      <div class="grav-filtro${!S._grav.filtroTag ? ' on' : ''}" data-tag
        onclick="S._grav.filtroTag=null;save();_gravRenderLista()">Todos</div>
      ${tagsUsadas.map(t => `
        <div class="grav-filtro${S._grav.filtroTag === t ? ' on' : ''}" data-tag="${t}"
          onclick="S._grav.filtroTag=S._grav.filtroTag==='${t}'?null:'${t}';save();_gravRenderLista()">
          ${t}
        </div>`).join('')}
    </div>`: ''}

    <!-- Lista -->
    <div class="grav-lista" id="gravLista"></div>
  `;

      _gravRenderPainel();
      _gravRenderLista();
    }
    async function gravExportarTodos(){
  const audios=S._grav?.audios;
  if(!audios?.length){ alert('Nenhum áudio para exportar.'); return; }

  // Tenta usar JSZip se disponível, senão exporta um por um
  try{
    // Carrega JSZip dinamicamente
    await new Promise((res,rej)=>{
      if(window.JSZip){ res(); return; }
      const s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
      s.onload=res; s.onerror=rej;
      document.head.appendChild(s);
    });

    const zip=new JSZip();
    const pasta=zip.folder('audios_listflow');

    let ok=0;
    const total=audios.length;

    // Toast de progresso
    const toast=document.createElement('div');
    toast.style.cssText=`position:fixed;top:70px;left:50%;transform:translateX(-50%);
      background:var(--surface);border:1px solid var(--accent);color:var(--text);
      padding:10px 20px;border-radius:99px;font-family:'Syne',sans-serif;
      font-size:13px;font-weight:700;z-index:9000;white-space:nowrap;`;
    toast.textContent=`⬇ Preparando 0/${total}...`;
    document.body.appendChild(toast);

    for(const audio of audios){
      try{
        const blob=await _GravDB.carregar(audio.id);
        if(blob){
          // Nome do arquivo: sanitiza caracteres especiais
          const nome=(audio.nome||'audio').replace(/[/\\?%*:|"<>]/g,'_');
          const data=new Date(audio.data).toLocaleDateString('pt-BR').replace(/\//g,'-');
          pasta.file(`${data}_${nome}.webm`, blob);
          ok++;
          toast.textContent=`⬇ Preparando ${ok}/${total}...`;
        }
      } catch(e){ console.error('Erro ao carregar',audio.id,e); }
    }

    toast.textContent=`📦 Gerando ZIP...`;

    const zipBlob=await zip.generateAsync({type:'blob',
      compression:'DEFLATE',compressionOptions:{level:1}
    });

    const url=URL.createObjectURL(zipBlob);
    const a=document.createElement('a');
    a.href=url;
    a.download=`audios_listflow_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.zip`;
    a.click();
    setTimeout(()=>URL.revokeObjectURL(url),2000);

    toast.textContent=`✅ ${ok} áudio${ok!==1?'s':''} exportado${ok!==1?'s':''}!`;
    setTimeout(()=>toast.remove(),3000);

  } catch(e){
    // JSZip falhou — exporta um por um com delay
    console.warn('JSZip não disponível, exportando individualmente:', e);
    const total=audios.length;
    let i=0;

    const toast=document.createElement('div');
    toast.style.cssText=`position:fixed;top:70px;left:50%;transform:translateX(-50%);
      background:var(--surface);border:1px solid var(--accent);color:var(--text);
      padding:10px 20px;border-radius:99px;font-family:'Syne',sans-serif;
      font-size:13px;font-weight:700;z-index:9000;white-space:nowrap;`;
    document.body.appendChild(toast);

    for(const audio of audios){
      try{
        const blob=await _GravDB.carregar(audio.id);
        if(blob){
          i++;
          toast.textContent=`⬇ Exportando ${i}/${total}...`;
          const url=URL.createObjectURL(blob);
          const a=document.createElement('a');
          a.href=url;
          a.download=(audio.nome||'audio').replace(/[/\\?%*:|"<>]/g,'_')+'.webm';
          a.click();
          await new Promise(r=>setTimeout(r,800)); // delay entre downloads
          URL.revokeObjectURL(url);
        }
      } catch(err){ console.error(err); }
    }

    toast.textContent=`✅ ${i} áudio${i!==1?'s':''} exportado${i!==1?'s':''}!`;
    setTimeout(()=>toast.remove(),3000);
  }
}
    // ══════════════════════════════════════════════════════
    //  BOOT
    // ══════════════════════════════════════════════════════
    // para expandir ou recolher um ou outro grupo de itens listas ou plugins
    function _sbExpandir(qual) {
      const sp = document.getElementById('sbSectionPlugins');
      const sl = document.getElementById('sbSectionListas');
      const ap = document.getElementById('sbPluginArrow');
      const al = document.getElementById('sbListasArrow');
      if (!sp || !sl) return;

      if (qual === 'plugins') {
        sp.classList.add('expandido'); sp.classList.remove('recolhido');
        sl.classList.add('recolhido'); sl.classList.remove('expandido');
        if (ap) ap.textContent = '▲';
        if (al) al.textContent = '▼';
      } else {
        sl.classList.add('expandido'); sl.classList.remove('recolhido');
        sp.classList.add('recolhido'); sp.classList.remove('expandido');
        if (al) al.textContent = '▲';
        if (ap) ap.textContent = '▼';
      }
    }
    load();
    // Roda onInit de todos os plugins
    Object.values(PL).forEach(p => { if (p.onInit) p.onInit(); });

    if (!S._view) S._view = 'list';
    Object.values(PL).forEach(p => { if (p.def && S.plugins[p.id] === undefined) S.plugins[p.id] = true; });
    // Restaura plugins com onToggle ao recarregar a página
    Object.values(PL).forEach(p => { if (pon(p.id) && p.onToggle) p.onToggle(true); });
    if (pon('theme') && PL.theme?.onToggle) PL.theme.onToggle(true);

    if (!S.lists.length) {
      const d = { id: genId(), name: '✨ Bem-vindo ao ListFlow!', items: [], color: '#7c6af7' };
      d.items = parseT(`- Toque em ☰ para abrir o menu lateral
- Ative plugins no menu lateral
  - Cada plugin adiciona funcionalidades
  - Experimente Tags, Prazo, Kanban...
- Botão ⊕ para criar sub-itens
  - Aninhamento infinito!
    - Como este aqui 👋
- Importe listas pela área de texto
- Tab para indentar (teclado físico)
- Toque em "Como criar um plugin" no rodapé do menu`);
      S.lists.push(d); S.active = d.id; save();
    }
    renderAll();
    // service worker para deixar offline
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('[SW] OK:', reg.scope))
          .catch(err => console.error('[SW] Erro:', err));
      });
    }
  </script>
</body>

</html>
